        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Qué indica la sigla SQLWARNING en el bloque DECLARE ... HANDLER?", r: ["Es una abreviatura para atrapar códigos SQLSTATE que empiezan por '01' (Advertencias no fatales)", "Indica que se debe mandar un correo al administrador", "Significa que la base de datos está a punto de corromperse", "Sirve para apagar el servidor de forma segura"], c: "Es una abreviatura para atrapar códigos SQLSTATE que empiezan por '01' (Advertencias no fatales)", e: "Permite gestionar sucesos que no bloquean la rutina pero que deben registrarse o vigilarse." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Si en vez de una abreviatura (como SQLEXCEPTION), quiero atrapar un error concreto de MySQL en el HANDLER, ¿qué uso?", r: ["El 'mysql_error_code', un número entero que indica un código específico de error (ej: 1051 para Tabla desconocida)", "El nombre de la tabla que falla", "La instrucción ERROR_CATCH(numero)", "El DNI del usuario"], c: "El 'mysql_error_code', un número entero que indica un código específico de error (ej: 1051 para Tabla desconocida)", e: "Declaras el handler asociándolo al número matemático exacto del error devuelto por el motor." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Pueden los triggers aportar validaciones en una base de datos?", r: ["Sí, proporcionan otra forma de comprobar la integridad (validaciones extendidas o complejas que CHECK no soporta)", "No, para validaciones se usan exclusivamente las vistas", "Sí, pero borran todo el contenido de la tabla si detectan un error", "No, solo los procedimientos pueden hacerlo"], c: "Sí, proporcionan otra forma de comprobar la integridad (validaciones extendidas o complejas que CHECK no soporta)", e: "Para validaciones simples es mejor usar NOT NULL o UNIQUE, reservando el trigger para cálculos cruzados." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Se requiere algún permiso especial en el sistema para ejecutar o invocar un Trigger?", r: ["No manualmente, porque un trigger se ejecuta AUTOMÁTICAMENTE cuando un usuario hace INSERT/UPDATE/DELETE y tiene permisos para ello en la tabla.", "Sí, el usuario necesita GRANT EXECUTE ON TRIGGER.", "Sí, un trigger solo puede ser disparado por el root.", "No, porque los triggers están siempre apagados por defecto."], c: "No manualmente, porque un trigger se ejecuta AUTOMÁTICAmente cuando un usuario hace INSERT/UPDATE/DELETE y tiene permisos para ello en la tabla.", e: "Los triggers no se llaman con 'CALL', operan a la sombra de la instrucción principal del usuario." },
// --- NUEVO BLOQUE: DOCKER Y KUBERNETES (DENTRO DE GESTIÓN DE BD) ---

        // TEMA 1: Docker y K8s - Conceptos Básicos (20 Preguntas)
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué es Docker?", r: ["Una tecnología que permite empaquetar, distribuir y ejecutar aplicaciones en contenedores", "Un lenguaje de programación para bases de datos", "Un sistema operativo basado en Windows", "Un hipervisor para Máquinas Virtuales"], c: "Una tecnología que permite empaquetar, distribuir y ejecutar aplicaciones en contenedores", e: "Docker estandariza el empaquetado de software aislando las dependencias del sistema operativo anfitrión." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Cuál es la diferencia principal entre un contenedor Docker y una Máquina Virtual (VM) tradicional?", r: ["El contenedor comparte el kernel del sistema operativo anfitrión, haciéndolo más ligero", "La máquina virtual es más rápida de arrancar", "El contenedor incluye su propio sistema operativo invitado completo", "Las máquinas virtuales no pueden conectarse a internet"], c: "El contenedor comparte el kernel del sistema operativo anfitrión, haciéndolo más ligero", e: "Al no requerir un SO invitado (Guest OS) completo para cada aplicación, los contenedores consumen muchos menos recursos." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿En qué año se lanzó y popularizó originalmente la tecnología Docker?", r: ["2013", "1999", "2005", "2020"], c: "2013", e: "Fue lanzada como proyecto open-source en 2013 por la empresa dotCloud (posteriormente Docker Inc)." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué es Docker Hub?", r: ["Un repositorio público de imágenes de contenedores en la nube", "Una herramienta para instalar Kubernetes", "El motor central que ejecuta contenedores en local", "Un editor de código de Microsoft"], c: "Un repositorio público de imágenes de contenedores en la nube", e: "Actúa como un registro centralizado (Registry) donde la comunidad y las empresas comparten imágenes de Docker." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿En qué sistema operativo se ejecutan los contenedores Docker de forma nativa y óptima?", r: ["Linux", "Windows", "macOS", "Android"], c: "Linux", e: "Los contenedores aprovechan características nativas del kernel de Linux (como cgroups y namespaces)." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué ocurre cuando instalas y ejecutas Docker en sistemas como macOS o Windows?", r: ["Utilizan una virtualización ligera (como WSL2 en Windows) para correr un kernel de Linux por debajo", "Convierten el código fuente a binarios de Windows/Mac", "No es posible ejecutar Docker en Mac o Windows", "Formatean el disco duro al formato EXT4"], c: "Utilizan una virtualización ligera (como WSL2 en Windows) para correr un kernel de Linux por debajo", e: "Docker Desktop crea una máquina virtual hiper-optimizada en segundo plano para proporcionar el entorno Linux necesario." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué ventaja de seguridad tienen los contenedores Docker por defecto?", r: ["Están aislados del host y de los demás contenedores", "No requieren el uso de contraseñas nunca", "Vienen con un antivirus preinstalado", "Bloquean automáticamente todos los ataques DDoS"], c: "Están aislados del host y de los demás contenedores", e: "El aislamiento asegura que si un contenedor falla o es comprometido, no afecte directamente al servidor anfitrión." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "En la arquitectura Cliente-Servidor de Docker, ¿qué componente es el que realmente construye, ejecuta y distribuye los contenedores?", r: ["El Docker Daemon (Engine)", "El Docker Client (CLI)", "El Dockerfile", "El Docker Hub"], c: "El Docker Daemon (Engine)", e: "El Daemon (dockerd) es el servicio en segundo plano que hace el trabajo pesado de gestionar imágenes y contenedores." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Cómo se comunica el usuario con el Docker Daemon?", r: ["A través del Docker Client o herramientas por línea de comandos (CLI)", "A través de llamadas telefónicas", "Mediante una conexión FTP", "Mediante envío de correos electrónicos al servidor"], c: "A través del Docker Client o herramientas por línea de comandos (CLI)", e: "El cliente (el comando 'docker') toma la instrucción del usuario y se la envía al Daemon." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué protocolo usa el Docker Client para comunicarse internamente con el Docker Daemon?", r: ["API REST a través de sockets UNIX o interfaces de red", "Protocolo SOAP", "Protocolo SMTP de correo", "Conexión directa a la memoria RAM"], c: "API REST a través de sockets UNIX o interfaces de red", e: "Al usar una API REST, el cliente y el daemon pueden incluso estar en máquinas diferentes." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué es una 'Imagen' en la terminología de Docker?", r: ["Una plantilla de solo lectura con las instrucciones y archivos para crear un contenedor", "Un contenedor que está en ejecución", "Un archivo gráfico JPG o PNG guardado en el servidor", "Un backup de la base de datos"], c: "Una plantilla de solo lectura con las instrucciones y archivos para crear un contenedor", e: "La imagen es el empaquetado estático; es el 'molde' del que nacerán los contenedores vivos." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué es un 'Contenedor' en la terminología de Docker?", r: ["Una instancia en ejecución de una Imagen", "Un repositorio de código fuente", "Una porción del disco duro del servidor", "Un lenguaje de scripting"], c: "Una instancia en ejecución de una Imagen", e: "Si la Imagen es la 'clase' en programación, el Contenedor es el 'objeto' instanciado." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Se pueden modificar los archivos base de una Imagen de Docker una vez que ha sido construida?", r: ["No, son de solo lectura; cualquier cambio ocurre en la capa temporal del contenedor o requiere construir una imagen nueva", "Sí, pero solo por el administrador del servidor", "Sí, los archivos de la imagen se cambian constantemente mientras el contenedor corre", "Sí, abriéndolas con un editor de texto normal"], c: "No, son de solo lectura; cualquier cambio ocurre en la capa temporal del contenedor o requiere construir una imagen nueva", e: "La inmutabilidad de las imágenes garantiza que siempre se ejecuten exactamente igual en cualquier entorno." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "Cuando un contenedor se elimina, ¿qué ocurre con los datos generados en su interior si no usamos 'Volúmenes'?", r: ["Se pierden permanentemente al eliminar el contenedor", "Se guardan automáticamente en Docker Hub", "Se envían por email al administrador", "Se copian solos al escritorio del host"], c: "Se pierden permanentemente al eliminar el contenedor", e: "La capa superior del contenedor es efímera. Para persistir datos (ej: una BD) se usan Volúmenes de Docker." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "En la arquitectura tradicional de virtualización, ¿qué capa está por encima del hardware y se encarga de crear las máquinas virtuales?", r: ["El Hipervisor (Hypervisor)", "El Sistema Operativo Invitado", "El Docker Engine", "La Aplicación"], c: "El Hipervisor (Hypervisor)", e: "Herramientas como VMware o VirtualBox usan un hipervisor para emular hardware completo para cada VM." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "En la arquitectura de contenedores de Docker, ¿qué capa reemplaza al Hipervisor tradicional?", r: ["El Docker Engine (Container Engine)", "El Sistema Operativo Invitado", "El disco duro SSD", "La memoria Caché"], c: "El Docker Engine (Container Engine)", e: "El Docker Engine se asienta sobre el SO Host y aísla los contenedores sin necesidad de emular hardware." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué significa que un contenedor de Docker es 'portable'?", r: ["Que puede ejecutarse de manera idéntica en el portátil del desarrollador, en el servidor de pruebas o en la nube pública", "Que se puede llevar en un pendrive físico obligatoriamente", "Que solo funciona en dispositivos portátiles como móviles", "Que no ocupa espacio en disco"], c: "Que puede ejecutarse de manera idéntica en el portátil del desarrollador, en el servidor de pruebas o en la nube pública", e: "Esto soluciona el clásico problema de 'En mi máquina sí funciona, pero en producción no'." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Es necesario instalar dependencias (como Java, Python o librerías) en el servidor host para ejecutar una app en Docker?", r: ["No, todas las dependencias van empaquetadas dentro de la imagen del contenedor", "Sí, el host debe tener instaladas las mismas librerías", "Solo en sistemas operativos Windows", "Sí, es obligatorio instalar Java siempre en el host"], c: "No, todas las dependencias van empaquetadas dentro de la imagen del contenedor", e: "El servidor host solo necesita tener instalado Docker Engine; nada más." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿Qué pasa si intentas ejecutar una imagen con Docker que no está descargada en tu máquina local?", r: ["Docker la busca y la descarga automáticamente del Registry configurado (ej: Docker Hub) antes de ejecutarla", "Docker muestra un error crítico y el ordenador se reinicia", "Docker pide que introduzcas un CD de instalación", "El contenedor arranca vacío sin código"], c: "Docker la busca y la descarga automáticamente del Registry configurado (ej: Docker Hub) antes de ejecutarla", e: "El comportamiento es transparente: si no la tiene localmente, hace un 'pull' automático." },
        { m: "Gestión de BD", t: "Docker y K8s - Conceptos Básicos", u: "Cuestionario", p: "¿En qué lenguaje de programación fue desarrollado originalmente el núcleo de Docker?", r: ["Go (Golang)", "Java", "Python", "C++"], c: "Go (Golang)", e: "Go, desarrollado por Google, es muy popular en tecnologías cloud nativas por su rapidez y concurrencia." },

        // TEMA 2: Docker y K8s - Comandos de Docker (20 Preguntas)
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué comando se utiliza para descargar una imagen desde un registro (como Docker Hub) sin llegar a ejecutarla?", r: ["docker pull", "docker get", "docker download", "docker fetch"], c: "docker pull", e: "Al igual que git pull, este comando trae la última versión de la imagen al disco local." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué comando de la CLI de Docker crea y arranca un contenedor a partir de una imagen?", r: ["docker run", "docker start", "docker init", "docker execute"], c: "docker run", e: "El comando 'docker run' es una combinación de crear (docker create) y arrancar (docker start)." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué parámetro de `docker run` permite ejecutar el contenedor en segundo plano (detached mode)?", r: ["-d", "-b", "-bg", "--hidden"], c: "-d", e: "El modo 'detached' (-d) libera la terminal para que puedas seguir escribiendo otros comandos." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué hace el comando `docker ps`?", r: ["Muestra una lista de los contenedores que están en ejecución actualmente", "Muestra todos los procesos del ordenador anfitrión", "Muestra el código fuente de una imagen", "Muestra las imágenes que ocupan más espacio"], c: "Muestra una lista de los contenedores que están en ejecución actualmente", e: "Es el comando básico para ver qué contenedores están vivos ('ps' viene de process status)." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Cómo puedes listar TODOS los contenedores, incluidos aquellos que están detenidos o han fallado?", r: ["docker ps -a", "docker ps --all-stopped", "docker containers list", "docker show all"], c: "docker ps -a", e: "El modificador -a (all) incluye en la lista los contenedores cuyo estado es 'Exited'." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué comando se usa para detener un contenedor en ejecución de forma segura y controlada (enviando la señal SIGTERM)?", r: ["docker stop", "docker kill", "docker halt", "docker pause"], c: "docker stop", e: "Da tiempo al contenedor (unos 10 segundos por defecto) para cerrar conexiones y guardar estado antes de apagarse." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué comando fuerza la detención inmediata de un contenedor (enviando la señal SIGKILL)?", r: ["docker kill", "docker stop --fast", "docker smash", "docker terminate"], c: "docker kill", e: "Es el equivalente a tirar del cable de alimentación; se usa si el contenedor no responde al 'docker stop'." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "Si un contenedor ya está detenido, ¿qué comando debes usar para eliminarlo completamente del disco duro?", r: ["docker rm", "docker rmi", "docker delete", "docker destroy"], c: "docker rm", e: "'rm' remueve la instancia del contenedor, liberando el espacio de su capa modificable temporal." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué comando se utiliza para eliminar una IMAGEN descargada del sistema local?", r: ["docker rmi", "docker rm -i", "docker delete image", "docker drop"], c: "docker rmi", e: "La 'i' extra al final significa Image (Remove Image). No puedes borrarla si hay un contenedor usándola." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "Si tu aplicación web en el contenedor escucha en el puerto 8080, y quieres acceder a ella desde el puerto 80 de tu PC (host), ¿qué parámetro usas en `docker run`?", r: ["-p 80:8080", "-p 8080:80", "--port 80 to 8080", "EXPOSE 80 8080"], c: "-p 80:8080", e: "La sintaxis siempre es: puerto_host:puerto_contenedor." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué parámetro de `docker run` se utiliza para asignar un nombre humano y amigable al contenedor?", r: ["--name", "-n", "--alias", "-title"], c: "--name", e: "Si no lo especificas, Docker generará un nombre aleatorio gracioso (como 'jolly_einstein')." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué comando debes usar para ver los mensajes de salida, errores o la consola de un contenedor que corre en segundo plano?", r: ["docker logs", "docker output", "docker view", "docker console"], c: "docker logs", e: "Muestra toda la salida estándar (stdout y stderr) generada por la aplicación del contenedor." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Cómo puedes abrir una terminal interactiva dentro de un contenedor Linux que ya está en ejecución?", r: ["docker exec -it <id_contenedor> /bin/bash", "docker ssh <id_contenedor>", "docker enter <id_contenedor>", "docker terminal <id_contenedor>"], c: "docker exec -it <id_contenedor> /bin/bash", e: "'exec' ejecuta un comando (en este caso el shell bash) interactivo (-it) dentro del entorno del contenedor." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué hace el comando `docker images`?", r: ["Muestra una lista de todas las imágenes descargadas o creadas en el servidor local", "Muestra fotos y gráficos de la web", "Descarga una imagen de internet", "Muestra los contenedores en ejecución"], c: "Muestra una lista de todas las imágenes descargadas o creadas en el servidor local", e: "Te lista el repositorio, la etiqueta (tag), el ID de imagen, cuándo fue creada y cuánto pesa." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "Al hacer un `docker run` mapeando un puerto (-p), ¿qué ocurre si ese puerto del ordenador anfitrión ya está en uso por otro programa?", r: ["Docker lanza un error indicando que el puerto está ocupado (bind: address already in use) y el contenedor no arranca", "Docker cierra automáticamente el otro programa", "Docker cambia silenciosamente el puerto a uno libre", "El contenedor arranca pero no tiene internet"], c: "Docker lanza un error indicando que el puerto está ocupado (bind: address already in use) y el contenedor no arranca", e: "No pueden existir dos procesos escuchando en el mismo puerto de la misma interfaz de red en el host." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué comando de terminal te permite ver el consumo de CPU, Memoria RAM y Red de los contenedores en tiempo real (similar al Administrador de Tareas)?", r: ["docker stats", "docker top", "docker monitor", "docker resource"], c: "docker stats", e: "Es una herramienta de monitoreo en vivo muy útil para ver si un contenedor está consumiendo demasiados recursos." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Para qué sirve añadir la bandera `--rm` al ejecutar un comando `docker run`?", r: ["Para que el contenedor se elimine automáticamente (se borre del disco) en el instante en que termine su ejecución o se detenga", "Para borrar la imagen una vez terminado", "Para reiniciar el contenedor en bucle infinito", "Para ejecutarlo en modo solo lectura"], c: "Para que el contenedor se elimine automáticamente (se borre del disco) en el instante en que termine su ejecución o se detenga", e: "Es ideal para tareas de un solo uso o scripts temporales, manteniendo limpio el disco duro." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Qué comando se utiliza para subir una imagen creada localmente a un repositorio público o privado en la nube?", r: ["docker push", "docker upload", "docker send", "docker commit"], c: "docker push", e: "Empuja las capas de la imagen hacia el Registry, para que otros puedan descargarla." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "Si necesitas ver la configuración interna de bajo nivel de un contenedor o imagen (dirección IP, variables, rutas), ¿qué comando devuelve un archivo JSON con toda esa info?", r: ["docker inspect", "docker details", "docker info", "docker describe"], c: "docker inspect", e: "Es el comando clave para debuggear o conocer la IP interna privada que Docker ha asignado al contenedor." },
        { m: "Gestión de BD", t: "Docker y K8s - Comandos de Docker", u: "Cuestionario", p: "¿Para qué sirve el comando `docker network ls`?", r: ["Para listar las redes virtuales creadas y gestionadas internamente por Docker", "Para medir la velocidad de internet", "Para descargar una base de datos", "Para ver quién está conectado a tu WiFi"], c: "Para listar las redes virtuales creadas y gestionadas internamente por Docker", e: "Docker crea redes internas (como 'bridge' o 'host') para que los contenedores puedan hablar entre ellos de forma segura." },

        // TEMA 3: Docker y K8s - Dockerfile y Ecosistema (20 Preguntas)
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué es un Dockerfile?", r: ["Un archivo de texto plano con las instrucciones paso a paso para construir una imagen de Docker personalizada", "Un sistema de archivos temporal de un contenedor", "Un programa para hackear redes", "La base de datos nativa de Docker"], c: "Un archivo de texto plano con las instrucciones paso a paso para construir una imagen de Docker personalizada", e: "Es la 'receta' que automatiza la creación de un entorno (ej: instalar dependencias, copiar código fuente)." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Cuál es, casi siempre, la primera instrucción obligatoria dentro de un Dockerfile?", r: ["FROM", "START", "BEGIN", "INIT"], c: "FROM", e: "La instrucción FROM define cuál será la imagen base sobre la que construiremos (ej: FROM ubuntu:20.04)." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué indica la instrucción RUN dentro de un Dockerfile?", r: ["Que se debe ejecutar un comando de terminal (como apt-get install) DURANTE la construcción de la imagen", "Que el contenedor debe arrancar inmediatamente", "Que el programa entra en un bucle infinito", "Que se está compilando en lenguaje Java"], c: "Que se debe ejecutar un comando de terminal (como apt-get install) DURANTE la construcción de la imagen", e: "Cada instrucción RUN modificará la imagen añadiendo lo instalado y generando una nueva 'capa'." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "En un Dockerfile, ¿qué instrucciones se utilizan para mover archivos desde el ordenador del programador hacia dentro de la imagen?", r: ["COPY y ADD", "MOVE y TRANSFER", "UPLOAD y DOWNLOAD", "SEND y RECEIVE"], c: "COPY y ADD", e: "Por ejemplo, COPY ./mi_codigo /app/ copia el código al directorio app del contenedor." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Cuál es una diferencia principal entre usar COPY y ADD en un Dockerfile?", r: ["ADD tiene funcionalidades extra como extraer automáticamente archivos comprimidos (.tar.gz) y descargar desde URLs, COPY solo copia archivos locales", "COPY es más rápido que ADD", "ADD requiere permisos de administrador y COPY no", "COPY solo funciona en Windows"], c: "ADD tiene funcionalidades extra como extraer automáticamente archivos comprimidos (.tar.gz) y descargar desde URLs, COPY solo copia archivos locales", e: "Las buenas prácticas recomiendan usar COPY siempre, a no ser que necesites extraer un archivo obligatoriamente." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué instrucción en el Dockerfile define el comando principal por defecto que se ejecutará CUANDO el contenedor arranque (no durante la construcción)?", r: ["CMD (o ENTRYPOINT)", "RUN", "START", "EXECUTE"], c: "CMD (o ENTRYPOINT)", e: "Mientras que RUN prepara la imagen, CMD dice 'qué es lo que tiene que hacer el contenedor al estar vivo'." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Para qué sirve la instrucción EXPOSE en un Dockerfile?", r: ["Para documentar el puerto en el que la aplicación escuchará, aunque no lo publica automáticamente en el host real", "Para abrir un agujero en el firewall de Windows", "Para borrar la memoria caché", "Para mostrar el código fuente a los usuarios"], c: "Para documentar el puerto en el que la aplicación escuchará, aunque no lo publica automáticamente en el host real", e: "Es una etiqueta informativa para los desarrolladores. La publicación real se hace con '-p' al hacer el run." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué instrucción de Dockerfile establece el directorio de trabajo (como hacer un 'cd' en Linux) para las siguientes instrucciones?", r: ["WORKDIR", "DIRECTORY", "CD", "PATH"], c: "WORKDIR", e: "Si el directorio no existe, Docker lo creará automáticamente." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué instrucción se usa para definir variables de entorno (como claves API o configuraciones) dentro de la imagen?", r: ["ENV", "VAR", "SET", "DEFINE"], c: "ENV", e: "Ejemplo: ENV NODE_ENV=production. Estas variables estarán disponibles para el programa que corra en el contenedor." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "Cada instrucción que escribimos en un Dockerfile (FROM, RUN, COPY) genera internamente un elemento fundamental de la arquitectura Docker. ¿Cuál?", r: ["Una nueva capa (Layer) sobre la imagen", "Un nuevo contenedor", "Una base de datos distinta", "Un volumen temporal"], c: "Una nueva capa (Layer) sobre la imagen", e: "Las imágenes de Docker son como una cebolla de capas superpuestas. Si una capa no cambia, Docker usa la caché de esa capa y compila más rápido." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué comando ejecuta el proceso de leer el archivo Dockerfile y generar finalmente la imagen resultante?", r: ["docker build", "docker compile", "docker make", "docker generate"], c: "docker build", e: "Generalmente se usa 'docker build -t nombre_imagen .' para construir y etiquetar la imagen." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "Dentro del ecosistema de desarrollo, ¿qué herramienta o extensión de VS Code permite desarrollar directamente abriendo una carpeta dentro de un contenedor?", r: ["Remote - Containers (o Dev Containers)", "VS Code Cloud", "Visual Studio Emulator", "Docker View"], c: "Remote - Containers (o Dev Containers)", e: "Permite tener un entorno de desarrollo puro, sin ensuciar tu PC con librerías o bases de datos." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué archivo de configuración se utiliza en un proyecto para decirle a VS Code cómo debe construir el Dev Container?", r: ["devcontainer.json", "docker-compose.yml", "vscode.config", "container.xml"], c: "devcontainer.json", e: "Define qué Dockerfile usar, extensiones a preinstalar y los puertos que se abrirán para el desarrollador." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "En el ecosistema Java para Docker, ¿qué herramienta desarrollada por Google permite construir imágenes de aplicaciones Java de forma nativa SIN escribir un Dockerfile?", r: ["Jib", "Maven Container", "Spring Docker", "Gradle Build"], c: "Jib", e: "Jib separa automáticamente tu aplicación Java de sus dependencias en distintas capas de forma óptima." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "Según la presentación técnica, ¿qué significa el término coloquial 'Dockerizar' una aplicación?", r: ["Crear la imagen (empaquetar código y dependencias) para que el software pueda ejecutarse como un contenedor", "Contratar los servicios de nube de la empresa Docker", "Borrar el servidor físico y pasarlo a internet", "Instalar el sistema operativo en una caja de discos"], c: "Crear la imagen (empaquetar código y dependencias) para que el software pueda ejecutarse como un contenedor", e: "El proceso suele involucrar: Escribir Dockerfile -> Construir Imagen -> Ejecutar Contenedor." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "Al ejecutar `docker build -t mi-app:1.0 .` , ¿qué indica el punto `.` aislado al final del comando?", r: ["El 'contexto' de construcción, es decir, que busque el Dockerfile y los archivos a copiar en el directorio actual", "El final de la línea de comandos obligatoria de Linux", "Que comprima la imagen en un formato .ZIP", "Que borre el contenido del directorio después de construir"], c: "El 'contexto' de construcción, es decir, que busque el Dockerfile y los archivos a copiar en el directorio actual", e: "Docker envía todo el contenido del directorio actual (contexto) al Daemon para realizar la construcción." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Para qué sirve el archivo `.dockerignore`?", r: ["Para indicarle a Docker qué archivos y carpetas NO debe incluir en el contexto ni enviar al daemon (ej: node_modules, contraseñas)", "Para desinstalar Docker del sistema", "Para ignorar errores de construcción y forzar la imagen", "Para ocultar el contenedor a otros usuarios de la red"], c: "Para indicarle a Docker qué archivos y carpetas NO debe incluir en el contexto ni enviar al daemon (ej: node_modules, contraseñas)", e: "Acelera la compilación al no copiar basura pesada y mejora la seguridad al evitar subir contraseñas o git." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué es una etiqueta o 'Tag' en Docker (ej: en ubuntu:20.04, el '20.04')?", r: ["Un alias o marcador que permite identificar una versión, variante o actualización específica de una imagen", "El peso en megabytes de la imagen", "La licencia de software utilizada", "El nombre del creador de la imagen"], c: "Un alias o marcador que permite identificar una versión, variante o actualización específica de una imagen", e: "Si no indicas tag al descargar o construir, Docker usa por defecto la etiqueta 'latest' (última versión)." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "En la presentación se mencionan Frameworks modernos de desarrollo en Java muy adaptados a la nube y contenedores por su bajo consumo. Menciona algunos:", r: ["Quarkus, Micronaut y Spring Boot", "Angular, React y Vue", "Django, Flask y FastAPI", "Laravel, Ruby on Rails"], c: "Quarkus, Micronaut y Spring Boot", e: "Especialmente Quarkus y Micronaut han sido diseñados de cero para que sus contenedores Docker pesen muy poco y arranquen en milisegundos." },
        { m: "Gestión de BD", t: "Docker y K8s - Dockerfile y Ecosistema", u: "Cuestionario", p: "¿Qué es un 'Volumen' (Volume) en el ecosistema Docker?", r: ["Un mecanismo gestionado por Docker para persistir de forma segura los datos generados por un contenedor, sobreviviendo a su borrado", "Un altavoz virtual conectado al servidor", "Una máquina virtual adicional", "Un límite de peso máximo para una imagen en GB"], c: "Un mecanismo gestionado por Docker para persistir de forma segura los datos generados por un contenedor, sobreviviendo a su borrado", e: "Es la pieza clave para que bases de datos como MySQL en Docker no pierdan su información cuando el contenedor se elimina." },

        // TEMA 4: Docker y K8s - Orquestación (Kubernetes) (20 Preguntas)
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué es Kubernetes (K8s)?", r: ["Un sistema open-source para la automatización del despliegue, escalado y gestión de aplicaciones en contenedores", "Una versión de pago de Docker", "Un sistema operativo para dispositivos móviles de Google", "Un lenguaje de bases de datos para reemplazar a SQL"], c: "Un sistema open-source para la automatización del despliegue, escalado y gestión de aplicaciones en contenedores", e: "Mientras Docker crea el contenedor, Kubernetes es el 'director de orquesta' que maneja miles de ellos simultáneamente." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué gigante tecnológico desarrolló originalmente el código de Kubernetes basándose en sus sistemas internos (Borg), antes de donarlo a la CNCF?", r: ["Google", "Microsoft", "Amazon", "Facebook"], c: "Google", e: "Google aportó años de experiencia ejecutando contenedores a escala masiva para crear K8s en 2014." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "En Kubernetes, ¿cuál es la unidad de despliegue atómica, más pequeña y básica que se puede crear y gestionar?", r: ["El Pod", "El Contenedor (Container)", "La Máquina Virtual (VM)", "El Nodo (Node)"], c: "El Pod", e: "K8s no administra contenedores directamente; administra Pods. Un Pod envuelve a uno (o varios) contenedores." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué contiene y cómo funciona típicamente un Pod en Kubernetes?", r: ["Uno o varios contenedores estrechamente acoplados que comparten recursos de almacenamiento, red (misma IP) y especificaciones", "Un clúster completo de servidores físicos", "Solo bases de datos relacionales", "Un panel de administración visual"], c: "Uno o varios contenedores estrechamente acoplados que comparten recursos de almacenamiento, red (misma IP) y especificaciones", e: "La inmensa mayoría de las veces un Pod tiene solo 1 contenedor principal de la aplicación." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "En la arquitectura de un clúster de Kubernetes, ¿qué es un 'Nodo' (Worker Node)?", r: ["Una máquina física o virtual de trabajo donde se ejecutan y residen los Pods", "El archivo de texto de configuración de la app", "Un balanceador de carga externo", "El cerebro que toma decisiones globales"], c: "Una máquina física o virtual de trabajo donde se ejecutan y residen los Pods", e: "Los Nodos son la fuerza bruta laboral del clúster; ofrecen CPU y RAM a las aplicaciones." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "Dentro del clúster de Kubernetes, ¿qué rol cumple el 'Control Plane' (Plano de Control)?", r: ["Toma las decisiones globales sobre el clúster (planificación, escalado, detección de fallos) y actúa como su cerebro", "Se encarga exclusivamente de ejecutar el código web del usuario final", "Es un almacenamiento de base de datos SQL relacional", "Es un antivirus"], c: "Toma las decisiones globales sobre el clúster (planificación, escalado, detección de fallos) y actúa como su cerebro", e: "El Control Plane ordena a los Nodos de trabajo lo que tienen que hacer." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué componente fundamental se ejecuta en cada Nodo de trabajo (Worker) y se asegura de que los contenedores estén corriendo dentro del Pod según lo ordenado?", r: ["El Kubelet", "El Kube-scheduler", "El etcd", "El Ingress Controller"], c: "El Kubelet", e: "El Kubelet es el 'agente' o 'capataz' de Kubernetes instalado en cada servidor. Habla con Docker/Containerd para levantar los contenedores." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Cómo se llama el almacén de datos clave-valor, altamente disponible, que el Control Plane de Kubernetes usa para guardar todo el estado y configuración del clúster?", r: ["etcd", "MongoDB", "MySQL Server", "Redis Cache"], c: "etcd", e: "etcd es la 'memoria' del clúster. Si se pierde, el clúster olvida qué aplicaciones deberían estar corriendo." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué herramienta de línea de comandos (CLI) se utiliza casi exclusivamente para comunicarse y administrar un clúster de Kubernetes?", r: ["kubectl", "kube-admin", "docker-cli", "cluster-control"], c: "kubectl", e: "Con comandos como 'kubectl get pods' o 'kubectl apply', el administrador domina el sistema." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué objeto de Kubernetes se usa para proporcionar una dirección IP estable y exponer el tráfico de red hacia un grupo de Pods efímeros?", r: ["Service (Servicio)", "Deployment", "Pod-Network", "Ingress"], c: "Service (Servicio)", e: "Como los Pods nacen y mueren constantemente cambiando de IP, el 'Service' actúa como un proxy o puerta de entrada estática hacia ellos." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "El concepto de 'Auto-Healing' de Kubernetes significa que si un Pod falla o el servidor físico se quema...", r: ["Kubernetes detecta que la aplicación ha caído e inicia un nuevo Pod en un Nodo sano para mantener el número de réplicas deseado", "El sistema se bloquea hasta que intervenga un técnico humano", "La aplicación simplemente deja de funcionar para siempre", "Se envían correos de error pero no se reinicia nada"], c: "Kubernetes detecta que la aplicación ha caído e inicia un nuevo Pod en un Nodo sano para mantener el número de réplicas deseado", e: "Es el bucle de control: Kubernetes compara el 'estado actual' con el 'estado deseado' y corrige automáticamente." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué es un 'Deployment' en Kubernetes?", r: ["Un objeto declarativo que gestiona cómo se deben desplegar, actualizar y escalar (número de réplicas) los Pods de una aplicación", "Una herramienta para apagar el clúster", "Una regla de cortafuegos de red", "Un volumen de almacenamiento en disco"], c: "Un objeto declarativo que gestiona cómo se deben desplegar, actualizar y escalar (número de réplicas) los Pods de una aplicación", e: "Normalmente en K8s no creas Pods a mano; creas un Deployment y este se encarga de fabricar los Pods necesarios." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué componente del Control Plane tiene la función de buscar Pods recién creados que no tienen un Nodo asignado y decidir en qué máquina encajan mejor?", r: ["El Kube-scheduler", "El Kubelet", "El Controller Manager", "El etcd"], c: "El Kube-scheduler", e: "Analiza CPU, RAM libre y reglas de afinidad para 'aparcar' los Pods en los servidores adecuados." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué objeto de Kubernetes permite inyectar variables de entorno y archivos de configuración en los Pods sin tener que reconstruir la imagen Docker?", r: ["ConfigMap", "Secret", "Namespace", "Environment-Object"], c: "ConfigMap", e: "Permite separar el código fuente de la configuración (ej: la URL de la base de datos para entornos de Pruebas o Producción)." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "Si necesitas almacenar la contraseña de la Base de Datos o un Certificado TLS de forma más segura, en vez de un ConfigMap usarás...", r: ["Un Secret", "Un texto plano en el código", "Un repositorio de GitHub", "Un objeto Ingress"], c: "Un Secret", e: "Los Secrets de K8s codifican en base64 y protegen información sensible para que no quede expuesta." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué objeto de K8s actúa como un 'enrutador' inteligente que maneja el acceso HTTP/HTTPS desde el mundo exterior (Internet) hacia los Servicios del clúster basándose en la URL o dominio?", r: ["Ingress (Ingress Controller)", "Egress", "LoadBalancer Nativo", "Kube-proxy"], c: "Ingress (Ingress Controller)", e: "Permite, por ejemplo, que 'miempresa.com/api' vaya a un servicio y 'miempresa.com/web' vaya a otro, usando una sola IP externa." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Cómo sabe un 'Service' de Kubernetes a qué Pods específicos debe enviar el tráfico de red?", r: ["Mediante el emparejamiento de 'Labels' (Etiquetas) y 'Selectors' (Selectores)", "Por el nombre exacto de la base de datos", "Porque están en el mismo disco duro", "Porque lo decide el usuario al hacer click"], c: "Mediante el emparejamiento de 'Labels' (Etiquetas) y 'Selectors' (Selectores)", e: "Si un Pod tiene la etiqueta 'app=frontend' y el Servicio busca ese selector, el tráfico se enruta automáticamente hacia él." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "¿Qué es un 'Namespace' en Kubernetes?", r: ["Una forma de particionar o dividir lógicamente un único clúster físico en varios 'clústeres virtuales' aislados", "Un nombre de dominio en Internet", "El espacio físico que ocupa el servidor en el rack", "Un sistema de caché de disco"], c: "Una forma de particionar o dividir lógicamente un único clúster físico en varios 'clústeres virtuales' aislados", e: "Ideal para separar entornos (Desarrollo, Producción) o equipos de trabajo distintos en la misma infraestructura." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "Si un Pod de una base de datos se destruye, por defecto pierde todo. Para evitar esto en Kubernetes se utilizan recursos de almacenamiento externo acoplados llamados...", r: ["Persistent Volumes (PV) y Persistent Volume Claims (PVC)", "Discos Duros Virtuales (VHD)", "Memorias USB conectadas al Nodo", "Volúmenes temporales de RAM (EmptyDir)"], c: "Persistent Volumes (PV) y Persistent Volume Claims (PVC)", e: "El Pod 'reclama' (Claim) un trozo de disco en la red (PV) para que los datos sobrevivan a la muerte del Pod." },
        { m: "Gestión de BD", t: "Docker y K8s - Orquestación", u: "Cuestionario", p: "Resumen de su relación: Si tuviéramos que hacer una analogía sencilla para entenderlos juntos...", r: ["Docker es el actor que crea los contenedores individuales; Kubernetes es el director de orquesta que organiza, vigila y escala a miles de ellos", "Son exactamente lo mismo con distinto nombre", "Kubernetes es hardware físico y Docker es software", "Docker es solo para Mac y Kubernetes para Linux"], c: "Docker es el actor que crea los contenedores individuales; Kubernetes es el director de orquesta que organiza, vigila y escala a miles de ellos", e: "Trabajan en conjunto: las plataformas Cloud modernas usan Kubernetes como sistema maestro para manejar los contenedores estandarizados por la industria." },
// --- NUEVO BLOQUE: EJERCICIOS PRÁCTICOS DE SEGURIDAD (DENTRO DE GESTIÓN DE BD) ---

        // TEMA: Seguridad - Casos Prácticos (30 Preguntas basadas en el Ejercicio 1)
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Según el Ejercicio 1, ¿cuál es la sintaxis correcta para crear al usuario 'juan' con acceso local?", r: ["CREATE USER 'juan'@'localhost' IDENTIFIED BY 'secreta123';", "ADD USER 'juan' IN 'localhost' PASSWORD 'secreta123';", "INSERT USER 'juan'@'localhost' SET PASSWORD='secreta123';", "NEW USER 'juan' LOCALHOST PASS 'secreta123';"], c: "CREATE USER 'juan'@'localhost' IDENTIFIED BY 'secreta123';", e: "Es la instrucción DCL estándar en MySQL para crear una cuenta especificando su origen y contraseña." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "En la creación del usuario 'juan'@'localhost', ¿qué significa exactamente 'localhost'?", r: ["Que 'juan' solo podrá conectarse a la base de datos si lo hace desde el mismo servidor físico donde está instalado MySQL", "Que 'juan' es el administrador local del sistema", "Que 'juan' puede conectarse desde cualquier red local (LAN)", "Que la cuenta de 'juan' no tiene contraseña temporalmente"], c: "Que 'juan' solo podrá conectarse a la base de datos si lo hace desde el mismo servidor físico donde está instalado MySQL", e: "Restringe la conexión a la dirección de loopback (127.0.0.1), bloqueando accesos externos." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Si el usuario 'juan'@'localhost' intenta conectarse desde el ordenador de su casa por Internet a la IP pública del servidor, ¿qué ocurrirá?", r: ["El servidor MySQL rechazará la conexión inmediatamente por no coincidir el host", "Se le pedirá una segunda contraseña de seguridad", "Podrá entrar pero solo en modo lectura", "Entrará como usuario invitado (guest)"], c: "El servidor MySQL rechazará la conexión inmediatamente por no coincidir el host", e: "El primer nivel de seguridad de MySQL bloquea la conexión si la dupla usuario/host no coincide." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Tras ejecutar el Ejercicio 1 (crear a 'juan'), pero antes de hacer el Ejercicio 2, ¿qué permisos tiene 'juan'?", r: ["Solo tiene el privilegio USAGE (puede conectarse al servidor, pero no interactuar con ninguna base de datos)", "Tiene acceso total a la base de datos 'tienda' por defecto", "Tiene permisos de lectura en todas las bases de datos", "No tiene permiso ni para iniciar sesión"], c: "Solo tiene el privilegio USAGE (puede conectarse al servidor, pero no interactuar con ninguna base de datos)", e: "Al crearse, los usuarios en MySQL nacen sin privilegios sobre los datos." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Para el Ejercicio 2, ¿cuál es el comando exacto para otorgar permisos de lectura a 'juan' sobre la base de datos 'tienda'?", r: ["GRANT SELECT ON tienda.* TO 'juan'@'localhost';", "ALLOW READ ON tienda TO 'juan';", "GRANT READ ON DATABASE tienda TO 'juan'@'localhost';", "PERMIT SELECT IN tienda FOR 'juan';"], c: "GRANT SELECT ON tienda.* TO 'juan'@'localhost';", e: "El privilegio de lectura en SQL es SELECT, y se aplica a todas las tablas de tienda (tienda.*)." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Al otorgar el permiso 'ON tienda.*', ¿qué indica el asterisco (*) en esa instrucción?", r: ["Que el privilegio se aplica a todas las tablas y vistas dentro de la base de datos 'tienda'", "Que el privilegio caduca al final del día", "Que se le otorgan absolutamente todos los privilegios (ALL PRIVILEGES)", "Que 'juan' también es administrador de esa base de datos"], c: "Que el privilegio se aplica a todas las tablas y vistas dentro de la base de datos 'tienda'", e: "El formato es 'base_de_datos.tabla'. El asterisco actúa como comodín para 'todas las tablas'." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Para resolver el Ejercicio 3 (Cambiar la contraseña de juan), la mejor instrucción moderna en MySQL sería:", r: ["ALTER USER 'juan'@'localhost' IDENTIFIED BY 'nueva_contraseña_456';", "UPDATE PASSWORD 'juan'@'localhost' = 'nueva_contraseña_456';", "CHANGE PASS FOR 'juan' TO 'nueva_contraseña_456';", "GRANT PASSWORD 'nueva_contraseña_456' TO 'juan';"], c: "ALTER USER 'juan'@'localhost' IDENTIFIED BY 'nueva_contraseña_456';", e: "ALTER USER es la instrucción recomendada en las versiones actuales de MySQL para modificar credenciales." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Si en el Ejercicio 3 el administrador cambia la contraseña de 'juan' ejecutando un UPDATE directo sobre la tabla mysql.user, ¿qué debe hacer obligatoriamente después?", r: ["Ejecutar FLUSH PRIVILEGES; para que el servidor recargue la tabla en memoria", "Reiniciar el ordenador del usuario juan", "Ejecutar COMMIT USER;", "Borrar la caché de DNS del servidor"], c: "Ejecutar FLUSH PRIVILEGES; para que el servidor recargue la tabla en memoria", e: "Las modificaciones manuales a las tablas del sistema no tienen efecto hasta que se fuerza su recarga." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "En el Ejercicio 4, debemos añadir el permiso de inserción (INSERT) a 'juan'. ¿Qué comando lo logra sin borrar su permiso SELECT anterior?", r: ["GRANT INSERT ON tienda.* TO 'juan'@'localhost';", "ADD PERMISSION INSERT ON tienda.* TO 'juan';", "GRANT SELECT, INSERT ON tienda.* TO 'juan'@'localhost';", "Ambas opciones con GRANT son válidas en MySQL para sumar permisos"], c: "Ambas opciones con GRANT son válidas en MySQL para sumar permisos", e: "MySQL añade (suma) el permiso INSERT a los que ya tuviera la cuenta; no los sobrescribe." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Una vez completado el Ejercicio 4, ¿qué ocurriría si 'juan' intenta ejecutar un comando DELETE en la base de datos 'tienda'?", r: ["Devolverá un error de 'Acceso Denegado' porque solo tiene permisos SELECT e INSERT", "Borrará los datos correctamente porque INSERT implica DELETE", "El comando se quedará en pausa esperando autorización del administrador", "Borrará la base de datos entera"], c: "Devolverá un error de 'Acceso Denegado' porque solo tiene permisos SELECT e INSERT", e: "MySQL aplica el principio de mínimo privilegio: si no está explícitamente concedido, está denegado." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Para el Ejercicio 5, la solicitud es quitar el permiso de INSERT a 'juan'. ¿Cuál es la sintaxis correcta?", r: ["REVOKE INSERT ON tienda.* FROM 'juan'@'localhost';", "DENY INSERT ON tienda.* TO 'juan'@'localhost';", "REMOVE INSERT FROM tienda.* FOR 'juan';", "DROP PERMISSION INSERT ON tienda.* FROM 'juan';"], c: "REVOKE INSERT ON tienda.* FROM 'juan'@'localhost';", e: "La cláusula REVOKE seguida del privilegio, el nivel (ON) y el usuario de destino (FROM) retira el acceso." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Tras ejecutar el REVOKE del Ejercicio 5, ¿qué sucede con el permiso SELECT que se le dio en el Ejercicio 2?", r: ["Lo mantiene intacto, ya que REVOKE solo retira los privilegios explícitamente indicados", "Lo pierde también, ya que REVOKE afecta a toda la base de datos indicada", "Pasa a estado suspendido", "Debe volver a solicitarse con un nuevo GRANT"], c: "Lo mantiene intacto, ya que REVOKE solo retira los privilegios explícitamente indicados", e: "Los comandos GRANT y REVOKE son granulares y operan exactamente sobre la lista de permisos dada." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "¿Qué pasaría si intentas hacer `REVOKE DELETE ON tienda.* FROM 'juan'@'localhost';` cuando juan nunca tuvo el permiso DELETE?", r: ["MySQL mostrará un error indicando que no hay tal privilegio concedido (There is no such grant defined for user)", "MySQL le dará el permiso para luego quitárselo", "No mostrará error, simplemente ignorará la orden", "Se bloqueará la cuenta de juan"], c: "MySQL mostrará un error indicando que no hay tal privilegio concedido (There is no such grant defined for user)", e: "No se puede revocar un permiso a un nivel exacto si previamente no había sido concedido con GRANT." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "En el segundo Ejercicio 5 (Mostrar los privilegios), ¿qué comando nos enseñará qué permisos tiene 'juan' actualmente?", r: ["SHOW GRANTS FOR 'juan'@'localhost';", "SELECT PRIVILEGES FROM 'juan';", "LIST GRANTS OF 'juan';", "DISPLAY PERMISSIONS 'juan'@'localhost';"], c: "SHOW GRANTS FOR 'juan'@'localhost';", e: "Este comando devuelve las instrucciones GRANT exactas que representan el estado actual de la cuenta." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Si ejecutamos `SHOW GRANTS FOR 'juan'@'localhost';` tras revocarle el INSERT, ¿qué veremos aproximadamente en pantalla?", r: ["GRANT USAGE ON *.* TO 'juan'@'localhost' y GRANT SELECT ON `tienda`.* TO 'juan'@'localhost'", "Solo GRANT SELECT ON tienda.*", "GRANT ALL PRIVILEGES ON tienda.*", "NO GRANTS FOUND"], c: "GRANT USAGE ON *.* TO 'juan'@'localhost' y GRANT SELECT ON `tienda`.* TO 'juan'@'localhost'", e: "Mostrará su privilegio global básico (USAGE) y el privilegio específico a nivel de BD (SELECT)." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Para el Ejercicio 6, deseamos dar permiso para que 'juan' ejecute el procedimiento 'gestionar_ventas'. ¿Cuál es el comando correcto?", r: ["GRANT EXECUTE ON PROCEDURE ventas.gestionar_ventas TO 'juan'@'localhost';", "GRANT RUN ON ventas.gestionar_ventas TO 'juan';", "ALLOW CALL ON PROCEDURE ventas.gestionar_ventas TO 'juan';", "GRANT PROCEDURE EXECUTE TO 'juan'@'localhost';"], c: "GRANT EXECUTE ON PROCEDURE ventas.gestionar_ventas TO 'juan'@'localhost';", e: "El privilegio EXECUTE es necesario para llamar (CALL) a procedimientos almacenados o funciones." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "En el Ejercicio 6, ¿qué nivel de privilegios se está utilizando al dar acceso a 'ventas.gestionar_ventas'?", r: ["Nivel de Rutina", "Nivel de Tabla", "Nivel de Base de Datos", "Nivel Global"], c: "Nivel de Rutina", e: "Afecta exclusivamente a un procedimiento almacenado o función concreta." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Para que 'juan' pueda ejecutar el procedimiento del Ejercicio 6, ¿necesita también tener permisos directos de lectura/escritura en las tablas que modifique ese procedimiento?", r: ["Normalmente no, el procedimiento actúa como una capa de seguridad y se ejecuta con los permisos de su creador (DEFINER)", "Sí, obligatoriamente debe tener permisos en todas las tablas", "Solo necesita permisos de lectura", "Sí, pero solo si el procedimiento tiene variables"], c: "Normalmente no, el procedimiento actúa como una capa de seguridad y se ejecuta con los permisos de su creador (DEFINER)", e: "Esta es la gran ventaja de seguridad de los procedimientos: dan acceso a la operación, no a la tabla base." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "En el Ejercicio 7, se pide dar permisos para crear/eliminar bases de datos a nivel global. ¿Cómo se expresa esto?", r: ["GRANT CREATE, DROP ON *.* TO 'juan'@'localhost';", "GRANT ALL ON DATABASES TO 'juan';", "GRANT CREATE DB, DROP DB ON *.* TO 'juan';", "ALTER USER 'juan' SET ADMIN=TRUE;"], c: "GRANT CREATE, DROP ON *.* TO 'juan'@'localhost';", e: "El nivel *.* (Global) junto con los privilegios CREATE y DROP le dan este poder administrativo sobre todo el servidor." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "También en el Ejercicio 7, se pide darle a 'juan' permiso para gestionar usuarios. ¿Qué privilegio exacto necesita?", r: ["GRANT CREATE USER ON *.* TO 'juan'@'localhost';", "GRANT MANAGE USERS ON *.* TO 'juan';", "GRANT ALL PRIVILEGES ON mysql.* TO 'juan';", "GRANT ADMIN ON USERS TO 'juan';"], c: "GRANT CREATE USER ON *.* TO 'juan'@'localhost';", e: "El privilegio CREATE USER permite crear, alterar, eliminar o renombrar cuentas de usuario en el servidor." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Si le damos a 'juan' los permisos del Ejercicio 7, ¿qué rol tradicional está asumiendo en parte?", r: ["El rol de Administrador de Base de Datos (DBA)", "El rol de programador backend", "El rol de usuario de solo lectura", "El rol de Analista de Datos"], c: "El rol de Administrador de Base de Datos (DBA)", e: "Tener poder sobre las bases de datos globales y las cuentas de usuario son responsabilidades críticas de un DBA." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "En el último ejercicio (Eliminar un usuario), ¿cuál es el comando exacto para borrar a 'juan'?", r: ["DROP USER 'juan'@'localhost';", "DELETE FROM users WHERE name='juan';", "REMOVE USER 'juan';", "REVOKE ALL PRIVILEGES, DROP FROM 'juan'@'localhost';"], c: "DROP USER 'juan'@'localhost';", e: "El comando DROP USER elimina la cuenta y automáticamente borra todas sus filas de privilegios en las tablas del sistema." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Al ejecutar `DROP USER 'juan'@'localhost';`, ¿qué sucede con las tablas y datos que 'juan' hubiera creado anteriormente (si hubiera tenido permisos)?", r: ["Las tablas y datos NO se eliminan, permanecen intactos en el servidor", "Se eliminan en cascada automáticamente junto con el usuario", "Se bloquean y quedan inaccesibles para siempre", "Se mueven a una papelera de reciclaje"], c: "Las tablas y datos NO se eliminan, permanecen intactos en el servidor", e: "En MySQL, eliminar a un usuario no elimina los objetos de la base de datos que él haya creado." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Si queremos ejecutar los Ejercicios 2 y 4 (dar SELECT e INSERT) de una sola vez, la sintaxis sería:", r: ["GRANT SELECT, INSERT ON tienda.* TO 'juan'@'localhost';", "GRANT (SELECT AND INSERT) ON tienda.* TO 'juan';", "GRANT SELECT + INSERT ON tienda.* TO 'juan';", "GRANT READ, WRITE ON tienda.* TO 'juan';"], c: "GRANT SELECT, INSERT ON tienda.* TO 'juan'@'localhost';", e: "Se pueden agrupar múltiples privilegios del mismo nivel separándolos por comas." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Imagina que en el Ejercicio 1 en vez de 'localhost' pones '%'. ¿Qué comando tendrías que usar en el Ejercicio 9 para borrarlo correctamente?", r: ["DROP USER 'juan'@'%';", "DROP USER 'juan'@'localhost';", "DROP USER 'juan';", "DROP ALL USERS NAMED 'juan';"], c: "DROP USER 'juan'@'%';", e: "El usuario en MySQL se identifica unívocamente por su dupla nombre + host. Hay que indicar exactamente la misma que se creó." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Para ejecutar exitosamente cualquiera de las instrucciones GRANT de estos ejercicios, ¿quién debe estar conectado ejecutándolas?", r: ["Un usuario administrador (como root) que tenga el privilegio GRANT OPTION", "Cualquier usuario de la base de datos", "El propio 'juan'", "El sistema operativo Windows"], c: "Un usuario administrador (como root) que tenga el privilegio GRANT OPTION", e: "Solo puedes dar permisos que tú mismo posees, y además debes tener la potestad para delegarlos (WITH GRANT OPTION)." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Si en el Ejercicio 2 le das `GRANT SELECT ON tienda.*` y en otra línea le das `GRANT UPDATE ON tienda.clientes`, ¿qué pasará si 'juan' intenta actualizar la tabla 'productos'?", r: ["No podrá, porque el UPDATE lo tiene solo a nivel de la tabla 'clientes'", "Sí podrá, porque el SELECT de tienda.* le da permisos en todo", "Sí podrá, porque el nivel de base de datos sobrescribe al nivel de tabla", "El sistema dará un error de sintaxis en el GRANT"], c: "No podrá, porque el UPDATE lo tiene solo a nivel de la tabla 'clientes'", e: "Los privilegios se evalúan de forma jerárquica, pero el UPDATE solo existe en una tabla específica." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "Al revisar los permisos de 'juan' con SHOW GRANTS, si vemos `GRANT SELECT ON *.* TO 'juan'`, ¿cumple con lo pedido en el Ejercicio 2?", r: ["Técnicamente le permite leer 'tienda', pero viola el principio de mínimo privilegio al darle acceso de lectura a todo el servidor", "Sí, es exactamente la sintaxis que pide el Ejercicio 2", "No, porque no le permitirá leer la tabla 'tienda'", "Significa que solo puede leer la base de datos maestra"], c: "Técnicamente le permite leer 'tienda', pero viola el principio de mínimo privilegio al darle acceso de lectura a todo el servidor", e: "El ejercicio pide SELECT sobre la base de datos 'tienda' (ON tienda.*), no a nivel global (ON *.*)." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "¿En qué lenguaje de MySQL están escritas todas las instrucciones de estos ejercicios (CREATE USER, GRANT, REVOKE)?", r: ["DCL (Data Control Language)", "DML (Data Manipulation Language)", "TCL (Transaction Control Language)", "HTML"], c: "DCL (Data Control Language)", e: "El Lenguaje de Control de Datos está específicamente diseñado para gestionar accesos, roles y seguridad." },
        { m: "Gestión de BD", t: "Seguridad - Casos Prácticos", u: "Cuestionario", p: "En resumen de todo el documento práctico, el flujo de seguridad que se ilustra es:", r: ["1. Crear Identidad -> 2. Otorgar Permisos específicos -> 3. Revocar/Modificar según necesidad -> 4. Eliminar Identidad", "1. Dar permisos globales a todos -> 2. Crear las tablas", "1. Borrar usuarios -> 2. Cambiar contraseñas", "1. Crear procedimiento -> 2. Ejecutar -> 3. Otorgar permisos"], c: "1. Crear Identidad -> 2. Otorgar Permisos específicos -> 3. Revocar/Modificar según necesidad -> 4. Eliminar Identidad", e: "Muestra el ciclo de vida completo de la administración de un perfil de usuario en una BD relacional." },

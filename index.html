        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "Si diferenciamos conceptualmente una 'relación' pura de una 'tabla', ¿qué regla estricta aplica a la relación?", r: ["No se admiten filas duplicadas", "Debe tener un mínimo de 100 filas", "Sus columnas deben estar ordenadas alfabéticamente", "No puede contener texto, solo números"], c: "No se admiten filas duplicadas", e: "En el modelo matemático de las relaciones, no existen tuplas (filas) duplicadas[cite: 1717, 1750]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Existe un orden preestablecido para las tuplas (filas) y los atributos (columnas) en una relación?", r: ["No, ni las filas ni las columnas están ordenadas porque la relación es un conjunto", "Sí, se ordenan automáticamente por orden de inserción", "Solo las columnas están ordenadas, las filas no", "Sí, siempre se ordenan alfabéticamente"], c: "No, ni las filas ni las columnas están ordenadas porque la relación es un conjunto", e: "En un conjunto matemático no se establece una relación de orden predefinida[cite: 1719, 1720, 1751, 1752, 1754]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Qué significa que todos los valores de los atributos en el modelo relacional sean 'atómicos'?", r: ["Que solo toman un valor único en cada caso (cruce de fila y columna)", "Que ocupan muy poco espacio en memoria", "Que son datos encriptados automáticamente", "Que no pueden ser borrados"], c: "Que solo toman un valor único en cada caso (cruce de fila y columna)", e: "Son la menor unidad semántica de información; el cruce de una fila y columna contiene solo un valor[cite: 1721, 1722, 1741, 1757]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Qué representa conceptualmente el 'Valor Nulo' en una base de datos relacional?", r: ["Información desconocida, inaplicable, inexistente o no proporcionada", "El número cero (0)", "Un espacio en blanco de texto", "Un error de compilación"], c: "Información desconocida, inaplicable, inexistente o no proporcionada", e: "Es una señal utilizada para representar información que falta o no aplica para una tupla específica[cite: 1764]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "Si en SQL comparamos dos valores nulos para ver si son iguales (ej: teléfono de A = teléfono de B, siendo ambos Nulos), ¿cuál es la respuesta conceptual correcta?", r: ["Quizá sean iguales, es un valor desconocido", "Sí, siempre son iguales", "No, nunca son iguales", "Da un error y cierra la base de datos"], c: "Quizá sean iguales, es un valor desconocido", e: "Al no saber cuáles son los datos reales detrás de esos nulos, el modelo necesita operadores especiales para manejarlos[cite: 1777, 1778, 1780, 1781]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Cuáles son las dos reglas de integridad generales que incluye obligatoriamente el modelo relacional?", r: ["Regla de entidades (Claves primarias) y Regla referencial (Claves ajenas)", "Regla de ordenación y Regla de dominios", "Regla de índices y Regla de vistas", "Regla de cardinalidad y Regla de grado"], c: "Regla de entidades (Claves primarias) y Regla referencial (Claves ajenas)", e: "Son las dos normativas estructurales básicas del modelo relacionadas con PK y FK[cite: 1807, 1808]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "Dentro de la clasificación de restricciones, ¿qué son las 'restricciones inherentes'?", r: ["Las limitaciones impuestas por el propio modelo de datos", "Las limitaciones impuestas por la situación real que se modela", "Las políticas de contraseñas de los usuarios", "Los límites físicos del disco duro"], c: "Las limitaciones impuestas por el propio modelo de datos", e: "Por ejemplo, el modelo relacional tiene como restricción inherente no permitir dos tuplas iguales en la misma relación[cite: 1789, 1790, 1797]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Qué define el término 'Clave Primaria' (PK)?", r: ["El identificador único; asegura que no hay dos tuplas con igual identificador", "El nombre de la columna más larga", "El primer campo que se crea en la tabla", "El atributo que acepta más valores nulos"], c: "El identificador único; asegura que no hay dos tuplas con igual identificador", e: "Es un campo o combinación de campos que identifica de forma única a cada fila[cite: 1675, 1811]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Qué dicta la 'Regla de integridad de las entidades'?", r: ["Ningún componente de la clave primaria de una relación puede aceptar nulos", "Toda tabla debe tener al menos 3 tuplas", "No se permiten claves foráneas en tablas maestras", "Toda base de datos debe tener contraseña"], c: "Ningún componente de la clave primaria de una relación puede aceptar nulos", e: "Las claves primarias compuestas también deben ser no nulas en su totalidad[cite: 1815, 1816, 1817]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Cuál es la justificación principal de la regla de integridad de las entidades (PK no nula)?", r: ["Si tuviese un nulo, la entidad no se podría identificar de forma única, lo cual contradice su propósito", "Porque ocuparía más espacio en memoria", "Porque SQL no reconoce valores nulos", "Para evitar que la tabla pueda ser borrada por accidente"], c: "Si tuviese un nulo, la entidad no se podría identificar de forma única, lo cual contradice su propósito", e: "En una BBDD relacional no se puede almacenar información sobre algo que no se puede identificar[cite: 1823, 1824, 1825]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Qué es una 'Clave Ajena' o 'Clave Foránea' (FK)?", r: ["Un atributo cuyos valores coinciden con la clave primaria de otra relación, o son nulos", "Una contraseña generada aleatoriamente", "El índice principal de una tabla en la nube", "Una clave que expira cada mes"], c: "Un atributo cuyos valores coinciden con la clave primaria de otra relación, o son nulos", e: "Es la herramienta que usa el modelo relacional para relacionar/unir las tablas entre sí[cite: 1812, 1813, 1830, 1831, 1832]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Cuál es el 'problema de la integridad referencial' que deben manejar las bases de datos?", r: ["Garantizar que la base de datos no incluya valores no válidos para una clave ajena", "Asegurar que todas las claves primarias sean numéricas", "Prevenir que dos usuarios accedan al mismo tiempo", "Mantener la estructura del disco defragmentada"], c: "Garantizar que la base de datos no incluya valores no válidos para una clave ajena", e: "Evita que, por ejemplo, una factura apunte a un 'ID de cliente' que no existe en la tabla clientes[cite: 1833, 1834]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Qué dicta formalmente la 'Regla de integridad referencial'?", r: ["Cualquier valor no nulo de la clave ajena debe tener asociado un valor en la clave primaria de la relación objetivo", "Todos los campos de la tabla deben estar completos", "Las tablas no pueden tener más de una clave ajena", "Las bases de datos distribuidas deben estar sincronizadas"], c: "Cualquier valor no nulo de la clave ajena debe tener asociado un valor en la clave primaria de la relación objetivo", e: "La base de datos no debe contener valores de clave ajena sin concordancia[cite: 1859, 1860, 1861]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "Si borramos un registro padre y el SGBD elimina automáticamente todos los registros hijos relacionados, estamos ante una:", r: ["Operación en cascada", "Operación restrictiva", "Anomalía de borrado", "Transacción concurrente"], c: "Operación en cascada", e: "Es una forma de garantizar la integridad referencial: borrar todas las entradas de la clave ajena que coincidan con la PK borrada[cite: 1868, 1872, 1873]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Quién propuso las dos alternativas formales para manipular la información en el modelo relacional?", r: ["Codd", "Turing", "Von Neumann", "Gates"], c: "Codd", e: "Codd es el creador del modelo relacional y propuso la base formal matemática para manipular relaciones[cite: 1874]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Cuáles son las dos alternativas matemáticas formales para la manipulación de datos propuestas por Codd?", r: ["Álgebra relacional y Cálculo relacional", "Sumatorias y Derivadas", "Árboles binarios y Grafos", "Programación lineal y Lógica difusa"], c: "Álgebra relacional y Cálculo relacional", e: "Son la base subyacente para los lenguajes de consulta modernos[cite: 1875, 1876]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "En la teoría relacional, ¿qué caracteriza al 'Álgebra relacional'?", r: ["Su formulación es prescriptiva (proporciona un procedimiento u operadores para resolver el problema)", "Su formulación es meramente visual e ilustrativa", "Solo permite hacer inserciones de datos", "No garantiza resultados correctos"], c: "Su formulación es prescriptiva (proporciona un procedimiento u operadores para resolver el problema)", e: "Ofrece operadores para construir paso a paso la relación que se busca[cite: 1878, 1879, 1882]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "En contraposición, ¿qué caracteriza al 'Cálculo relacional'?", r: ["Su formulación es descriptiva (solo plantea el problema y las propiedades deseadas)", "Es un lenguaje de programación procedimental puro", "Usa operaciones en cascada para borrar tablas", "Es el motor gráfico de las bases de datos"], c: "Su formulación es descriptiva (solo plantea el problema y las propiedades deseadas)", e: "Define la notación para describir las propiedades que deben cumplir las tuplas resultantes, sin decir 'cómo' llegar a ellas[cite: 1884, 1886, 1888]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "A nivel teórico, ¿es el álgebra relacional más potente que el cálculo relacional?", r: ["No, Codd demostró que ambos formalismos son completamente equivalentes", "Sí, el álgebra permite calcular sumas y medias", "Sí, el cálculo relacional quedó obsoleto en los 80", "No, el cálculo relacional es infinitamente superior"], c: "No, Codd demostró que ambos formalismos son completamente equivalentes", e: "Para cada expresión del álgebra existe su expresión en el cálculo y viceversa[cite: 1889, 1890]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "¿Qué lenguaje estándar se originó para realizar consultas, inserciones y creación de tablas basándose en estos conceptos?", r: ["SQL (Structured Query Language)", "HTML", "C++", "Python"], c: "SQL (Structured Query Language)", e: "SQL es el lenguaje de consulta estándar implementado en bases de datos relacionales[cite: 1893, 1894, 1896, 1897]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "Haciendo la equivalencia de terminología técnica: Una Relación equivale a una Tabla, y a nivel físico a un...", r: ["Fichero", "Disco duro", "Sector", "Registro"], c: "Fichero", e: "La comparativa clásica es: Relación/Tabla/Fichero[cite: 1724, 1729, 1730]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "Haciendo la equivalencia técnica: Una Tupla equivale a una Fila, y a nivel físico a un...", r: ["Registro", "Campo", "Fichero", "Dominio"], c: "Registro", e: "La comparativa clásica es: Tupla/Fila/Registro[cite: 1725, 1731, 1732]." },
        { m: "Gestión de BD", t: "Modelo Relacional", u: "Cuestionario", p: "Si definimos un atributo cuyo dominio es 'Fecha' (que es combinación de entero/entero/entero), se dice que pertenece a un...", r: ["Dominio compuesto", "Dominio simple", "Dominio infinito", "Dominio atómico"], c: "Dominio compuesto", e: "Un dominio compuesto es una combinación de dominios simples, como una fecha formada por día, mes y año[cite: 1748, 1749]." },

        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿En cuántos niveles divide MySQL su sistema de control de acceso a la base de datos?", r: ["En dos niveles: comprobación de la conexión y comprobación de privilegios", "En tres niveles: conexión, cifrado y enrutamiento", "En un único nivel global de acceso", "En cuatro capas de red OSI"], c: "En dos niveles: comprobación de la conexión y comprobación de privilegios", e: "El primer nivel verifica desde dónde se conecta y con qué clave, el segundo verifica qué tiene permiso de hacer." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "En la primera fase (comprobación de conexión), ¿qué información evalúa MySQL?", r: ["Nombre de usuario, password y dirección IP/Host de origen", "Solo el nombre de usuario y contraseña", "El sistema operativo del cliente", "La velocidad de conexión de red"], c: "Nombre de usuario, password y dirección IP/Host de origen", e: "MySQL usa la IP o nombre del Host para restringir desde dónde puede entrar una cuenta." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿En qué tabla de sistema guarda MySQL la información de los usuarios que tienen permiso de conexión?", r: ["En la tabla 'user' de la base de datos 'mysql'", "En la tabla 'logins' de la base de datos 'master'", "En el archivo 'passwords.txt'", "En la tabla 'sysadmin'"], c: "En la tabla 'user' de la base de datos 'mysql'", e: "La tabla mysql.user contiene la definición de acceso básica (Host, User, Password)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "Si en el campo 'Host' de la tabla 'user' ponemos 'localhost' o '127.0.0.1', ¿qué significa?", r: ["Que el usuario solo puede conectarse estando físicamente en la misma máquina donde se encuentra el servidor", "Que el usuario puede conectarse desde cualquier lugar de Internet", "Que es una cuenta bloqueada temporalmente", "Que es un usuario de solo lectura"], c: "Que el usuario solo puede conectarse estando físicamente en la misma máquina donde se encuentra el servidor", e: "Evita que esa cuenta sea explotada o acceda desde fuera del servidor local." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "En la especificación del Host en MySQL, ¿para qué se utiliza el símbolo '%'?", r: ["Como comodín para indicar 'cualquier dirección IP' o parte de ella", "Para indicar que el usuario tiene permisos de administrador", "Para bloquear la dirección IP que le sigue", "Para encriptar la contraseña"], c: "Como comodín para indicar 'cualquier dirección IP' o parte de ella", e: "Por ejemplo, '192.168.1.%' permite entrar desde cualquier IP que empiece por esa subred." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿Qué cuenta de usuario crea MySQL por defecto durante su instalación con privilegios totales?", r: ["La cuenta 'raíz' (root)", "La cuenta 'sa'", "La cuenta 'admin'", "La cuenta 'sysadmin'"], c: "La cuenta 'raíz' (root)", e: "Esta cuenta otorga control total sobre todas las bases de datos, por lo que se debe usar solo para administración." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "Si queremos que una sentencia para crear usuarios no de error en caso de que el usuario ya exista, añadimos:", r: ["IF NOT EXISTS", "OR REPLACE", "IGNORE ERRORS", "UPDATE ON DUPLICATE"], c: "IF NOT EXISTS", e: "La sintaxis es CREATE USER [IF NOT EXISTS] cuenta IDENTIFIED BY..." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿Cuál es la sintaxis correcta básica para crear un nuevo usuario en MySQL?", r: ["CREATE USER account_name IDENTIFIED BY 'password';", "ADD USER account_name WITH PASSWORD 'password';", "INSERT INTO users (username, pass) VALUES (account_name, 'password');", "GRANT USER account_name PASSWORD 'password';"], c: "CREATE USER account_name IDENTIFIED BY 'password';", e: "Es la orden estándar del DDL (Data Definition Language) de MySQL para cuentas." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿Cómo se compone internamente el nombre de la cuenta en MySQL para aplicar la seguridad restrictiva?", r: ["Por dos partes separadas por '@': username@hostname", "Solamente por el username", "Por tres partes: username#hostname#password", "Por username y el rol al que pertenece"], c: "Por dos partes separadas por '@': username@hostname", e: "Esto permite tener dos usuarios con el mismo nombre pero que tengan claves o permisos distintos según si entran desde localhost o desde internet." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "Al usar CREATE USER, si omitimos la parte del hostname en el nombre de la cuenta (es decir, creamos 'usuario' a secas), ¿qué asume MySQL?", r: ["Que el usuario puede conectarse desde cualquier host (equivale a '%')", "Que el usuario solo puede conectarse desde localhost", "Que la orden dará un error de sintaxis", "Que es una cuenta sin contraseña"], c: "Que el usuario puede conectarse desde cualquier host (equivale a '%')", e: "Por defecto, si no limitas el origen, MySQL asume el comodín absoluto '%'." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "Una vez que un usuario está creado con CREATE USER, antes de darle ningún permiso extra...", r: ["Puede conectarse al servidor MySQL, pero no puede realizar ninguna acción en las bases de datos", "No puede ni siquiera conectarse al servidor", "Puede leer todas las bases de datos pero no borrarlas", "Ya tiene acceso total automáticamente"], c: "Puede conectarse al servidor MySQL, pero no puede realizar ninguna acción en las bases de datos", e: "Por defecto, los usuarios recién creados nacen con privilegio USAGE (solo conectar), sin acceso a ninguna BD." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "Para el segundo nivel de seguridad (Comprobación de privilegios), MySQL consulta varias tablas. ¿Cuál NO pertenece a este grupo?", r: ["mysql.hardware_priv", "mysql.db", "mysql.tables_priv", "mysql.columns_priv"], c: "mysql.hardware_priv", e: "Las tablas reales consultadas son user, db, tables_priv, columns_priv y procs_priv." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿Qué lenguaje (subconjunto de SQL) gestiona órdenes como CREATE USER, GRANT y REVOKE?", r: ["DCL (Lenguaje de Control de Datos)", "DML (Lenguaje de Manipulación de Datos)", "TCL (Lenguaje de Control de Transacciones)", "XML"], c: "DCL (Lenguaje de Control de Datos)", e: "DCL se utiliza para gestionar la seguridad, los usuarios y sus permisos." },

        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿Qué comando DCL utilizamos para ELIMINAR o QUITAR privilegios a un usuario?", r: ["REVOKE", "DENY", "REMOVE", "DROP PRIVILEGE"], c: "REVOKE", e: "REVOKE 'deshace' lo que el comando GRANT ha otorgado." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿Cómo se almacena la contraseña (Password) dentro de la tabla mysql.user?", r: ["Está encriptada (con formato hash)", "En texto plano legible", "No se almacena en la base de datos, sino en el sistema operativo", "Oculta mediante asteriscos temporales"], c: "Está encriptada (con formato hash)", e: "MySQL cifra el password de forma segura para que ni el administrador pueda leer la contraseña real." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Creación y Conexión", u: "Cuestionario", p: "¿Para qué sirve el comando DROP USER user1@localhost; ?", r: ["Para eliminar completamente la cuenta de usuario del servidor de base de datos", "Para desconectar a un usuario que está actualmente activo", "Para quitarle todos los permisos pero mantener su cuenta", "Para borrar la base de datos que creó el usuario"], c: "Para eliminar completamente la cuenta de usuario del servidor de base de datos", e: "DROP destruye el objeto (en este caso el login de usuario) de la BD mysql." },

        // TEMA 2: Gestión de usuarios - Privilegios (GRANT/REVOKE) (20 Preguntas)
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "En MySQL, los niveles en los que se pueden otorgar privilegios son cinco. ¿Cuáles son?", r: ["Global, Base de Datos, Tabla, Columna y Rutina", "Sistema, Archivo, Servidor, Red e Internet", "Hardware, Software, Frontend, Backend, API", "Dueño, Administrador, Empleado, Cliente, Invitado"], c: "Global, Base de Datos, Tabla, Columna y Rutina", e: "Cada nivel abarca un alcance más concreto y específico que el anterior." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "¿A qué afecta un privilegio asignado a 'Nivel Global'?", r: ["Se aplica a todas las bases de datos de un servidor MySQL", "Afecta a todos los servidores de la empresa en distintas ciudades", "Solo afecta a la base de datos mysql", "Otorga permiso para instalar software en Windows/Linux"], c: "Se aplica a todas las bases de datos de un servidor MySQL", e: "Los permisos globales abarcan todo el SGBD y se almacenan en mysql.user." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "En la cláusula ON del comando GRANT, ¿cómo especificamos que el privilegio es de Nivel Global?", r: ["ON *.*", "ON GLOBAL.*", "ON DATABASE.ALL", "ON SERVER.*"], c: "ON *.*", e: "El primer asterisco es 'cualquier base de datos' y el segundo 'cualquier tabla'." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Para otorgar un privilegio a 'Nivel de Base de Datos' (para todos los objetos de una sola BD), la sintaxis es:", r: ["ON db_name.*", "ON *.db_name", "ON DATABASE=db_name", "ON ALL IN db_name"], c: "ON db_name.*", e: "Significa 'todas las tablas' (*) dentro de la base de datos 'db_name'." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "¿En qué tabla interna guarda MySQL los privilegios concedidos a Nivel de Base de Datos?", r: ["mysql.db", "mysql.tables_priv", "mysql.columns_priv", "mysql.global"], c: "mysql.db", e: "Registra qué usuarios tienen acceso a bases de datos específicas completas." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Si queremos asignar permisos para que un usuario solo opere en una tabla concreta, usamos el Nivel de Tabla. ¿Cuál es la sintaxis en la cláusula ON?", r: ["ON db_name.table_name", "ON table_name.*", "ON TABLE table_name", "ON db_name.*.table_name"], c: "ON db_name.table_name", e: "Se especifica directamente la base de datos y la tabla exacta (Ej: contabilidad.polizas)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Podemos afinar aún más y dar permisos solo sobre ciertas columnas de una tabla (Nivel Columna). ¿Cómo se indica en el comando GRANT?", r: ["Se ponen las columnas entre paréntesis tras el privilegio. Ej: GRANT SELECT(nombre, edad) ON db.tabla", "Se usa ON db.tabla(columna)", "Se añade WHERE COLUMN = nombre", "El nivel de columna no existe en MySQL"], c: "Se ponen las columnas entre paréntesis tras el privilegio. Ej: GRANT SELECT(nombre, edad) ON db.tabla", e: "Es el nivel de protección más granular para esconder datos sensibles (como sueldos)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "¿A qué hace referencia el Nivel de Privilegios de 'Rutina'?", r: ["A procedimientos almacenados (PROCEDURE) y funciones (FUNCTION)", "A rutinas de mantenimiento del hardware", "Al agente de copias de seguridad automáticas", "A las consultas SELECT ejecutadas habitualmente"], c: "A procedimientos almacenados (PROCEDURE) y funciones (FUNCTION)", e: "Se almacenan en mysql.procs_priv y controlan quién puede ejecutarlas." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "¿Qué comando sirve para otorgar todos los permisos posibles a un usuario de un plumazo?", r: ["GRANT ALL PRIVILEGES", "GRANT EVERYTHING", "GRANT SUPERUSER", "GRANT FULL ACCESS"], c: "GRANT ALL PRIVILEGES", e: "Asigna desde SELECT hasta CREATE o DROP en el nivel especificado." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Si añadimos 'WITH GRANT OPTION' al final de un comando GRANT, ¿qué le estamos permitiendo a ese usuario?", r: ["Le permite otorgar a otros usuarios los mismos privilegios que él acaba de recibir", "Le permite cambiar la contraseña del administrador", "Le da permisos de borrado de toda la base de datos", "Hace que sus privilegios nunca expiren"], c: "Le permite otorgar a otros usuarios los mismos privilegios que él acaba de recibir", e: "Es la forma de delegar la administración de seguridad en mandos intermedios." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Si ejecuto: REVOKE ALL PRIVILEGES ON *.* FROM user1@localhost; ¿Qué le estoy quitando?", r: ["Le quito todos sus privilegios globales", "Elimino su cuenta del servidor", "Le quito los permisos a todas las personas excepto a user1", "Revoco todos los permisos y le borro la contraseña"], c: "Le quito todos sus privilegios globales", e: "La revocación se hace al mismo nivel exacto (ON *.*) en el que se otorgó." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Si el usuario X tiene un permiso a Nivel de Tabla (ON ventas.facturas) y ejecutas REVOKE ... ON ventas.*, ¿pierde el permiso de la tabla?", r: ["No, la revocación debe hacerse al mismo nivel exacto de privilegios otorgados", "Sí, porque ventas.* es superior e incluye a facturas", "Dará un error bloqueante en la BBDD", "Sí, pero solo por 24 horas"], c: "No, la revocación debe hacerse al mismo nivel exacto de privilegios otorgados", e: "MySQL requiere que revoques específicamente lo que concediste (ON ventas.facturas)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "En el comando REVOKE, ¿cómo quito permisos específicos sobre columnas a un usuario?", r: ["Debo especificar la lista de privilegios y las mismas columnas. Ej: REVOKE SELECT(col1) ON tabla", "Solo con REVOKE COLUMN col1 FROM tabla", "Borrando y recreando al usuario", "No se pueden revocar permisos de columna, solo de tabla"], c: "Debo especificar la lista de privilegios y las mismas columnas. Ej: REVOKE SELECT(col1) ON tabla", e: "Al igual que con el nivel de BD, la revocación de columnas debe ser exacta a la concesión." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "¿Qué privilegio concreto necesito otorgar para que un usuario pueda ejecutar un procedimiento almacenado?", r: ["GRANT EXECUTE ON PROCEDURE db.nombre_proc", "GRANT CALL ON db.nombre_proc", "GRANT SELECT ON ROUTINE db.nombre_proc", "GRANT RUN ON db.nombre_proc"], c: "GRANT EXECUTE ON PROCEDURE db.nombre_proc", e: "El privilegio EXECUTE es el requerido para hacer llamadas (CALL) a las rutinas." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "¿Qué mensaje por defecto aparece al hacer 'SHOW GRANTS' de un usuario recién creado que no tiene ningún permiso especial?", r: ["GRANT USAGE ON *.* TO ...", "GRANT NONE ON *.* TO ...", "GRANT CONNECT ON *.* TO ...", "NO GRANTS FOUND"], c: "GRANT USAGE ON *.* TO ...", e: "USAGE significa literalmente 'sin privilegios reales', solo tiene permiso para intentar iniciar sesión." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Si quieres dar permiso para leer y modificar datos, pero NO para borrar registros, ¿qué lista de privilegios usas?", r: ["GRANT SELECT, INSERT, UPDATE", "GRANT SELECT, MODIFY", "GRANT READ, WRITE", "GRANT ALL EXCEPT DELETE"], c: "GRANT SELECT, INSERT, UPDATE", e: "MySQL usa listas separadas por comas para otorgar privilegios específicos." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Al usar el comando REVOKE, si un usuario tenía la opción de dar permisos a otros (GRANT OPTION), ¿cómo se la quitamos?", r: ["Añadiendo GRANT OPTION en la lista a revocar (Ej: REVOKE ALL PRIVILEGES, GRANT OPTION FROM...)", "Se quita automáticamente al revocar el resto", "No se puede quitar sin borrar al usuario", "Con la instrucción DENY GRANT"], c: "Añadiendo GRANT OPTION en la lista a revocar (Ej: REVOKE ALL PRIVILEGES, GRANT OPTION FROM...)", e: "El GRANT OPTION se trata como un privilegio más a la hora de revocar." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "Si asignas GRANT ALL PRIVILEGES, ¿qué permiso NO se incluye por defecto y debe otorgarse de forma independiente si se desea?", r: ["WITH GRANT OPTION", "DROP", "ALTER", "CREATE_VIEW"], c: "WITH GRANT OPTION", e: "El poder delegar la concesión a otros es un peligro de seguridad y siempre debe ponerse de forma explícita." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "En la arquitectura MySQL, si un usuario no tiene permisos sobre la tabla A, e intenta hacer un SELECT...", r: ["El sistema detiene la petición en el 'Nivel 2: Comprobación de privilegios' devolviendo un error", "El sistema ejecuta la query pero devuelve las columnas vacías", "El sistema le desconecta del servidor directamente", "Se le redirige a la tabla 'user'"], c: "El sistema detiene la petición en el 'Nivel 2: Comprobación de privilegios' devolviendo un error", e: "La comprobación bloquea inmediatamente cualquier instrucción no autorizada." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Privilegios (GRANT/REVOKE)", u: "Cuestionario", p: "¿Dónde debe declararse la cuenta de destino en los comandos GRANT o REVOKE?", r: ["Después de la cláusula 'TO' en GRANT, y 'FROM' en REVOKE", "Después de 'ON' en ambos", "Siempre al principio de la sentencia", "Dentro de unos corchetes [ ]"], c: "Después de la cláusula 'TO' en GRANT, y 'FROM' en REVOKE", e: "Ejemplos: GRANT ... TO user; REVOKE ... FROM user." },

        // TEMA 3: Gestión de usuarios - Contraseñas y Roles (20 Preguntas)
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Cuál es el comando estándar para cambiar la contraseña de un usuario en MySQL?", r: ["SET PASSWORD FOR 'user'@'host' = PASSWORD('nueva_clave');", "UPDATE PASSWORD 'user' = 'nueva_clave';", "ALTER USER 'user' PASSWORD 'nueva_clave';", "CHANGE PASS 'user' TO 'nueva_clave';"], c: "SET PASSWORD FOR 'user'@'host' = PASSWORD('nueva_clave');", e: "La función PASSWORD() se encarga de encriptar el texto introducido." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Otra forma de cambiar la contraseña usando permisos de administrador es alterando directamente la tabla del sistema con la sentencia:", r: ["UPDATE mysql.user SET Password = PASSWORD('nueva') WHERE User='user';", "INSERT INTO mysql.passwords VALUES ('nueva');", "REPLACE INTO mysql.user (password) VALUES ('nueva');", "MODIFY mysql.user PASSWORD='nueva';"], c: "UPDATE mysql.user SET Password = PASSWORD('nueva') WHERE User='user';", e: "Es una modificación directa a las tripas de la BD, por lo que requiere recargar privilegios luego." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Si has modificado directamente la tabla mysql.user para cambiar una contraseña o permiso, ¿qué instrucción OBLIGATORIA debes ejecutar después para que MySQL lo detecte?", r: ["FLUSH PRIVILEGES;", "COMMIT;", "RELOAD SYSTEM;", "REFRESH USERS;"], c: "FLUSH PRIVILEGES;", e: "Este comando obliga al servidor MySQL a recargar en memoria RAM las tablas de seguridad." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Para qué se utiliza el comando GRANT USAGE ON *.* TO 'user'@'host' IDENTIFIED BY 'nueva_clave'?", r: ["Para cambiar o asignar una contraseña a una cuenta sin afectar los permisos actuales que ya tenga", "Para quitarle todos los permisos y dejar solo su contraseña", "Para crear un rol de uso exclusivo", "Para ver el historial de inicio de sesión de un usuario"], c: "Para cambiar o asignar una contraseña a una cuenta sin afectar los permisos actuales que ya tenga", e: "Como USAGE significa 'ningún privilegio nuevo', solo actualiza el acceso." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Si el administrador olvida la contraseña del usuario 'root', ¿con qué parámetro especial debe arrancar el servidor MySQL para poder entrar sin clave y arreglarlo?", r: ["mysqld --skip-grant-tables", "mysqld --safe-mode", "mysqld --no-passwords", "mysqld --reset-root"], c: "mysqld --skip-grant-tables", e: "Inicia el servidor ignorando toda la seguridad de permisos, permitiendo entrar libremente y hacer UPDATE mysql.user." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Qué es un 'Rol' en MySQL?", r: ["Una colección de privilegios con un nombre, que simplifica la administración de usuarios", "Un tipo de contraseña temporal", "Un sistema de copias de seguridad automáticas", "Un usuario especial superior a root"], c: "Una colección de privilegios con un nombre, que simplifica la administración de usuarios", e: "Al igual que los grupos en Linux, los roles heredan los permisos a quienes pertenecen a ellos." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿A partir de qué versión de MySQL vienen los Roles incorporados de forma nativa e implementados?", r: ["Versión 8.0", "Versión 5.5", "Versión 4.0", "Versión 10.1"], c: "Versión 8.0", e: "Antes de la versión 8.0, MySQL no soportaba Roles y había que dar permisos usuario a usuario." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Cuál es la sintaxis para crear un rol en MySQL?", r: ["CREATE ROLE [IF NOT EXISTS] role_name;", "ADD ROLE role_name;", "INSERT ROLE role_name;", "NEW ROLE role_name;"], c: "CREATE ROLE [IF NOT EXISTS] role_name;", e: "El nombre del rol es similar al de la cuenta de usuario (nombre y host)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Si al crear un rol con CREATE ROLE omites la parte del host, ¿cuál es el valor predeterminado que asume MySQL?", r: ["El comodín '%' (que significa cualquier host)", "El valor 'localhost'", "El valor nulo (sin host)", "El nombre del usuario creador"], c: "El comodín '%' (que significa cualquier host)", e: "Esto permite que el rol se aplique independientemente de dónde se conecte el usuario asignado." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Una vez creado un rol vacío, ¿cómo le añadimos los privilegios?", r: ["Con la instrucción GRANT, igual que a un usuario normal. Ej: GRANT SELECT ON db.* TO role_name;", "Editando el rol con ALTER ROLE", "A través de la tabla mysql.roles_priv", "Los roles ya nacen con privilegios globales"], c: "Con la instrucción GRANT, igual que a un usuario normal. Ej: GRANT SELECT ON db.* TO role_name;", e: "Los roles son 'recipientes' que asimilan privilegios mediante el comando GRANT." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Cómo asignamos (otorgamos) un rol ya configurado a un usuario específico?", r: ["Usando GRANT. Ej: GRANT role_name TO usuario@localhost;", "Usando ASSIGN. Ej: ASSIGN role_name TO usuario;", "Con UPDATE mysql.user SET Role = ...", "Usando ADD USER TO ROLE ..."], c: "Usando GRANT. Ej: GRANT role_name TO usuario@localhost;", e: "El comando GRANT se usa tanto para dar permisos a roles, como para dar roles a usuarios." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "La gran ventaja de los roles es que, si deseas cambiar los privilegios de 50 usuarios que comparten el mismo rol...", r: ["Solo cambias los privilegios del rol otorgado, y el cambio se aplica a todos instantáneamente", "Tienes que hacer 50 sentencias UPDATE", "Debes crear un rol nuevo y borrar el anterior", "Debes pedir a los 50 usuarios que reinicien sesión"], c: "Solo cambias los privilegios del rol otorgado, y el cambio se aplica a todos instantáneamente", e: "Esa es la potencia fundamental de los roles: la centralización de la seguridad." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Si usamos el comando REVOKE INSERT ON crm.* FROM crm_write (siendo crm_write un rol), ¿a quién afecta?", r: ["Afecta al rol y también a cualquier cuenta de usuario a la que se le haya otorgado dicho rol", "Solo afecta a los nuevos usuarios, los antiguos lo conservan", "Solo afecta al usuario administrador", "Da error porque no se pueden revocar permisos a un rol"], c: "Afecta al rol y también a cualquier cuenta de usuario a la que se le haya otorgado dicho rol", e: "La herencia actúa de inmediato retirando el poder a todos sus miembros." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Cuál es el comando correcto para destruir o eliminar un rol del servidor?", r: ["DROP ROLE [IF EXISTS] role_name;", "DELETE ROLE role_name;", "REVOKE ROLE role_name;", "TRUNCATE ROLE role_name;"], c: "DROP ROLE [IF EXISTS] role_name;", e: "Se eliminan varios separándolos por comas (Ej: DROP ROLE r1, r2;)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Para ver qué permisos están activos para ti mismo en la sesión actual, la consulta es:", r: ["SHOW GRANTS FOR CURRENT_USER();", "SELECT ALL GRANTS;", "DESCRIBE CURRENT_USER;", "SHOW MY_PRIVILEGES;"], c: "SHOW GRANTS FOR CURRENT_USER();", e: "Devuelve todas las filas de seguridad que el motor te está aplicando en ese instante." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Qué rol en la vida real sería el encargado de crear y asignar estos roles en MySQL?", r: ["El Administrador de Base de Datos (DBA)", "El programador Frontend", "El usuario final", "El diseñador gráfico de la aplicación"], c: "El Administrador de Base de Datos (DBA)", e: "El DBA es el guardián de la seguridad y el esquema de la base de datos." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Si en MySQL creo una variable de usuario con 'SET @mivariable = 5;', ¿hasta cuándo existirá esa variable?", r: ["Se mantiene durante toda la sesión actual (conexión) de ese usuario", "Se guarda para siempre en el disco duro", "Solo existe durante el milisegundo de ejecución", "Desaparece si se crea una nueva tabla"], c: "Se mantiene durante toda la sesión actual (conexión) de ese usuario", e: "Las variables de usuario (con @) sirven para pasar valores entre distintas consultas de una misma sesión." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Qué ocurre si ejecuto DROP ROLE contabilidad; y había tres usuarios que lo tenían asignado?", r: ["Los tres usuarios pierden instantáneamente los permisos que les daba ese rol", "Se bloquean las cuentas de los tres usuarios", "Da error porque hay usuarios dependiendo del rol", "Se borran las tablas de contabilidad"], c: "Los tres usuarios pierden instantáneamente los permisos que les daba ese rol", e: "La eliminación del rol retira su herencia, pero no borra a las cuentas de los usuarios." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "¿Se puede usar la instrucción SELECT para asignar un valor a una variable de usuario (@var)?", r: ["Sí, mediante la instrucción SELECT valor INTO @variable;", "No, solo funciona el comando SET", "Sí, pero solo para cadenas de texto", "No, las variables no aceptan resultados de SELECT"], c: "Sí, mediante la instrucción SELECT valor INTO @variable;", e: "Es ideal para guardar el resultado de una consulta (Ej: contar clientes) en una variable." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Contraseñas y Roles", u: "Cuestionario", p: "Cuando reseteamos la clave de root con 'mysqld --skip-grant-tables', ¿cuál es el paso final indispensable?", r: ["Reiniciar el servidor MySQL de forma normal para volver a activar la seguridad", "Borrar todas las tablas de prueba", "Formatear el disco duro", "Reinstalar Workbench"], c: "Reiniciar el servidor MySQL de forma normal para volver a activar la seguridad", e: "Si lo dejamos en skip-grant-tables, el servidor queda totalmente expuesto y vulnerable." },

        // TEMA 4: Gestión de usuarios - Procedimientos y Funciones (20 Preguntas)
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Cuál es una ventaja principal de usar Procedimientos Almacenados respecto a lanzar código SQL desde la aplicación?", r: ["Velocidad: el código ya está en el servidor pre-compilado, reduciendo tráfico y análisis", "Menor uso de memoria RAM en el servidor", "Hacen que la base de datos sea compatible con Excel", "Permiten añadir imágenes a las tablas"], c: "Velocidad: el código ya está en el servidor pre-compilado, reduciendo tráfico y análisis", e: "Los clientes solo envían la orden de llamada (CALL) y los datos, no consultas larguísimas." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "A nivel de seguridad, los Procedimientos Almacenados son más seguros porque...", r: ["Evitan acciones como la Inyección de código SQL y permiten dar permiso de ejecución en vez de acceso a las tablas subyacentes", "Cifran los datos guardados en disco", "No requieren contraseña para ser ejecutados", "Son inmunes a virus de Windows"], c: "Evitan acciones como la Inyección de código SQL y permiten dar permiso de ejecución en vez de acceso a las tablas subyacentes", e: "Aisla la lógica y protege las tablas maestras, delegando la acción segura a la rutina." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Qué comando debemos usar en el cliente (ej. Workbench) antes de escribir un procedimiento para que MySQL no se confunda con los puntos y comas internos?", r: ["DELIMITER $$ (o similar)", "SET SEPARATOR //", "CHANGE END_CHAR ;", "START PROCEDURE"], c: "DELIMITER $$ (o similar)", e: "Cambia el delimitador de fin de orden, permitiendo escribir múltiples ';' dentro del código BEGIN/END." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Cómo se invoca o ejecuta un Procedimiento Almacenado desde código o cliente?", r: ["Con la instrucción CALL nombre_proc(argumentos);", "Con RUN nombre_proc;", "Con EXECUTE nombre_proc;", "Con START nombre_proc();"], c: "Con la instrucción CALL nombre_proc(argumentos);", e: "Si invocamos por segunda vez, MySQL lo ejecuta ultra rápido desde la memoria caché." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Cuál es la principal diferencia estructural entre un Procedimiento Almacenado (PROCEDURE) y una Función Almacenada (FUNCTION)?", r: ["La función debe incluir RETURNS (tipo) en su cabecera y una instrucción RETURN (valor) en su cuerpo", "El procedimiento no puede recibir parámetros", "La función solo se ejecuta en servidores Linux", "Los procedimientos devuelven imágenes y las funciones texto"], c: "La función debe incluir RETURNS (tipo) en su cabecera y una instrucción RETURN (valor) en su cuerpo", e: "Las funciones están diseñadas específicamente para devolver un único valor calculado." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Qué bloque de instrucciones delimita el inicio y el fin de la lógica de programación en una rutina?", r: ["BEGIN y END", "START y STOP", "OPEN y CLOSE", "DO y WHILE"], c: "BEGIN y END", e: "Dentro del bloque BEGIN/END se declaran las variables, sentencias SQL, y bucles." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "En un procedimiento almacenado, un parámetro puede tener uno de 3 modos. ¿Cuáles son?", r: ["IN, OUT, INOUT", "READ, WRITE, APPEND", "GET, SET, UPDATE", "GLOBAL, LOCAL, SESSION"], c: "IN, OUT, INOUT", e: "IN (Entrada - por defecto), OUT (Salida para el llamador), INOUT (Entrada y Salida)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "Si definimos un parámetro como OUT...", r: ["Su valor puede modificarse dentro del procedimiento y el valor actualizado se devuelve al programa que llamó al procedimiento", "Solo sirve para mostrar mensajes por pantalla", "MySQL bloquea el parámetro como de solo lectura", "Sirve para borrar el procedimiento"], c: "Su valor puede modificarse dentro del procedimiento y el valor actualizado se devuelve al programa que llamó al procedimiento", e: "Es el método que usan los procedimientos para devolver varios valores simultáneos al programa." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Cómo declaramos una variable de trabajo interna DENTRO de un procedimiento almacenado (entre BEGIN y END)?", r: ["DECLARE nombre_variable tipo_dato [DEFAULT valor];", "SET @nombre_variable = valor;", "VAR nombre_variable AS tipo_dato;", "CREATE VARIABLE nombre_variable tipo;"], c: "DECLARE nombre_variable tipo_dato [DEFAULT valor];", e: "Si no le pones cláusula DEFAULT, su valor inicial será automáticamente NULL." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "Para establecer condiciones lógicas en MySQL se utiliza la estructura IF. ¿Cuál es su sintaxis correcta?", r: ["IF condicion THEN sentencias; ELSEIF condicion THEN ... ELSE ... END IF;", "IF (condicion) { sentencias }", "CASE condicion THEN sentencias END CASE", "WHEN condicion DO sentencias END WHEN"], c: "IF condicion THEN sentencias; ELSEIF condicion THEN ... ELSE ... END IF;", e: "Evalúa condiciones secuencialmente hasta encontrar una verdadera o llegar al ELSE." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Qué alternativa más legible ofrece MySQL a los múltiples IF anidados cuando hay coincidencias simples?", r: ["La declaración CASE (CASE expresion WHEN valor THEN ... END CASE;)", "El bucle WHILE", "El operador ternario ?:", "La sentencia CONTINUE"], c: "La declaración CASE (CASE expresion WHEN valor THEN ... END CASE;)", e: "CASE hace que el código sea mucho más eficiente y legible ante un abanico de opciones." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Qué estructura de repetición (bucle) evalúa la condición AL FINAL de cada iteración, garantizando que se ejecute al menos una vez?", r: ["REPEAT instrucciones UNTIL condicion END REPEAT;", "WHILE condicion DO instrucciones END WHILE;", "LOOP instrucciones END LOOP;", "FOR i IN 1..10 DO instrucciones;"], c: "REPEAT instrucciones UNTIL condicion END REPEAT;", e: "A diferencia de WHILE, REPEAT ejecuta el cuerpo y luego pregunta UNTIL (hasta que) la condición se cumpla." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Qué estructura de repetición evalúa la condición AL PRINCIPIO del bucle?", r: ["WHILE condicion DO instrucciones END WHILE;", "REPEAT instrucciones UNTIL condicion;", "LOOP instrucciones END LOOP;", "ITERATE instrucciones;"], c: "WHILE condicion DO instrucciones END WHILE;", e: "Si la condición inicial es falsa, el cuerpo de WHILE jamás se ejecutará." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Qué comando SQL se utiliza para eliminar completamente un procedimiento o función creado?", r: ["DROP {PROCEDURE | FUNCTION} [IF EXISTS] sp_name", "DELETE PROCEDURE sp_name", "REMOVE FUNCTION sp_name", "REVOKE PROCEDURE sp_name"], c: "DROP {PROCEDURE | FUNCTION} [IF EXISTS] sp_name", e: "Destruye el código del catálogo de la base de datos." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "Si queremos consultar el listado de todos los procedimientos almacenados que tenemos y su información, ejecutamos:", r: ["SHOW PROCEDURE STATUS [LIKE 'patron']", "LIST PROCEDURES", "SELECT * FROM PROCEDURES", "DISPLAY ROUTINES"], c: "SHOW PROCEDURE STATUS [LIKE 'patron']", e: "Muestra su nombre, tipo, creador, fechas de modificación y seguridad." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "Si necesito cambiar las características de un procedimiento sin borrarlo (ej: añadir un comentario o cambiar seguridad), ¿qué comando usaría?", r: ["ALTER PROCEDURE", "UPDATE PROCEDURE", "CHANGE PROCEDURE", "MODIFY PROCEDURE"], c: "ALTER PROCEDURE", e: "Ojo: ALTER en MySQL solo cambia características (metadatos), no el código fuente en sí." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Qué indica la palabra reservada DETERMINISTIC (opcional) al crear un procedimiento/función?", r: ["Que la función siempre devolverá el mismo resultado dados los mismos parámetros de entrada", "Que la función es ejecutada por el usuario root", "Que es obligatoria su ejecución antes de arrancar MySQL", "Que nunca arrojará errores"], c: "Que la función siempre devolverá el mismo resultado dados los mismos parámetros de entrada", e: "Ayuda a MySQL a optimizar, ya que sabe que no usa datos aleatorios (como RAND())." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Cómo se concatena texto en las variables dentro de un procedimiento MySQL?", r: ["Usando la función CONCAT(texto1, texto2)", "Con el operador +", "Con el operador &", "Con el operador ||"], c: "Usando la función CONCAT(texto1, texto2)", e: "Por ejemplo: SELECT CONCAT(i, ' es impar');" },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "Si en un programa declaras `DECLARE total INT DEFAULT 0;` y quieres que almacene un 10. ¿Qué escribes a continuación?", r: ["SET total = 10;", "total = 10;", "ASSIGN 10 TO total;", "LET total = 10;"], c: "SET total = 10;", e: "La cláusula SET es indispensable para asignar valores a variables internas." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Procedimientos y Funciones", u: "Cuestionario", p: "¿Qué ventaja organizativa otorgan los procedimientos almacenados (Estándar)?", r: ["Centralizan la lógica en un único lugar (el SGBD), evitando duplicidades de código en distintos programas o desarrolladores", "Reemplazan por completo a los lenguajes como Java o PHP", "Permiten que MySQL funcione sin conexión a Internet", "Ocultan el esquema de tablas al administrador"], c: "Centralizan la lógica en un único lugar (el SGBD), evitando duplicidades de código en distintos programas o desarrolladores", e: "Si una fórmula de cálculo de IVA cambia, solo se cambia el procedimiento, y todos los programas (web, móvil) se actualizan instantáneamente." },

        // TEMA 5: Gestión de usuarios - Errores y Triggers (20 Preguntas)
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Qué mecanismo usamos en un procedimiento para capturar y manejar un error, advertencia o caso excepcional (ej: no se encuentra un registro)?", r: ["DECLARE ... HANDLER FOR condicion sentencias;", "CATCH ERROR THEN ...", "ON EXCEPTION DO ...", "TRY ... CATCH MySQL_Error"], c: "DECLARE ... HANDLER FOR condicion sentencias;", e: "Permite indicarle a MySQL qué hacer si surge un problema de integridad o lógica." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Al crear un manejador de errores, debes decidir si el código sale o sigue tras el fallo. ¿Qué opciones existen?", r: ["EXIT (El procedimiento finalizará) o CONTINUE (Continuará con la siguiente instrucción)", "ABORT y RETRY", "STOP y GO", "PAUSE y SKIP"], c: "EXIT (El procedimiento finalizará) o CONTINUE (Continuará con la siguiente instrucción)", e: "Por ejemplo: DECLARE CONTINUE HANDLER FOR NOT FOUND SET done = 1;" },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Qué valor de condición (condition_value) genérico de MySQL se utiliza para atajar cualquier error crítico (que no empiece por 00, 01 o 02)?", r: ["SQLEXCEPTION", "SQLWARNING", "NOT FOUND", "ERROR_ALL"], c: "SQLEXCEPTION", e: "Es una abreviatura/comodín para atrapar 'cualquier error grave' (ej. violar clave foránea)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Si en un cursor llegamos al final de los datos y no quedan filas, MySQL lanza un estado. ¿Qué Handler atraparía este suceso lógico?", r: ["Un Handler para NOT FOUND", "Un Handler para SQLEXCEPTION", "Un Handler para MYSQL_END", "Un Handler para ROW_ZERO"], c: "Un Handler para NOT FOUND", e: "NOT FOUND es la abreviatura para la clase de códigos SQLSTATE que empiezan por '02'." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Qué es exactamente un Trigger (Disparador)?", r: ["Es un programa almacenado que se invoca de forma AUTOMÁTICA en respuesta a un evento (Insert, Update, Delete) en su tabla", "Es un usuario que programa bases de datos a distancia", "Es una consulta SELECT que tarda más de 5 segundos en ejecutarse", "Es el botón de inicio del servidor"], c: "Es un programa almacenado que se invoca de forma AUTOMÁTICA en respuesta a un evento (Insert, Update, Delete) en su tabla", e: "Se quedan 'vigilando' permanentemente como centinelas invisibles de los datos." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Cuál es una ventaja de utilizar Triggers?", r: ["Son muy útiles para crear tablas de auditoría (logs) de los cambios de datos en otras tablas", "Aumentan enormemente la velocidad del servidor al borrar cosas", "Sustituyen completamente a las claves foráneas", "Se comunican directamente por correo electrónico con el usuario"], c: "Son muy útiles para crear tablas de auditoría (logs) de los cambios de datos en otras tablas", e: "Si alguien cambia un sueldo, el trigger puede guardar quién lo hizo, cuándo, y el sueldo anterior en una tabla paralela." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Cuál es una desventaja notable del uso de Triggers?", r: ["Pueden ser difíciles de solucionar porque se ejecutan silenciosamente y aumentan la sobrecarga del servidor MySQL", "Son muy fáciles de hackear desde internet", "Solo funcionan si el administrador está conectado", "Ocupan demasiada memoria en discos duros locales"], c: "Pueden ser difíciles de solucionar porque se ejecutan silenciosamente y aumentan la sobrecarga del servidor MySQL", e: "Si no los documentas, pueden cambiar datos 'como por arte de magia' volviendo loco al programador de la app." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Qué dos 'Momentos' (Cuándo) definen la ejecución de un Trigger respecto al comando que lo lanza?", r: ["BEFORE (Antes) y AFTER (Después)", "START y END", "FIRST y LAST", "PRE_EXECUTE y POST_EXECUTE"], c: "BEFORE (Antes) y AFTER (Después)", e: "Un BEFORE trigger puede corregir un dato antes de que se grabe; un AFTER reacciona al dato ya grabado." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "En la definición obligatoria de un Trigger en MySQL se añade la cláusula FOR EACH ROW. ¿Qué significa?", r: ["Que el código del trigger se va a ejecutar tantas veces como registros (filas) se vean afectados por la instrucción", "Que el trigger borrará cada fila de la tabla", "Que creará una fila nueva pase lo que pase", "Que solo se ejecuta para la primera fila afectada"], c: "Que el código del trigger se va a ejecutar tantas veces como registros (filas) se vean afectados por la instrucción", e: "MySQL solo admite disparadores a nivel de fila (Row level triggers), no a nivel de instrucción global." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Dentro del código de un trigger, para acceder al 'Valor NUEVO' que se va a guardar en una columna, se utiliza el modificador:", r: ["NEW.nombre_columna", "OLD.nombre_columna", "CURRENT.nombre_columna", "SET.nombre_columna"], c: "NEW.nombre_columna", e: "NEW representa el dato entrante desde la sentencia SQL del usuario." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Dentro del código de un trigger, para acceder al 'Valor ANTIGUO' que había en la tabla antes del cambio, usamos:", r: ["OLD.nombre_columna", "NEW.nombre_columna", "PREVIOUS.nombre_columna", "LAST.nombre_columna"], c: "OLD.nombre_columna", e: "OLD representa el dato histórico que está a punto de ser sobrescrito o borrado." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Si programamos un Trigger para el evento INSERT (crear una fila nueva), ¿qué modificador está disponible?", r: ["Solo NEW está disponible (OLD no tiene sentido porque antes no había nada)", "Solo OLD", "Tanto NEW como OLD", "Ninguno, solo en UPDATE se pueden usar"], c: "Solo NEW está disponible (OLD no tiene sentido porque antes no había nada)", e: "Al ser una inserción desde cero, el valor viejo (OLD) no existe." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Si programamos un Trigger para el evento DELETE (borrar una fila), ¿qué modificador está disponible?", r: ["Solo OLD está disponible (NEW no existe porque no entra ningún dato nuevo, solo se borra el que estaba)", "Solo NEW", "Ambos", "Ninguno de los dos"], c: "Solo OLD está disponible (NEW no existe porque no entra ningún dato nuevo, solo se borra el que estaba)", e: "Puedes usar OLD para enviar el registro a una tabla de 'papelera de reciclaje' o 'log de borrados'." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Si programamos un Trigger para el evento UPDATE (modificar un registro existente), ¿qué modificadores podemos usar?", r: ["Tanto NEW como OLD están disponibles", "Solo NEW", "Solo OLD", "No se permiten triggers para UPDATE"], c: "Tanto NEW como OLD están disponibles", e: "Es el único donde coexisten: OLD tiene el dato previo al cambio y NEW el nuevo dato a grabar." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Cómo es el esqueleto inicial (sintaxis) para crear un trigger?", r: ["CREATE TRIGGER nombre_trigger {BEFORE|AFTER} {INSERT|UPDATE|DELETE} ON nombre_tabla FOR EACH ROW BEGIN ... END;", "NEW TRIGGER nombre DO EVENT ON tabla BEGIN ... END;", "ADD TRIGGER TO tabla WHEN evento RUN ...", "ALTER TABLE tabla ADD TRIGGER nombre;"], c: "CREATE TRIGGER nombre_trigger {BEFORE|AFTER} {INSERT|UPDATE|DELETE} ON nombre_tabla FOR EACH ROW BEGIN ... END;", e: "Define exactamente su nombre, su momento temporal, su evento asociado y su tabla objetivo." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Podemos crear un trigger en MySQL que reaccione a sentencias de lectura (SELECT)?", r: ["No, los triggers solo se asocian a operaciones que modifiquen datos (INSERT, UPDATE, DELETE)", "Sí, usando el evento AFTER SELECT", "Sí, pero solo para administradores", "No, los triggers solo valen para crear tablas"], c: "No, los triggers solo se asocian a operaciones que modifiquen datos (INSERT, UPDATE, DELETE)", e: "Un trigger (disparador) reacciona a los cambios en el estado de la base de datos (eventos DML)." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Qué indica la sigla SQLWARNING en el bloque DECLARE ... HANDLER?", r: ["Es una abreviatura para atrapar códigos SQLSTATE que empiezan por '01' (Advertencias no fatales)", "Indica que se debe mandar un correo al administrador", "Significa que la base de datos está a punto de corromperse", "Sirve para apagar el servidor de forma segura"], c: "Es una abreviatura para atrapar códigos SQLSTATE que empiezan por '01' (Advertencias no fatales)", e: "Permite gestionar sucesos que no bloquean la rutina pero que deben registrarse o vigilarse." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "Si en vez de una abreviatura (como SQLEXCEPTION), quiero atrapar un error concreto de MySQL en el HANDLER, ¿qué uso?", r: ["El 'mysql_error_code', un número entero que indica un código específico de error (ej: 1051 para Tabla desconocida)", "El nombre de la tabla que falla", "La instrucción ERROR_CATCH(numero)", "El DNI del usuario"], c: "El 'mysql_error_code', un número entero que indica un código específico de error (ej: 1051 para Tabla desconocida)", e: "Declaras el handler asociándolo al número matemático exacto del error devuelto por el motor." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Pueden los triggers aportar validaciones en una base de datos?", r: ["Sí, proporcionan otra forma de comprobar la integridad (validaciones extendidas o complejas que CHECK no soporta)", "No, para validaciones se usan exclusivamente las vistas", "Sí, pero borran todo el contenido de la tabla si detectan un error", "No, solo los procedimientos pueden hacerlo"], c: "Sí, proporcionan otra forma de comprobar la integridad (validaciones extendidas o complejas que CHECK no soporta)", e: "Para validaciones simples es mejor usar NOT NULL o UNIQUE, reservando el trigger para cálculos cruzados." },
        { m: "Gestión de BD", t: "Gestión de usuarios - Errores y Triggers", u: "Cuestionario", p: "¿Se requiere algún permiso especial en el sistema para ejecutar o invocar un Trigger?", r: ["No manualmente, porque un trigger se ejecuta AUTOMÁTICAMENTE cuando un usuario hace INSERT/UPDATE/DELETE y tiene permisos para ello en la tabla.", "Sí, el usuario necesita GRANT EXECUTE ON TRIGGER.", "Sí, un trigger solo puede ser disparado por el root.", "No, porque los triggers están siempre apagados por defecto."], c: "No manualmente, porque un trigger se ejecuta AUTOMÁTICAmente cuando un usuario hace INSERT/UPDATE/DELETE y tiene permisos para ello en la tabla.", e: "Los triggers no se llaman con 'CALL', operan a la sombra de la instrucción principal del usuario." },

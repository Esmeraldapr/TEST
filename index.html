        // TEMA 1: Ciberseguridad - Ubicación y DRP (10 Preguntas)
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿A qué nivel de la infraestructura se debe aplicar la seguridad física en una empresa?", r: ["Tanto a un solo bastidor (rack) como a un edificio completo", "Exclusivamente al perímetro exterior del edificio", "Solo a los ordenadores de los empleados", "Únicamente a la nube y entornos virtuales"], c: "Tanto a un solo bastidor (rack) como a un edificio completo", e: "La seguridad física se aplica a toda escala; en ambos casos se considera el Centro de Proceso de Datos de la empresa. [cite: 5736, 5737]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "A la hora de elegir la ubicación geográfica de un CPD, se debe procurar que esté...", r: ["Lejos de riesgos naturales o industriales", "En el centro neurálgico de las grandes ciudades", "Junto a plantas químicas para aprovechar la energía", "En sótanos profundos para evitar el calor"], c: "Lejos de riesgos naturales o industriales", e: "Es una de las premisas básicas para evitar desastres externos que afecten al funcionamiento. [cite: 5739]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿En qué altura de un edificio es preferible situar el CPD?", r: ["Preferentemente en la primera planta para evitar inundaciones", "En el sótano para mejor refrigeración", "En la azotea para facilitar la ventilación externa", "En la planta baja a pie de calle"], c: "Preferentemente en la primera planta para evitar inundaciones", e: "El sótano y la planta baja son muy vulnerables a inundaciones, y la primera planta permite mejor control. [cite: 5740]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿Por qué se recomienda la agrupación de los servidores en el diseño del CPD?", r: ["Para optimizar costos y recursos", "Para que los cables sean más largos", "Para reducir la velocidad de la red", "Para evitar que el personal entre al CPD"], c: "Para optimizar costos y recursos", e: "Tenerlos agrupados permite concentrar la refrigeración, la energía y la seguridad en un punto óptimo. [cite: 5740]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿Qué requisito constructivo fundamental facilita el paso de cables y la circulación del aire de refrigeración en el CPD?", r: ["El uso de falso suelo y falso techo", "La instalación de ventanas de cristal doble", "El uso de paredes de plomo", "La pintura reflectante en las paredes"], c: "El uso de falso suelo y falso techo", e: "El falso suelo permite el flujo de aire frío y la organización oculta de todo el cableado eléctrico y de red. [cite: 5742, 5743]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿Qué materiales son los exigidos para la construcción del 'cofre' o sala principal que alberga los servidores?", r: ["Materiales ignífugos y hormigón de alta seguridad", "Paneles de madera recubiertos de plástico", "Cristal templado y acero inoxidable ligero", "Tabiques de yeso y aislamiento de espuma"], c: "Materiales ignífugos y hormigón de alta seguridad", e: "El cofre debe actuar como una caja fuerte resistente al fuego y a ataques físicos. [cite: 5744, 5745]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿Qué significan las siglas DRP en el ámbito de la continuidad de negocio?", r: ["Plan de Recuperación de Desastres (Disaster Recovery Plan)", "Protocolo de Redirección de Datos", "Política de Riesgos Físicos", "Procedimiento de Replicación de Puertos"], c: "Plan de Recuperación de Desastres (Disaster Recovery Plan)", e: "Un DRP vigente y probado es la diferencia entre horas y días de inactividad ante un incidente grave. [cite: 5763, 5771, 5772]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿Qué información crítica sobre los equipos debe estar incluida en el documento del DRP?", r: ["Inventario de hardware con modelos exactos, versiones de software y configuraciones de red", "Los nombres de los fabricantes de los cables", "Las contraseñas de los usuarios de nivel bajo", "El precio de compra de los servidores"], c: "Inventario de hardware con modelos exactos, versiones de software y configuraciones de red", e: "Sin los modelos y versiones exactas, es imposible restaurar un entorno idéntico tras un desastre. [cite: 5770]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿Cuándo es obligatorio actualizar la documentación del Plan de Recuperación de Desastres (DRP)?", r: ["Tras cada cambio significativo en el CPD", "Únicamente una vez al año", "Solo cuando ocurre un desastre", "Cuando se contrata a un nuevo empleado"], c: "Tras cada cambio significativo en el CPD", e: "Un DRP desactualizado no servirá de nada si la infraestructura ha cambiado. [cite: 5769]" },
        { m: "Ciberseguridad", t: "Tema 1 - Ubicación y DRP", u: "Cuestionario", p: "¿Cuáles son las tres fases conceptuales del Plan de Recuperación de Desastres (DRP)?", r: ["Documentación, Respuesta y Restauración", "Prevención, Mitigación y Análisis", "Apagado, Traslado y Encendido", "Detección, Aislamiento y Borrado"], c: "Documentación, Respuesta y Restauración", e: "Primero se documenta el plan, ante un incidente se aplica la respuesta, y finalmente se procede a la restauración de los servicios. [cite: 5764, 5766, 5767]" },

        // TEMA 1: Ciberseguridad - Accesos y Climatización (10 Preguntas)
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "¿Cuáles son los tres pilares recomendados para el control de acceso físico de personal autorizado?", r: ["Contraseñas, tarjetas y biometría", "Llaves maestras, candados y vigilantes", "DNI, pasaporte y firma digital", "Bluetooth, Wi-Fi y NFC"], c: "Contraseñas, tarjetas y biometría", e: "Combinar factores como algo que sabes (contraseña), algo que tienes (tarjeta) y algo que eres (biometría). [cite: 5751]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "¿Qué sistemas de vigilancia pasiva y activa complementan el control de acceso en puertas?", r: ["CCTV (cámaras), sensores de presencia y alarmas", "Drones y robots patrulla", "Lectores de código de barras", "Sistemas de detección térmica de incendios"], c: "CCTV (cámaras), sensores de presencia y alarmas", e: "El Circuito Cerrado de Televisión junto a sensores garantizan un registro visual de todo acceso o intrusión. [cite: 5752]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "¿Cuál es el rango de temperatura ambiental óptimo que debe mantenerse dentro del CPD?", r: ["Entre 18 y 24 °C", "Entre 10 y 15 °C", "Entre 25 y 30 °C", "A exactamente 0 °C"], c: "Entre 18 y 24 °C", e: "Mantener este rango evita el sobrecalentamiento sin incurrir en un gasto energético de refrigeración innecesario. [cite: 5754]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "¿Qué técnica de diseño se emplea en la colocación de los racks para mejorar la eficiencia del aire acondicionado?", r: ["Creación de pasillos fríos y calientes", "Colocación circular de los servidores", "Instalación de ventiladores de techo gigantes", "Uso de refrigeración líquida directa en todos los nodos"], c: "Creación de pasillos fríos y calientes", e: "Las tomas de aire aíslan el aire frío que entra a los servidores del aire caliente que expulsan por su parte trasera. [cite: 5754, 5756]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "¿Cuál es la humedad relativa (HR) adecuada que debe mantenerse en la sala de servidores?", r: ["Entre el 40% y el 60%", "Inferior al 20%", "Cercana al 90%", "Siempre al 100%"], c: "Entre el 40% y el 60%", e: "Mantener estos niveles es crucial tanto para la salud electrónica de los componentes como para evitar condensación. [cite: 5755]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "¿Por qué es tan importante no salir del rango de 40-60% de humedad en el CPD?", r: ["Para evitar la electricidad estática (si es baja) y la corrosión (si es alta)", "Para que el personal no pase calor", "Para evitar que los plásticos se derritan", "Para que los sistemas antiincendios funcionen"], c: "Para evitar la electricidad estática (si es baja) y la corrosión (si es alta)", e: "Un ambiente demasiado seco genera descargas estáticas que funden chips; muy húmedo oxida los contactos. [cite: 5755]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "En los sistemas de ventilación del CPD, ¿qué tipo de filtros se usan para el control exhaustivo del polvo?", r: ["Filtros HEPA", "Filtros de carbono activo", "Filtros de agua", "Filtros magnéticos"], c: "Filtros HEPA", e: "Atrapan partículas microscópicas de polvo que, de acumularse, provocarían cortocircuitos o fallos de ventilación. [cite: 5755]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "Para garantizar el suministro eléctrico a nivel macroestructural, ¿qué medida de redundancia se aconseja?", r: ["Contratos con diversas compañías eléctricas y sistemas eléctricos independientes", "Tener un solo generador diésel enorme", "Instalar paneles solares en el rack", "Apagar los servidores durante la noche"], c: "Contratos con diversas compañías eléctricas y sistemas eléctricos independientes", e: "Si cae la subestación de una compañía, el CPD se sigue alimentando de una red física independiente. [cite: 5758]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "¿Cuál es la finalidad de instalar un candado en las carcasas de los equipos físicos?", r: ["Evitar que se abran las carcasas en zonas que carecen de un control de acceso sofisticado", "Prevenir que el servidor se caiga del rack", "Bloquear el acceso a la red Wi-Fi", "Cumplir con un requisito estético"], c: "Evitar que se abran las carcasas en zonas que carecen de un control de acceso sofisticado", e: "Es la medida de seguridad física más básica para evitar el robo de discos duros o memoria RAM. [cite: 5759]" },
        { m: "Ciberseguridad", t: "Tema 1 - Accesos y Climatización", u: "Cuestionario", p: "¿Puede utilizarse el Documento Nacional de Identidad electrónico (DNIe) para el control en el CPD?", r: ["Sí, puede usarse como tarjeta de acceso física, aunque es más común en entornos digitales de la administración", "No, está terminantemente prohibido por la LOPD", "Solo sirve para autenticarse en servidores Linux", "Sí, pero requiere introducir el PIN cada 5 minutos"], c: "Sí, puede usarse como tarjeta de acceso física, aunque es más común en entornos digitales de la administración", e: "El chip del DNIe incluye certificados y tecnología RFID utilizable en tornos compatibles. [cite: 5760]" },

        // TEMA 1: Ciberseguridad - SAI y Mantenimiento (10 Preguntas)
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "¿Qué significan las siglas SAI / UPS?", r: ["Sistema de Alimentación Ininterrumpida / Uninterruptible Power Supply", "Sistema Aislado de Informática / Universal Power System", "Servidor de Almacenamiento Interno / Unified Port Security", "Señal de Alerta de Intrusos / Urgent Power Switch"], c: "Sistema de Alimentación Ininterrumpida / Uninterruptible Power Supply", e: "Es el equipo de baterías que garantiza el flujo de corriente ante un apagón. [cite: 5774, 5775, 5777, 5778]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "En caso de corte de luz general, el SAI debe proporcionar un tiempo mínimo de batería de...", r: ["Diez minutos", "Una hora", "Veinticuatro horas", "Un minuto"], c: "Diez minutos", e: "Esos 10 minutos son vitales para realizar una parada ordenada del software o arrancar los motores de los grupos electrógenos. [cite: 5780]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "¿Qué característica define al SAI Offline?", r: ["Alimenta los equipos directamente desde la red y, al fallar, conmuta a la batería en milisegundos", "Alimenta siempre desde la batería ininterrumpidamente", "Solo funciona si se activa manualmente", "Depende de un generador de gasolina directo"], c: "Alimenta los equipos directamente desde la red y, al fallar, conmuta a la batería en milisegundos", e: "Es la solución más económica pero la conmutación provoca una pequeñísima alteración en la señal eléctrica. [cite: 5784, 5785]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "¿Qué tipo de SAI elimina por completo el tiempo de transferencia ya que alimenta siempre desde la batería?", r: ["SAI Online", "SAI Offline", "SAI Inline", "SAI de Respaldo"], c: "SAI Online", e: "La corriente entra, carga la batería y sale de la batería al servidor; si se va la luz, no hay 'salto' ni corte. [cite: 5791, 5793]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "¿Cuál es la principal desventaja de implementar un sistema SAI Online en un CPD?", r: ["Supone un mayor coste de adquisición y un alto consumo energético continuo", "Protege muy mal contra picos de tensión", "Tarda varios segundos en activarse", "No se puede monitorizar por software"], c: "Supone un mayor coste de adquisición y un alto consumo energético continuo", e: "El doble proceso continuo de rectificación e inversión genera mucho calor y pérdida de eficiencia eléctrica. [cite: 5794]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "¿Qué característica tiene la tensión de salida eléctrica en los SAI Inline y Online?", r: ["La tensión de salida es independiente de la calidad de la red eléctrica externa", "Sufren de bajadas de tensión si la red externa fluctúa", "La tensión es de corriente continua (DC) en lugar de alterna", "No pueden filtrar la señal eléctrica"], c: "La tensión de salida es independiente de la calidad de la red eléctrica externa", e: "Ambos sistemas corrigen, filtran y estabilizan la onda eléctrica que llega a los servidores. [cite: 5790, 5795]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "¿Qué advierte la documentación sobre el estado físico de las baterías del SAI?", r: ["Que se degradan con el tiempo, por lo que son imprescindibles las pruebas periódicas y su reemplazo", "Que son eternas y nunca hay que cambiarlas", "Que deben recargarse con agua destilada cada semana", "Que si no se usan, pueden llegar a explotar"], c: "Que se degradan con el tiempo, por lo que son imprescindibles las pruebas periódicas y su reemplazo", e: "Una batería degradada podría no soportar la carga cuando ocurre el apagón real. Deben ser cambiadas por personal especializado. [cite: 5820]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "¿Qué ventaja ofrecen los sistemas SAI de arquitectura 'Modular'?", r: ["Permiten realizar mantenimiento sin interrupciones significativas y facilitan la escalabilidad futura", "Son mucho más baratos que los SAI normales", "Ocupan la mitad de espacio físico", "No requieren baterías para funcionar"], c: "Permiten realizar mantenimiento sin interrupciones significativas y facilitan la escalabilidad futura", e: "Se pueden añadir o retirar módulos de baterías en 'caliente' (Hot-Swap) sin apagar los servidores. [cite: 5821]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "Mediante el software de monitorización del SAI, si se produce un apagón prolongado y la batería llega al nivel crítico, ¿qué acción o trigger se ejecuta?", r: ["La ejecución automática de comandos para iniciar una parada (apagado) ordenada de los servidores", "El encendido de las alarmas antiincendios del edificio", "Un bloqueo de las puertas del cofre del CPD", "Un formateo automático por seguridad"], c: "La ejecución automática de comandos para iniciar una parada (apagado) ordenada de los servidores", e: "El software envía una señal a los sistemas operativos para que cierren bases de datos y se apaguen sin corromper la información. [cite: 5816, 5818]" },
        { m: "Ciberseguridad", t: "Tema 1 - SAI y Mantenimiento", u: "Cuestionario", p: "¿Qué es el mecanismo de 'By-Pass' en el esquema de un SAI?", r: ["Un circuito que puentea la batería y alimenta los equipos directamente de la red para tareas de mantenimiento del SAI", "Un filtro que elimina el ruido eléctrico", "El cargador rápido de baterías", "Un sistema de alarma sonora"], c: "Un circuito que puentea la batería y alimenta los equipos directamente de la red para tareas de mantenimiento del SAI", e: "Permite reparar o cambiar el ondulador/rectificador del SAI sin tener que apagar los equipos conectados. [cite: 5809]" },

        // TEMA 1: Ciberseguridad - Seguridad Lógica y Biometría (10 Preguntas)
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "En el control de acceso lógico (ACL), ¿qué dicta el principio del 'Menor privilegio'?", r: ["Cada usuario accede única y exclusivamente a los datos y sistemas necesarios para realizar su trabajo", "Los usuarios nuevos no tienen contraseñas", "Los administradores tienen menos permisos que los dueños", "Solo se puede acceder a la red desde ordenadores fijos"], c: "Cada usuario accede única y exclusivamente a los datos y sistemas necesarios para realizar su trabajo", e: "Limita enormemente el impacto si la cuenta de un empleado normal es hackeada. [cite: 5825]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "¿A qué se refiere la regla de 'Denegación por defecto' en las políticas de seguridad?", r: ["Todo recurso o acción que no esté expresamente permitido, queda automáticamente bloqueado", "El servidor denegará todas las conexiones a medianoche", "Los usuarios están bloqueados al crear la cuenta", "Los puertos de red están abiertos hasta que alguien los cierre"], c: "Todo recurso o acción que no esté expresamente permitido, queda automáticamente bloqueado", e: "Es la aproximación más segura: se cierra todo, y se van abriendo puertas solo a quien lo necesita. [cite: 5825]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "La regla de 'Separación de funciones' se implementa principalmente para...", r: ["Evitar conflictos de interés y fraudes internos al requerir varias personas para tareas críticas", "Hacer que el trabajo sea más rápido", "Poder despedir empleados sin que el sistema falle", "Reducir la carga de la CPU del servidor"], c: "Evitar conflictos de interés y fraudes internos al requerir varias personas para tareas críticas", e: "Por ejemplo: el programador que hace el código no debe tener permisos para pasarlo a Producción él mismo. [cite: 5826]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "En una política robusta de contraseñas, ¿qué dos parámetros estructurales son obligatorios?", r: ["La complejidad (uso de mayúsculas, símbolos, números) y una longitud mínima", "Que sea fácil de recordar y que incluya el nombre de la empresa", "Que empiece por un número y no contenga letras", "Que tenga menos de 8 caracteres para agilizar el login"], c: "La complejidad (uso de mayúsculas, símbolos, números) y una longitud mínima", e: "Impide que los ataques de fuerza bruta o de diccionario descubran las contraseñas rápidamente. [cite: 5828]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "Para evitar ataques de fuerza bruta online, la política de contraseñas debe incluir...", r: ["El bloqueo temporal o permanente de la cuenta tras varios intentos de login fallidos", "Permitir que el usuario pruebe tantas contraseñas como quiera", "Desactivar las contraseñas los fines de semana", "Mostrar la pista de la contraseña al tercer fallo"], c: "El bloqueo temporal o permanente de la cuenta tras varios intentos de login fallidos", e: "Si un hacker prueba un diccionario entero, al 3er o 5º fallo la cuenta se cierra. [cite: 5829]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "¿Qué significan las siglas MFA en seguridad de accesos lógicos?", r: ["Autenticación Multifactor (Multi-Factor Authentication)", "Acceso Rápido a Memoria (Memory Fast Access)", "Marco Federal de Auditoría", "Administración de Ficheros Maestros"], c: "Autenticación Multifactor (Multi-Factor Authentication)", e: "Requiere combinar una clave (algo que sabes) con un código SMS, App o biometría (algo que tienes/eres). [cite: 5830, 5856]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "¿Qué dos importantes marcos normativos (legal y estándar de calidad) rigen la seguridad y la privacidad de la información en España/Europa?", r: ["La LOPD (Protección de Datos) y la ISO 27001 (Sistemas de Gestión de Seguridad de la Información)", "La ISO 9001 y el Reglamento General de Vehículos", "El BOE y la Norma IEEE 802", "La GDPR y el Código Penal exclusivo"], c: "La LOPD (Protección de Datos) y la ISO 27001 (Sistemas de Gestión de Seguridad de la Información)", e: "El cumplimiento de estas normas dicta cómo debe defenderse y encriptarse el CPD. [cite: 5831, 5864]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "¿Qué ventaja fundamental tienen los sistemas Biométricos frente al uso de tarjetas identificativas?", r: ["Son intransferibles: es imposible prestar o compartir tu huella o retina con otro empleado, eliminando la suplantación de identidad", "Son mucho más económicos de instalar que un lector de tarjetas de plástico", "Permiten el acceso desde cualquier lugar del mundo por internet", "Nunca fallan y no requieren mantenimiento"], c: "Son intransferibles: es imposible prestar o compartir tu huella o retina con otro empleado, eliminando la suplantación de identidad", e: "Una tarjeta se puede perder o prestar a un compañero, tu cuerpo no. [cite: 5852, 5854]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "¿Qué tres características corporales se citan como ejemplos clásicos de autenticación biométrica en el CPD?", r: ["Huella dactilar, escáner de retina y reconocimiento facial", "Análisis de ADN, grupo sanguíneo y peso", "Temperatura corporal, ritmo cardíaco y voz", "Iris, saliva y geometría de la mano"], c: "Huella dactilar, escáner de retina y reconocimiento facial", e: "Son patrones biológicos únicos para cada individuo que la tecnología actual lee de forma rápida. [cite: 5853]" },
        { m: "Ciberseguridad", t: "Tema 1 - Seguridad Lógica y Biometría", u: "Cuestionario", p: "En la conclusión del documento se afirma que la seguridad total no existe. Por tanto, ¿cuál debe considerarse como la 'primera línea' de defensa en la estrategia?", r: ["La seguridad física (ubicación estratégica, construcción robusta y control de accesos por capas)", "Tener un buen programa antivirus instalado en los PC", "Guardar los datos en una nube extranjera", "Desconectar la base de datos de internet"], c: "La seguridad física (ubicación estratégica, construcción robusta y control de accesos por capas)", e: "De nada sirve la mejor ciberseguridad lógica si cualquiera puede entrar caminando y robar el servidor físicamente. [cite: 5861, 5862, 5863]" },

{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 2: Programación, Backups y Opt.", p: "¿Cuál de las siguientes afirmaciones sobre la optimización de bases de datos en MariaDB es correcta?", r: ["No es necesario preocuparse por la cantidad de índices que se crean, ya que siempre mejoran el rendimiento de las consultas.", "La optimización de consultas implica que se evita extraer datos innecesarios y crear índices sobre los campos menos consultados.", "La caché de consultas almacena consultas incluso si son parte de subconsultas, procedimientos almacenados o eventos.", "Las claves primarias deben ser lo más grandes posible para permitir una búsqueda más rápida."], c: "La optimización de consultas implica que se evita extraer datos innecesarios y crear índices sobre los campos menos consultados.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 2: Programación, Backups y Opt.", p: "¿Qué comando se utiliza para generar una suma de verificación de una tabla en MySQL?", r: ["RESUME TABLE.", "CHECKSUM TABLE.", "ANALYZE TABLE.", "CHECK TABLE."], c: "CHECKSUM TABLE.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 2: Programación, Backups y Opt.", p: "¿Qué es un procedimiento almacenado?", r: ["Un objeto de la base de datos que contiene instrucciones SQL predefinidas.", "Una tabla virtual que representa el resultado de una consulta.", "Una vista para consultar todos los índices de tabla.", "Una estructura de control de flujo para recorrer registros en una consulta."], c: "Un objeto de la base de datos que contiene instrucciones SQL predefinidas.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 2: Programación, Backups y Opt.", p: "¿Cuál de las siguientes opciones describe una función del monitor de rendimiento en MariaDB?", r: ["Crear y borrar bases de datos.", "Supervisar lo que están haciendo los clientes de MariaDB.", "Obtener estadísticas de uso y variables del servidor MariaDB."], c: "Obtener estadísticas de uso y variables del servidor MariaDB.", e: "Opción correcta según el temario." },

// BLOQUE 3: ARQUITECTURA CLOUD (AWS Y AZURE)
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de las siguientes afirmaciones es correcta?", r: ["El almacenamiento de archivos se comparte entre instancias conectado por red de forma equivalente a un NAS.", "El almacenamiento de objetos replica virtualmente la estructura exacta y el comportamiento de un disco físico.", "El almacenamiento de bloques permite compartir discos entre instancias mediante protocolos NFS o SMB.", "El almacenamiento de objetos es equivalente a los discos SAN conectados por red de un centro de datos."], c: "El almacenamiento de archivos se comparte entre instancias conectado por red de forma equivalente a un NAS.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de los siguientes es uno de los principales retos del administrador de bases de datos en la nube?", r: ["Automatizar tareas de alto nivel.", "Mantener acceso directo a sistemas operativos.", "Coordinar recursos con desarrolladores de aplicaciones.", "Actualizar la caché de la RAM."], c: "Automatizar tareas de alto nivel.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de las siguientes afirmaciones respecto a la optimización de costes en despliegue de instancias es correcta?", r: ["Normalmente se usan instancias reservadas o planes de ahorro en combinación con instancias en spot para procesos interrumpibles u opcionales.", "Las instancias reservadas tienen un precio mucho más económico, que se fija como una subasta bursátil, indicando cuánto se está dispuesto a pagar.", "Las instancias en spot están indicadas para funcionar como una base continuada durante meses o años, lo que permite obtener un gran descuento.", "Los planes de ahorro implican el compromiso de tener un número de instancias funcionando de manera continua durante meses o años."], c: "Normalmente se usan instancias reservadas o planes de ahorro en combinación con instancias en spot para procesos interrumpibles u opcionales.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cómo se ordenarían los servicios de computación de AWS de más a menos administrados?", r: ["Fargate, Lambda, ECS/EKS, Lightsail, EC2 y Beanstalk.", "Fargate, Lambda, Beanstalk, ECS/EKS, Lightsail y EC2.", "EC2, Lightsail, ECS/EKS, Beanstalk, Lambda y Fargate.", "ECS/EKS, Lambda, EC2, Beanstalk, Fargate y Lightsail."], c: "Fargate, Lambda, Beanstalk, ECS/EKS, Lightsail y EC2.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de las siguientes afirmaciones respecto al servicio CloudWatch es incorrecta?", r: ["En Azure existen servicios equivalentes en Azure Monitor y distintas variantes de Insights.", "Las acciones complejas, tales como funciones Lambda, no están admitidas; habría que utilizar eventos de EventBridge.", "Se aplica solo a nivel de monitorización de instancias, tales como uso de CPU, throughput de red o rendimiento de discos.", "Se pueden establecer alarmas respecto a logs y métricas, así como por superación de costes."], c: "Se aplica solo a nivel de monitorización de instancias, tales como uso de CPU, throughput de red o rendimiento de discos.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de las siguientes afirmaciones acerca de las equivalencias de almacenamiento entre AWS y Azure es correcta?", r: ["Azure Files equivale a AWS EBS y Azure Blob equivale a AWS S3.", "Azure Disk Storage equivale a AWS EBS y Azure Files equivale a AWS S3.", "Azure Disk Storage equivale a AWS EBS y Azure Blob equivale a AWS S3.", "Todas las opciones son incorrectas."], c: "Azure Disk Storage equivale a AWS EBS y Azure Blob equivale a AWS S3.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de las siguientes afirmaciones es incorrecta?", r: ["El servicio Lambda permite ejecutar funciones sueltas en el entorno serverless.", "El servicio ECS de contenedores admite Docker y es más sencillo que EKS.", "El servicio Fargate implementa VPS al estilo de los antiguos proveedores de hosting.", "La escalabilidad del servicio AppService de Azure en serverless es inferior a la del servicio Lambda en AWS."], c: "El servicio Fargate implementa VPS al estilo de los antiguos proveedores de hosting.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de las siguientes afirmaciones respecto al servicio EC2 es correcta?", r: ["Se pueden importar máquinas físicas locales.", "Se utiliza virtualización nativa (HVM) y, como evolución, el sistema Nitro.", "Se utiliza, sobre todo, para virtualización, por su elevado rendimiento.", "En el caso de instancias Windows, se establecerá una contraseña por defecto al lanzarla."], c: "Se utiliza virtualización nativa (HVM) y, como evolución, el sistema Nitro.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Qué se debe hacer a la hora de lanzar una instancia en EC2?", r: ["El acceso se realiza mediante una pareja de claves: la pública, en la instancia, y la privada, en nuestro equipo local.", "Se define un grupo de seguridad con los puertos que son accesibles desde el exterior.", "Todas las opciones son correctas.", "Se le da una IP pública diferente cada vez que se reinicia, salvo que se use una IP elástica."], c: "Todas las opciones son correctas.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Qué herramientas se utilizan para gestionar la configuración en RDS?", r: ["Grupos de funciones y grupos de ajustes.", "Grupos de opciones y grupos de parámetros.", "Grupos de seguridad y grupos de configuración."], c: "Grupos de opciones y grupos de parámetros.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de las siguientes afirmaciones respecto a las AMI es incorrecta?", r: ["Se puede importar una máquina virtual local utilizando user-data.", "Se pueden obtener del inicio rápido, del MarketPlace o de la comunidad de usuarios.", "Una AMI solo se puede usar en una región y para un tipo de virtualización (HVM o PV).", "El ciclo de vida de una AMI se puede automatizar con EC2-Builder, incluyendo test de endurecimiento."], c: "Se puede importar una máquina virtual local utilizando user-data.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Qué es AWS Athena y cuál es su principal ventaja?", r: ["Es un servicio de visualización de datos en la nube.", "Es un servicio de streaming que procesa datos en tiempo real.", "Es un servicio de base de datos serverless que trabaja directamente sobre un data lake en S3, facilitando consultas SQL sin necesidad de importaciones previas.", "Es un data warehouse diseñado para grandes volúmenes de datos en bruto."], c: "Es un servicio de base de datos serverless que trabaja directamente sobre un data lake en S3, facilitando consultas SQL sin necesidad de importaciones previas.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál es el objetivo principal del uso de crawlers en AWS Glue?", r: ["Ejecutar consultas SQL.", "Detectar y catalogar datos.", "Limpiar y normalizar datos."], c: "Detectar y catalogar datos.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Qué es un data lake?", r: ["Un almacén de datos con tipos de datos definidos y procesos de transformación predefinidos.", "Ninguna de las opciones es correcta.", "Un almacén de datos en bruto, orientado a la ingestión rápida y accesible por clientes estándar y APIs.", "Un almacén de datos altamente estructurado y optimizado para análisis."], c: "Un almacén de datos en bruto, orientado a la ingestión rápida y accesible por clientes estándar y APIs.", e: "Opción correcta según el temario." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Bloque 3: Arquitectura Cloud", p: "¿Cuál de las siguientes afirmaciones es incorrecta?", r: ["En S3, cualquier pequeño cambio en un objeto supone actualizarlo al completo.", "Un volumen EBS puede estar encriptado, y se pueden hacer copias de seguridad de él (snapshots) en S3.", "Un volumen EFS es más caro que uno EBS, pero permite estar montado a la vez en varias instancias.", "Las clases de almacenamiento en S3 son SSD (propósito general o provisionado) y HDD (optimizado o frío)."], c: "Las clases de almacenamiento en S3 son SSD (propósito general o provisionado) y HDD (optimizado o frío).", e: "Opción correcta según el temario." },

// TEMA 4: DOCKER Y KUBERNETES
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué es Kubernetes (K8s)?", r: ["Un sistema open-source para la automatización del despliegue, escalado y gestión de aplicaciones en contenedores", "Una versión de pago de Docker", "Un sistema operativo para dispositivos móviles de Google", "Un lenguaje de bases de datos para reemplazar a SQL"], c: "Un sistema open-source para la automatización del despliegue, escalado y gestión de aplicaciones en contenedores", e: "Mientras Docker crea el contenedor, Kubernetes es el 'director de orquesta' que maneja miles de ellos simultáneamente." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué gigante tecnológico desarrolló originalmente el código de Kubernetes basándose en sus sistemas internos (Borg), antes de donarlo a la CNCF?", r: ["Google", "Microsoft", "Amazon", "Facebook"], c: "Google", e: "Google aportó años de experiencia ejecutando contenedores a escala masiva para crear K8s en 2014." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "En Kubernetes, ¿cuál es la unidad de despliegue atómica, más pequeña y básica que se puede crear y gestionar?", r: ["El Pod", "El Contenedor (Container)", "La Máquina Virtual (VM)", "El Nodo (Node)"], c: "El Pod", e: "K8s no administra contenedores directamente; administra Pods. Un Pod envuelve a uno (o varios) contenedores." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué contiene y cómo funciona típicamente un Pod en Kubernetes?", r: ["Uno o varios contenedores estrechamente acoplados que comparten recursos de almacenamiento, red (misma IP) y especificaciones", "Un clúster completo de servidores físicos", "Solo bases de datos relacionales", "Un panel de administración visual"], c: "Uno o varios contenedores estrechamente acoplados que comparten recursos de almacenamiento, red (misma IP) y especificaciones", e: "La inmensa mayoría de las veces un Pod tiene solo 1 contenedor principal de la aplicación." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "En la arquitectura de un clúster de Kubernetes, ¿qué es un 'Nodo' (Worker Node)?", r: ["Una máquina física o virtual de trabajo donde se ejecutan y residen los Pods", "El archivo de texto de configuración de la app", "Un balanceador de carga externo", "El cerebro que toma decisiones globales"], c: "Una máquina física o virtual de trabajo donde se ejecutan y residen los Pods", e: "Los Nodos son la fuerza bruta laboral del clúster; ofrecen CPU y RAM a las aplicaciones." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "Dentro del clúster de Kubernetes, ¿qué rol cumple el 'Control Plane' (Plano de Control)?", r: ["Toma las decisiones globales sobre el clúster (planificación, escalado, detección de fallos) y actúa como su cerebro", "Se encarga exclusivamente de ejecutar el código web del usuario final", "Es un almacenamiento de base de datos SQL relacional", "Es un antivirus"], c: "Toma las decisiones globales sobre el clúster (planificación, escalado, detección de fallos) y actúa como su cerebro", e: "El Control Plane ordena a los Nodos de trabajo lo que tienen que hacer." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué componente fundamental se ejecuta en cada Nodo de trabajo (Worker) y se asegura de que los contenedores estén corriendo dentro del Pod según lo ordenado?", r: ["El Kubelet", "El Kube-scheduler", "El etcd", "El Ingress Controller"], c: "El Kubelet", e: "El Kubelet es el 'agente' o 'capataz' de Kubernetes instalado en cada servidor. Habla con Docker/Containerd para levantar los contenedores." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Cómo se llama el almacén de datos clave-valor, altamente disponible, que el Control Plane de Kubernetes usa para guardar todo el estado y configuración del clúster?", r: ["etcd", "MongoDB", "MySQL Server", "Redis Cache"], c: "etcd", e: "etcd es la 'memoria' del clúster. Si se pierde, el clúster olvida qué aplicaciones deberían estar corriendo." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué herramienta de línea de comandos (CLI) se utiliza casi exclusivamente para comunicarse y administrar un clúster de Kubernetes?", r: ["kubectl", "kube-admin", "docker-cli", "cluster-control"], c: "kubectl", e: "Con comandos como 'kubectl get pods' o 'kubectl apply', el administrador domina el sistema." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué objeto de Kubernetes se usa para proporcionar una dirección IP estable y exponer el tráfico de red hacia un grupo de Pods efímeros?", r: ["Service (Servicio)", "Deployment", "Pod-Network", "Ingress"], c: "Service (Servicio)", e: "Como los Pods nacen y mueren constantemente cambiando de IP, el 'Service' actúa como un proxy o puerta de entrada estática hacia ellos." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "El concepto de 'Auto-Healing' de Kubernetes significa que si un Pod falla o el servidor físico se quema...", r: ["Kubernetes detecta que la aplicación ha caído e inicia un nuevo Pod en un Nodo sano para mantener el número de réplicas deseado", "El sistema se bloquea hasta que intervenga un técnico humano", "La aplicación simplemente deja de funcionar para siempre", "Se envían correos de error pero no se reinicia nada"], c: "Kubernetes detecta que la aplicación ha caído e inicia un nuevo Pod en un Nodo sano para mantener el número de réplicas deseado", e: "Es el bucle de control: Kubernetes compara el 'estado actual' con el 'estado deseado' y corrige automáticamente." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué es un 'Deployment' en Kubernetes?", r: ["Un objeto declarativo que gestiona cómo se deben desplegar, actualizar y escalar (número de réplicas) los Pods de una aplicación", "Una herramienta para apagar el clúster", "Una regla de cortafuegos de red", "Un volumen de almacenamiento en disco"], c: "Un objeto declarativo que gestiona cómo se deben desplegar, actualizar y escalar (número de réplicas) los Pods de una aplicación", e: "Normalmente en K8s no creas Pods a mano; creas un Deployment y este se encarga de fabricar los Pods necesarios." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué componente del Control Plane tiene la función de buscar Pods recién creados que no tienen un Nodo asignado y decidir en qué máquina encajan mejor?", r: ["El Kube-scheduler", "El Kubelet", "El Controller Manager", "El etcd"], c: "El Kube-scheduler", e: "Analiza CPU, RAM libre y reglas de afinidad para 'aparcar' los Pods en los servidores adecuados." },
{ m: "Gestión de BD", t: "Test por Unidades", u: "Tema 4: Docker y K8s", p: "¿Qué objeto de Kubernetes permite inyectar variables de entorno y archivos de configuración en los Pods sin tener que reconstruir la imagen Docker?", r: ["ConfigMap", "Secret", "Namespace", "Environment-Object"], c: "ConfigMap", e: "Permite separar el código fuente de la configuración (ej: la URL de la base de datos para entornos de Pruebas o Producción)." },

let currentQuestions = [];
    let answeredStatus = {};
    let startTime, timerInterval;
    let selectedSubject = "";
    let selectedCategory = "";
    let selectedTopicName = "";

    window.onload = function() {
        const container = document.getElementById('subjects-container');
        // 1er Nivel: Sacar las Materias (m)
        const subjects = [...new Set(misPreguntas.map(q => q.m))]; 
        
        const completedTests = JSON.parse(localStorage.getItem('completed_tests_v4') || '[]');

        subjects.forEach(subject => {
            // Contenedor principal de la MATERIA
            const subjectDiv = document.createElement('div');
            subjectDiv.className = 'subject-block';
            
            const title = document.createElement('h2');
            title.className = 'subject-title';
            title.innerHTML = `📘 ${subject}`;
            subjectDiv.appendChild(title);

            const subjectQuestions = misPreguntas.filter(q => q.m === subject);
            
            // 2º Nivel: Sacar los Bloques (t) de esta Materia
            const categories = [...new Set(subjectQuestions.map(q => q.t))]; 

            categories.forEach(category => {
                // Contenedor anidado para el BLOQUE
                const catDiv = document.createElement('div');
                catDiv.style.marginBottom = "25px";
                catDiv.style.padding = "20px";
                catDiv.style.background = "#eef2f5"; // Fondo gris clarito
                catDiv.style.borderRadius = "10px";
                catDiv.style.borderLeft = "5px solid var(--secondary)";

                const catTitle = document.createElement('h3');
                catTitle.style.color = "var(--primary)";
                catTitle.style.marginTop = "0";
                catTitle.style.marginBottom = "15px";
                catTitle.innerHTML = `📁 ${category}`;
                catDiv.appendChild(catTitle);

                const grid = document.createElement('div');
                grid.className = 'topics-grid';

                const categoryQuestions = subjectQuestions.filter(q => q.t === category);
                
                // 3er Nivel: Sacar los Temas (u) de este Bloque
                const topics = [...new Set(categoryQuestions.map(q => q.u))]; 

                topics.forEach(topic => {
                    const btn = document.createElement('button');
                    btn.className = 'topic-card';
                    
                    const testId = `${subject}-${category}-${topic}`;
                    if (completedTests.includes(testId)) {
                        btn.innerText = `${topic} ✅`;
                        btn.style.background = '#27ae60'; 
                    } else {
                        btn.innerText = topic;
                    }
                    
                    btn.onclick = () => startTest(subject, category, topic);
                    
                    // Clic derecho para desmarcar el tema
                    btn.oncontextmenu = (e) => {
                        e.preventDefault(); 
                        uncheckTest(testId);
                    };

                    grid.appendChild(btn);
                });

                // Botón de "Todo el Bloque"
                const btnAll = document.createElement('button');
                btnAll.className = 'topic-card topic-all';
                
                const allId = `${subject}-${category}-Todos`;
                if (completedTests.includes(allId)) {
                    btnAll.innerText = `Todo el bloque ✅`;
                    btnAll.style.background = '#27ae60';
                } else {
                    btnAll.innerText = `Todo el bloque`;
                }
                
                btnAll.onclick = () => startTest(subject, category, 'Todos');
                btnAll.oncontextmenu = (e) => {
                    e.preventDefault();
                    uncheckTest(allId);
                };

                grid.appendChild(btnAll);
                catDiv.appendChild(grid);
                subjectDiv.appendChild(catDiv);
            });

            container.appendChild(subjectDiv);
        });
    };

    function uncheckTest(testId) {
        if(confirm(`¿Quieres quitar el check de completado de este tema?`)) {
            let completed = JSON.parse(localStorage.getItem('completed_tests_v4') || '[]');
            completed = completed.filter(id => id !== testId);
            localStorage.setItem('completed_tests_v4', JSON.stringify(completed));
            location.reload();
        }
    }

    function startTest(subject, category, topic) {
        selectedSubject = subject;
        selectedCategory = category;
        selectedTopicName = topic;
        
        document.getElementById('display-topic').innerText = topic === 'Todos' ? `${subject} - ${category} (Global)` : `${subject} - ${category} - ${topic}`;

        if (topic === 'Todos') {
            currentQuestions = misPreguntas.filter(q => q.m === subject && q.t === category);
        } else {
            currentQuestions = misPreguntas.filter(q => q.m === subject && q.t === category && q.u === topic);
        }

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('test-section').style.display = 'block';
        
        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);
        
        shuffleArray(currentQuestions);
        renderAllQuestions();
    }

    function updateTimer() {
        const diff = Math.floor((new Date() - startTime) / 1000);
        document.getElementById('timer').innerText = `⏱️ ${Math.floor(diff / 60).toString().padStart(2, '0')}:${(diff % 60).toString().padStart(2, '0')}`;
    }

    function renderAllQuestions() {
        const container = document.getElementById('questions-list');
        container.innerHTML = '';
        answeredStatus = {};

        currentQuestions.forEach((q, index) => {
            let options = [...q.r];
            shuffleArray(options);
            
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const header = document.createElement('h3');
            header.className = 'question-header';
            // Ahora la cabecera muestra los 3 niveles: Materia | Bloque | Tema
            header.innerText = `${q.m} | ${q.t} | ${q.u}`;
            qBlock.appendChild(header);
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = `${index + 1}/${currentQuestions.length}. ${q.p}`;
            qBlock.appendChild(qText);
            
            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';
            optionsContainer.id = `options-${index}`;
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = function() {
                    checkAnswer(this, index, opt, q.c, q.e);
                };
                optionsContainer.appendChild(btn);
            });
            qBlock.appendChild(optionsContainer);
            
            const expl = document.createElement('div');
            expl.id = `explanation-${index}`;
            expl.className = 'explanation';
            qBlock.appendChild(expl);
            
            container.appendChild(qBlock);
        });
    }

    function checkAnswer(btn, index, selected, correct, info) {
        if (answeredStatus[index] !== undefined) return; 

        const optionsContainer = document.getElementById(`options-${index}`);
        const buttons = optionsContainer.querySelectorAll('.option-btn');
        
        buttons.forEach(b => b.disabled = true);

        if (selected === correct) { 
            btn.classList.add('correct'); 
            answeredStatus[index] = true; 
        } else { 
            btn.classList.add('wrong'); 
            answeredStatus[index] = false; 
            // Marcar la que era correcta en verde
            buttons.forEach(b => { 
                if(b.innerText === correct) b.classList.add('correct'); 
            }); 
        }

        // Mostrar aclaración si la hay (debajo de la pregunta)
        if (info && info.trim() !== "") { 
            const eb = document.getElementById(`explanation-${index}`); 
            eb.innerHTML = `<strong>💡 Aclaración:</strong> ${info}`; 
            eb.style.display = 'block'; 
        }
    }

    function finishTest() {
        const totalQuestions = currentQuestions.length;
        const totalAnswered = Object.keys(answeredStatus).length;
        
        if (totalAnswered < totalQuestions) {
            if (!confirm(`Has respondido ${totalAnswered} de ${totalQuestions} preguntas. ¿Seguro que quieres finalizar el test y calcular la nota?`)) {
                return;
            }
        }

        clearInterval(timerInterval);
        
        // Calcular aciertos y fallos para el Donut
        let correctCount = Object.values(answeredStatus).filter(v => v === true).length;
        let incorrectCount = totalQuestions - correctCount;
        let percentage = totalQuestions > 0 ? (correctCount / totalQuestions) * 100 : 0;

        document.getElementById('test-section').style.display = 'none';
        
        const successColor = getComputedStyle(document.documentElement).getPropertyValue('--success').trim();
        const errorColor = getComputedStyle(document.documentElement).getPropertyValue('--error').trim();
        
        document.getElementById('gauge-chart').style.background = `conic-gradient(${successColor} ${percentage}%, ${errorColor} 0)`;
        document.getElementById('score-text').innerText = `${correctCount}/${totalQuestions}`;
        
        document.getElementById('results-detail-text').innerHTML = `Has acertado <strong><span style="color: var(--success);">${correctCount}</span></strong> y fallado <strong><span style="color: var(--error);">${incorrectCount}</span></strong> de un total de ${totalQuestions} preguntas.`;
        
        document.getElementById('results-section').style.display = 'block';
        
        // Guardar el progreso (Check verde)
        let completed = JSON.parse(localStorage.getItem('completed_tests_v4') || '[]');
        let currentTestId = `${selectedSubject}-${selectedCategory}-${selectedTopicName}`;
        if (!completed.includes(currentTestId)) {
            completed.push(currentTestId);
            localStorage.setItem('completed_tests_v4', JSON.stringify(completed));
        }
        
        window.scrollTo(0,0);
    }

    function resetProgress() {
        if(confirm("¿Seguro que quieres borrar todo tu progreso? Esto quitará todos los ✅ de los temas.")) {
            localStorage.removeItem('completed_tests_v4');
            location.reload();
        }
    }

    function shuffleArray(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } }
</script>
</body>
</html>

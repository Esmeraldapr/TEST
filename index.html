<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Profesional - Multimateria</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; font-weight: bold; position: sticky; top: 0; background: white; z-index: 100; padding-top: 10px;}
        #timer { color: var(--error); font-size: 1.2rem; }

        #login-section { text-align: center; padding: 20px 0; }
        
        /* Bloque de Materias */
        .subject-block { background: #fdfdfd; border: 2px solid #e1e8ed; border-radius: 12px; padding: 25px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .subject-title { color: var(--primary); font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid var(--secondary); text-align: left; display: flex; align-items: center; gap: 10px;}
        
        /* Grid de Temas */
        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .topic-card { background: var(--secondary); color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .topic-card:hover { background: #2980b9; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .topic-all { background: var(--primary); }
        .topic-all:hover { background: #1a252f; }

        .btn-main { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; width: 100%; margin-top: 30px;}
        .btn-main:hover { background: #1a252f; }
        .btn-danger { background: var(--error); width: auto; margin-top: 10px; font-size: 0.9rem; padding: 8px 15px;}
        .btn-danger:hover { background: #c0392b; }

        /* Estilos de las preguntas */
        .question-block { background: #fff; border: 1px solid #e1e8ed; border-radius: 10px; padding: 25px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .question-header { color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 8px; margin-bottom: 15px; font-size: 1.1rem; }
        .question-text { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; }
        
        .options-container { display: grid; gap: 12px; margin-top: 20px; }
        .option-btn { 
            padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; 
            transition: all 0.2s; background: white; text-align: left; font-size: 1.05rem;
        }
        .option-btn:hover:not(:disabled) { background: #f8f9fa; border-color: var(--secondary); }
        
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }
        
        .explanation { margin-top: 20px; padding: 15px; background: #e8f4fd; border-left: 5px solid var(--secondary); display: none; border-radius: 4px; line-height: 1.5; }

        /* --- Estilos para el Gráfico Donut --- */
        .gauge-container { display: flex; justify-content: center; margin: 30px 0; }
        .gauge-outer { 
            width: 180px; height: 180px; border-radius: 50%; 
            background: conic-gradient(var(--success) 0%, var(--error) 0); 
            display: flex; align-items: center; justify-content: center; position: relative; 
        }
        .gauge-outer::after { 
            content: ''; width: 130px; height: 130px; border-radius: 50%; 
            background: white; position: absolute; 
        }
        .gauge-inner { z-index: 1; text-align: center; }
        #score-text { font-size: 2.5rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1 style="color: var(--primary);">Test de Evaluación 3º Trimestre</h1>
        <p>Selecciona el bloque que deseas practicar para comenzar directamente.</p>
        
        <button class="btn-main btn-danger" onclick="resetProgress()">🗑️ Borrar mi progreso</button>

        <div id="subjects-container" style="margin-top: 30px;"></div>
    </div>

    <div id="test-section" style="display:none;">
    <div class="header-info">
        <div style="display: flex; align-items: center; gap: 10px;">
            <button onclick="goBackToMenu()" style="padding: 6px 12px; border: none; border-radius: 6px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer;">🔙 Volver</button>
            <div> 📚  <span id="display-topic"></span></div>
        </div>
        <div id="timer"> ⏱️  00:00</div>
    </div>

        
        <div id="questions-list"></div>
        
        <button id="finish-btn" class="btn-main" onclick="finishTest()">Finalizar Test ➔</button>
    </div>

  <div id="results-section" style="text-align: center; display: none; padding: 40px 0;">
    <h2 style="color: var(--primary);">¡Test Finalizado! 🎉</h2>
    
    <div class="gauge-container">
        <div class="gauge-outer" id="gauge-chart">
            <div class="gauge-inner">
                <span id="score-text">0/0</span>
            </div>
        </div>
    </div>

    <p id="results-detail-text" style="font-size: 1.2rem; margin-bottom: 30px;"></p>
   <button class="btn-main" onclick="goBackToMenu()">  ↻  Volver al Menú Principal</button>
  </div>
</div>

        // TEMA 4
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "El modelo de producción en el que cada fase del ciclo de vida del producto se conecta solo con la anterior y la siguiente se llama…", r: ["Modelo circular", "Modelo de conexión", "Modelo lineal", "Ecoproducción"], c: "Modelo lineal", e: "El modelo lineal sigue una secuencia estricta sin retroalimentación, lo que lo hace insostenible a largo plazo." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Cuál es el orden cronológico correcto de las fases del ciclo de vida de un producto en el modelo tradicional?", r: ["Aprovisionamiento ➔ Diseño ➔ Producción ➔ Distribución ➔ Consumo ➔ Desecho", "Diseño ➔ Aprovisionamiento ➔ Distribución ➔ Producción ➔ Consumo ➔ Desecho", "Producción ➔ Aprovisionamiento ➔ Diseño ➔ Consumo ➔ Distribución ➔ Desecho", "Aprovisionamiento ➔ Producción ➔ Diseño ➔ Distribución ➔ Desecho ➔ Consumo"], c: "Aprovisionamiento ➔ Diseño ➔ Producción ➔ Distribución ➔ Consumo ➔ Desecho", e: "Esta es la secuencia lineal clásica, desde que se consiguen los materiales hasta que el producto termina en la basura." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "El modelo de producción lineal se conoce comúnmente como el de…", r: ["extraer-fabricar-consumir", "fabricar-consumir-reutilizar", "extraer-fabricar-consumir-desechar", "extraer-fabricar-consumir-reciclar"], c: "extraer-fabricar-consumir-desechar", e: "Define a la perfección la cultura del 'usar y tirar' que la economía circular intenta combatir." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Cuál de los siguientes es un riesgo asociado a la utilización de recursos no renovables escasos en la economía lineal?", r: ["Volatilidad en los precios con tendencia al alza", "Problemas de seguridad en el trabajo", "Menores oportunidades de expansión a nuevos mercados", "Menor capacidad de adquirir y retener talento"], c: "Volatilidad en los precios con tendencia al alza", e: "Al ser recursos finitos que se van agotando, la ley de la oferta y la demanda hace que sus precios sean inestables y cada vez más altos." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "Un riesgo asociado a la prioridad en la venta de productos nuevos con ciclos de vida cortos (obsolescencia programada) en la economía lineal es...", r: ["Leyes cada vez más restrictivas y sanciones cada vez mayores", "Prohibición de la exportación de residuos", "Menor capacidad de adquirir y retener talento", "Reducción de beneficios por la competencia y estandarización del producto"], c: "Reducción de beneficios por la competencia y estandarización del producto", e: "Al producir rápido y barato, el mercado se satura de productos muy parecidos, lo que obliga a bajar precios y márgenes de beneficio." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "En la economía lineal, ¿cuál es un riesgo asociado a la falta de colaboración y comunicación con proveedores y clientes?", r: ["Cambios en la demanda en favor de productos más sostenibles", "Irrupción de nuevos modelos de negocio y nuevas tecnologías", "Prohibición de exportación de residuos", "Retirada de productos por riesgos medioambientales o tóxicos"], c: "Cambios en la demanda en favor de productos más sostenibles", e: "Si la empresa no escucha a sus clientes, no se dará cuenta de que ahora exigen productos ecológicos, y perderá cuota de mercado." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Cuál es un riesgo por la falta de innovación y adaptación a los cambios del mercado en la economía lineal?", r: ["Irrupción de nuevos modelos de negocio y nuevas tecnologías", "Requisitos crecientes de garantías y seguridad", "Problemas de seguridad en el trabajo", "Inconsistencias e ineficacias en la cadena de suministros"], c: "Irrupción de nuevos modelos de negocio y nuevas tecnologías", e: "Las empresas que se estancan corren el riesgo de ser superadas rápidamente por startups o competidores que aplican tecnologías limpias." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Cuáles son las conocidas '7 R' de los principios de la economía circular?", r: ["Rediseñar, reducir, renovar, reparar, reutilizar, recuperar y reciclar", "Rechazar, reclamar, reducir, revisar, reparar, reciclar y regular", "Recoger, redactar, reducir, renovar, reparar, reciclar y recuperar", "Rediseñar, reducir, revender, reparar, reutilizar, repensar y reciclar"], c: "Rediseñar, reducir, renovar, reparar, reutilizar, recuperar y reciclar", e: "Estas 7 acciones son la base fundamental para transformar un sistema lineal en uno circular y sostenible." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Cuáles son dos claros beneficios para la sociedad al aplicar la economía circular?", r: ["Genera nuevos empleos y reduce el impacto medioambiental", "Aumenta la obsolescencia programada y los beneficios a corto plazo", "Reduce las actividades de servicios y fomenta la extracción", "Disminuye la cooperación entre personas, empresas y sector público"], c: "Genera nuevos empleos y reduce el impacto medioambiental", e: "La economía circular crea empleo verde (reparadores, gestores, ecodiseñadores) y mitiga el cambio climático." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Cuál de las siguientes es una consecuencia (ventaja) para las empresas al optar por la economía circular?", r: ["Aumento de costes a largo plazo", "Falta de fidelidad de clientes y proveedores", "Menor riesgo legal", "Empeoramiento de la imagen de marca"], c: "Menor riesgo legal", e: "Al ser sostenibles, cumplen de sobra con las normativas medioambientales, evitando multas o bloqueos de actividad." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Cuál es el orden correcto de las fases en una evaluación de producción limpia?", r: ["Recogida y análisis de datos ➔ Generación de opciones ➔ Análisis de viabilidad ➔ Implementación ➔ Evaluación y control", "Generación de opciones ➔ Recogida de datos ➔ Implementación ➔ Análisis de viabilidad ➔ Evaluación", "Análisis de viabilidad ➔ Recogida de datos ➔ Generación de opciones ➔ Implementación ➔ Control", "Evaluación y control ➔ Recogida de datos ➔ Análisis de viabilidad ➔ Implementación ➔ Generación de opciones"], c: "Recogida y análisis de datos ➔ Generación de opciones ➔ Análisis de viabilidad ➔ Implementación ➔ Evaluación y control", e: "Es un proceso lógico: primero analizas cómo estás, propones mejoras, estudias si son posibles, las aplicas y finalmente mides el resultado." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Qué cambios tecnológicos son clave para implementar una producción limpia en una empresa?", r: ["Tecnologías que requieran menos energía/materiales y generen menos residuos", "Tecnologías que aumenten la velocidad de producción sin importar el consumo", "Sistemas de automatización que utilicen combustibles fósiles más baratos", "Maquinaria de un solo uso para abaratar costes de mantenimiento"], c: "Tecnologías que requieran menos energía/materiales y generen menos residuos", e: "La clave tecnológica de la producción limpia es la eficiencia absoluta: hacer lo mismo o más, gastando e impactando menos." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿En qué consiste exactamente el ecodiseño (o diseño ecológico)?", r: ["En la integración de aspectos medioambientales en el diseño para minimizar impactos en todo el ciclo de vida", "En diseñar campañas de marketing para que el producto parezca sostenible (Greenwashing)", "En utilizar únicamente plásticos reciclados sin importar la durabilidad del producto", "En diseñar envases que sean más baratos de transportar y almacenar"], c: "En la integración de aspectos medioambientales en el diseño para minimizar impactos en todo el ciclo de vida", e: "El ecodiseño interviene en la pizarra de dibujo: se piensa cómo fabricar, usar y destruir el producto contaminando lo mínimo." },
        { m: "Sostenibilidad", t: "Tema 4", u: "Cuestionario", p: "¿Cuál de los siguientes es un principio del ecodiseño?", r: ["Usar la mayor variedad posible de materiales", "Uso de materiales de proveedores internacionales", "Aumento del número de procesos para la fabricación", "Diseñar productos modulares para su mejor reparación y reciclaje"], c: "Diseñar productos modulares para su mejor reparación y reciclaje", e: "Un diseño modular (por piezas separables) permite sustituir solo la parte rota en lugar de tener que desechar el producto completo." },

        // TEMA 5
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿Qué es un indicador de desempeño?", r: ["Es un dato o un conjunto de datos que permite medir el rendimiento de una actividad en relación con un objetivo o meta", "Es una ley gubernamental que obliga a las empresas a pagar impuestos ecológicos", "Es un departamento dentro de la empresa encargado exclusivamente del marketing verde", "Es un informe anual de ingresos y gastos financieros"], c: "Es un dato o un conjunto de datos que permite medir el rendimiento de una actividad en relación con un objetivo o meta", e: "Los indicadores (KPIs) son las 'reglas de medir' que nos dicen si estamos haciendo las cosas bien o mal respecto a lo planeado." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "Para que las empresas puedan saber si están alcanzando las metas de sostenibilidad, deben seguir este proceso:", r: ["Fijar objetivos, seleccionar indicadores clave y establecer las metas", "Conocer los Objetivos de Desarrollo Sostenible y sacar conclusiones sobre su cumplimiento", "Fijar objetivos, comprobar su grado de cumplimiento y publicar esta actividad", "Trabajar sobre los ODS, buscar metas que alcanzar en cada uno y sacar conclusiones"], c: "Fijar objetivos, seleccionar indicadores clave y establecer las metas", e: "Es la hoja de ruta básica: primero decides qué quieres lograr, luego cómo lo vas a medir, y finalmente la meta exacta a alcanzar." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "Las metas a alcanzar en el proceso de implantación de la sostenibilidad deben ser…", r: ["Medibles, relevantes, alcanzables y finitos", "Medibles, importantes, ambiciosos e ilimitados", "Medibles, relevantes, alcanzables e ilimitados", "Importantes, alcanzables y finitos"], c: "Medibles, relevantes, alcanzables y finitos", e: "Una meta siempre debe tener un límite de tiempo (ser finita) y ser realista (alcanzable), siguiendo la filosofía de los objetivos SMART." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿Cuál es el orden correcto de las 4 fases para integrar un indicador de desempeño en el sistema de gestión ambiental?", r: ["Definición del indicador ➔ Establecimiento de fórmula de cálculo ➔ Establecimiento del nivel a alcanzar ➔ Efectuar seguimiento", "Establecimiento del nivel a alcanzar ➔ Efectuar seguimiento ➔ Definición del indicador ➔ Establecimiento de fórmula", "Efectuar seguimiento ➔ Definición del indicador ➔ Establecimiento de fórmula ➔ Establecimiento del nivel", "Definición del indicador ➔ Establecimiento del nivel ➔ Efectuar seguimiento ➔ Establecimiento de fórmula"], c: "Definición del indicador ➔ Establecimiento de fórmula de cálculo ➔ Establecimiento del nivel a alcanzar ➔ Efectuar seguimiento", e: "Primero decides qué medir, luego la fórmula matemática para hacerlo, después la cifra que quieres conseguir, y finalmente lo vigilas." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "Los certificados desarrollados por instituciones ajenas que conceden licencias para el uso de etiquetas ecológicas en productos se llaman…", r: ["Ecoetiquetas", "Autodeclaraciones ambientales", "Declaraciones ambientales de productos", "Etiquetas certificadas"], c: "Ecoetiquetas", e: "Las ecoetiquetas (tipo I) son garantías otorgadas por un tercero independiente que asegura que el producto es respetuoso con el medio ambiente." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿A qué certificado corresponde el sello (como el FSC) que garantiza que la madera o el papel provienen de bosques aprovechados de forma sostenible?", r: ["Certificado de Gestión Forestal", "Certificado de Gestión Agrícola", "Certificado de Producción ecológica", "Certificado de Gestión de bosques"], c: "Certificado de Gestión Forestal", e: "Este certificado asegura que la extracción de madera no ha provocado deforestación ni daño irreversible al ecosistema." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿A qué certificado corresponde la etiqueta que clasifica aparatos mediante una escala de letras (A a G) y colores (del verde al rojo)?", r: ["Certificado de Eficiencia Energética", "Certificado de Valor Nutricional de los Alimentos", "Certificado de Gestión Medioambiental Respetuosa", "Certificado de Gestión Forestal"], c: "Certificado de Eficiencia Energética", e: "Es la clásica etiqueta que vemos en neveras, lavadoras o edificios para saber cuánta electricidad consumen." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "En una Inversión Socialmente Responsable (ISR), cuando se hace el análisis de sostenibilidad se tiene en cuenta…", r: ["Aspectos sociales", "La rentabilidad", "El riesgo", "La liquidez"], c: "Aspectos sociales", e: "Mientras que la inversión tradicional mira solo rentabilidad, riesgo y liquidez, la ISR añade los criterios ASG (Ambientales, Sociales y de Gobernanza)." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "En inversión sostenible, si descartamos a empresas dedicadas a actividades incompatibles con los ODS (ej: armas o tabaco), estamos usando indicadores de…", r: ["Exclusión", "Integración de aspectos de ASG", "Selectivos", "Incompatibilidad"], c: "Exclusión", e: "Se llama criterio de exclusión o 'screening negativo': eliminar directamente de la cartera de inversión a los sectores dañinos." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "Si en nuestra inversión INCLUIMOS empresas dedicadas a actividades especialmente vinculadas con la sostenibilidad y los ODS, usamos indicadores…", r: ["Selectivos", "Integración de aspectos de ASG", "Exclusión", "Incompatibilidad"], c: "Selectivos", e: "También conocido como 'screening positivo', consiste en elegir activamente a los mejores alumnos de la clase en materia de sostenibilidad." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿Qué agente de sostenibilidad crea las leyes que rigen a empresas y personas, y toma decisiones de gobierno y gestión diaria?", r: ["Instituciones públicas de gobierno", "Organismos supervisores", "Organizaciones normalizadoras", "Entidades certificadoras"], c: "Instituciones públicas de gobierno", e: "Son el Estado, los ministerios y los parlamentos que redactan y aprueban la legislación vigente." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿Qué entidades públicas se encargan de desarrollar reglamentos y asegurarse del buen funcionamiento relativo a la sostenibilidad?", r: ["Organismos supervisores", "Agencias de calificación ambiental", "Entidades certificadoras", "Instituciones públicas de gobierno"], c: "Organismos supervisores", e: "Vigilan que las reglas del juego impuestas por el gobierno se cumplan estrictamente." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿Qué agentes de sostenibilidad califican inversiones y empresas en función de su grado de cumplimiento de los aspectos ASG?", r: ["Agencias de calificación ambiental", "Consultorías medioambientales", "Entidades certificadoras", "Instituciones públicas de gobierno"], c: "Agencias de calificación ambiental", e: "Ponen 'nota' a las empresas (ratings ESG) para que los inversores sepan si son verdaderamente sostenibles o no." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿Qué agentes prestan servicios de asesoramiento a empresas, ayudándoles en la toma de decisiones y trámites administrativos ambientales?", r: ["Consultorías medioambientales", "Agencias de calificación ambiental", "Entidades certificadoras", "Organizaciones normalizadoras"], c: "Consultorías medioambientales", e: "Son profesionales externos contratados para guiar a la empresa en su transición hacia la sostenibilidad." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿Qué agentes de sostenibilidad son empresas acreditadas para extender certificados (auditorías)?", r: ["Entidades certificadoras", "Consultorías medioambientales", "Agencias de calificación ambiental", "Organizaciones normalizadoras"], c: "Entidades certificadoras", e: "Son los 'jueces' independientes (como AENOR o SGS) que verifican y te dan el diploma oficial si cumples los requisitos." },
        { m: "Sostenibilidad", t: "Tema 5", u: "Cuestionario", p: "¿Qué agentes de sostenibilidad crean las normas especializadas que regulan actividades y procesos concretos (Ej: Normas ISO)?", r: ["Organizaciones normalizadoras", "Consultorías medioambientales", "Agencias de calificación ambiental", "Entidades certificadoras"], c: "Organizaciones normalizadoras", e: "Redactan los estándares técnicos universales (como ISO en el mundo o UNE en España) para que todos hablemos el mismo idioma sostenible." },

        // TEMA 6
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "El documento empresarial sobre sostenibilidad que da cuenta a la autoridad de la evolución de determinados aspectos ASG se llama:", r: ["Estado no financiero", "Plan de sostenibilidad", "Informe o memoria de sostenibilidad", "Informe de impacto ambiental"], c: "Estado no financiero", e: "Es el reporte legal que comunica a las autoridades cómo la empresa gestiona sus impactos ambientales, sociales y de gobierno." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "El documento que valora los efectos medioambientales de un proyecto para tomar decisiones que los eviten o compensen es:", r: ["Estado no financiero", "Plan de sostenibilidad", "Informe o memoria de sostenibilidad", "Informe de impacto ambiental"], c: "Informe de impacto ambiental", e: "Este informe es una herramienta de evaluación previa necesaria para mitigar daños antes de iniciar una obra o actividad." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "El documento empresarial que refleja los resultados de una organización en materia de sostenibilidad durante un año se llama:", r: ["Estado no financiero", "Plan de sostenibilidad", "Informe o memoria de sostenibilidad", "Informe de impacto ambiental"], c: "Informe o memoria de sostenibilidad", e: "Funciona como una rendición de cuentas anual ante los grupos de interés sobre el desempeño sostenible pasado." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "El documento empresarial que guía las acciones de una organización en materia de sostenibilidad a medio y largo plazo se llama:", r: ["Estado no financiero", "Plan de sostenibilidad", "Informe o memoria de sostenibilidad", "Informe de impacto ambiental"], c: "Plan de sostenibilidad", e: "A diferencia de la memoria, el plan es un documento estratégico que proyecta los objetivos y metas futuras de la empresa." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "El estado no financiero es un documento:", r: ["Voluntario para todas las empresas", "Obligatorio para todas las empresas", "Obligatorio para grandes empresas", "Obligatorio para pequeñas empresas"], c: "Obligatorio para grandes empresas", e: "La normativa legal vigente establece la obligatoriedad de este reporte para empresas de gran tamaño y relevancia pública." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "El plan de sostenibilidad es un documento:", r: ["Voluntario para todas las empresas", "Obligatorio para todas las empresas", "Obligatorio para grandes empresas", "Obligatorio para pequeñas empresas"], c: "Voluntario para todas las empresas", e: "Es una herramienta de gestión estratégica que las empresas deciden adoptar libremente para mejorar su competitividad." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "La declaración de impacto ambiental es un documento:", r: ["Voluntario para cualquier empresa", "Obligatorio para cualquier empresa", "Obligatorio para determinados proyectos de empresas y administraciones", "Obligatorio solo para administraciones"], c: "Obligatorio para determinados proyectos de empresas y administraciones", e: "Se exige por ley para actividades específicas (como grandes infraestructuras) que podrían causar un impacto ambiental significativo." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "La finalidad del plan de sostenibilidad es informar de sostenibilidad a…", r: ["Los grupos internos de interés de la empresa", "Los grupos externos de interés de la empresa", "Los grupos internos y externos de interés de la empresa", "Las administraciones públicas"], c: "Los grupos internos y externos de interés de la empresa", e: "Su objetivo es alinear y comunicar la estrategia sostenible tanto a empleados como a clientes, proveedores y sociedad." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "¿Qué es un análisis de doble materialidad?", r: ["Estudio de aspectos significativos en materia de personas, medioambiente y finanzas", "Estudio del peso de las materias primas en la producción", "Estudio financiero de ingresos dobles", "Análisis de residuos materiales"], c: "Estudio de aspectos significativos en materia de personas, medioambiente y finanzas", e: "Evalúa cómo la empresa impacta al mundo (materialidad de impacto) y cómo el mundo impacta a la empresa (materialidad financiera)." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "La diferencia principal entre el estado no financiero y la memoria de sostenibilidad es…", r: ["El estado no financiero es más sencillo de transmitir", "El estado no financiero es más complejo de transmitir", "El estado no financiero es voluntario y la memoria obligatoria", "Es el mismo documento pero con dos nombres"], c: "El estado no financiero es más complejo de transmitir", e: "El estado no financiero es un reporte técnico y legal rígido, mientras que la memoria suele ser más divulgativa y flexible." },
        { m: "Sostenibilidad", t: "Tema 6", u: "Cuestionario", p: "¿Quién tiene que hacer el estudio de impacto medioambiental de un proyecto?", r: ["Las Administraciones Públicas", "El inversor del proyecto", "Los grupos de interés del proyecto", "El promotor del proyecto"], c: "El promotor del proyecto", e: "La responsabilidad legal de costear y presentar el análisis recae sobre quien promueve la ejecución de la obra o actividad." },

        { m: "Sostenibilidad", t: "Test por Unidades", u: "Tema 1", p: "¿Cuál de las siguientes opciones es un efecto del calentamiento global?", r: ["Incremento de la actividad económica.", "Pérdida de biodiversidad.", "Contaminación del mar.", "Consumo abusivo."], c: "Pérdida de biodiversidad.", e: "Opción correcta según el temario." },
        { m: "Sostenibilidad", t: "Test por Unidades", u: "Tema 1", p: "Una sociedad justa que no hace peligrar al ecosistema mundial es:", r: ["Una sociedad equitativa.", "Una sociedad ecológica.", "Una sociedad soportable.", "Una sociedad viable."], c: "Una sociedad ecológica.", e: "Opción correcta según el temario." },
        { m: "Sostenibilidad", t: "Test por Unidades", u: "Tema 1", p: "El cambio climático supone para las empresas:", r: ["Un aumento en sus ingresos.", "El aumento de las primas de sus seguros.", "Una mayor productividad de su plantilla.", "Menor demanda de energía en los hogares."], c: "El aumento de las primas de sus seguros.", e: "Opción correcta según el temario." },

        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Cuál es la definición de sostenibilidad según el documento?", r: ["Capacidad de satisfacer las necesidades del presente sin comprometer la capacidad de futuras generaciones para satisfacer las suyas.", "Proteger el medio ambiente paralizando totalmente el desarrollo industrial.", "Explotar los recursos actuales garantizando el crecimiento económico a corto plazo.", "Uso exclusivo de energías renovables en los procesos industriales."], c: "Capacidad de satisfacer las necesidades del presente sin comprometer la capacidad de futuras generaciones para satisfacer las suyas.", e: "Esta es la definición clásica y base de la sostenibilidad. [cite: 1967]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Cuál es el pilar fundamental de la sostenibilidad?", r: ["El desarrollo industrial y la protección del medio ambiente.", "La relación entre el crecimiento económico, la equidad social y la protección ambiental.", "La equidad social y el desarrollo económico ignorando el entorno natural.", "La generación continuada de bienes y servicios limitando la población."], c: "La relación entre el crecimiento económico, la equidad social y la protección ambiental.", e: "La sostenibilidad se asienta sobre la armonía de estos tres pilares al mismo tiempo. [cite: 1968]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Qué es un ecosistema?", r: ["Un sistema biológico formado por una comunidad de seres vivos que habita un medio físico.", "Una agrupación de empresas que operan en un mismo sector ecológico.", "El conjunto de recursos inorgánicos de un área determinada.", "Un modelo económico sin emisiones de gases de efecto invernadero."], c: "Un sistema biológico formado por una comunidad de seres vivos que habita un medio físico.", e: "En el ecosistema, los organismos generan relaciones de interdependencia que lo mantienen en equilibrio. [cite: 1972, 1973, 1974, 1975]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "Un sistema humano será medioambientalmente sostenible si...", r: ["El ritmo al que obtenemos recursos es mayor que la capacidad de los ecosistemas para generar nuevos.", "La huella de carbono es igual a la huella ecológica.", "El ritmo al que obtenemos recursos y emitimos residuos (huella ecológica) es menor que el ritmo al que los ecosistemas transforman nuestros residuos (biocapacidad).", "Se recicla el 100% de los plásticos producidos anualmente."], c: "El ritmo al que obtenemos recursos y emitimos residuos (huella ecológica) es menor que el ritmo al que los ecosistemas transforman nuestros residuos (biocapacidad).", e: "Si la huella ecológica supera la biocapacidad, el sistema es insostenible. [cite: 2000, 2001, 2002, 2003]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Cuál es la diferencia entre huella ecológica y huella de carbono?", r: ["Son exactamente lo mismo.", "La huella ecológica se refiere solo a la industria, y la de carbono a los individuos.", "La huella ecológica se refiere a todos los residuos y el impacto global, y la de carbono se refiere a la emisión específica de gases de efecto invernadero.", "La huella de carbono mide la superficie productiva, y la ecológica mide la temperatura media."], c: "La huella ecológica se refiere a todos los residuos y el impacto global, y la de carbono se refiere a la emisión específica de gases de efecto invernadero.", e: "La huella de carbono cuantifica las emisiones de GEI, mientras que la ecológica abarca la necesidad total de recursos y absorción de desechos. [cite: 2004, 2005, 2006, 2011]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿A qué hace referencia la 'biocapacidad'?", r: ["A la capacidad de una máquina para reciclar residuos plásticos.", "A la capacidad de un área para producir recursos renovables y para absorber o filtrar los desechos producidos.", "Al ritmo al que las empresas pueden plantar bosques.", "A la cantidad de carbono que emite la industria global."], c: "A la capacidad de un área para producir recursos renovables y para absorber o filtrar los desechos producidos.", e: "La biocapacidad evalúa el límite máximo de regeneración y absorción natural. [cite: 2009]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Cuáles son las tres dimensiones o pilares del desarrollo sostenible?", r: ["Medioambiental, económico y social.", "Tecnológico, financiero y biológico.", "Legislativo, económico y social.", "Económico, político y ambiental."], c: "Medioambiental, económico y social.", e: "Para que pueda hablarse de desarrollo sostenible, debe existir armonía en las tres dimensiones. [cite: 2013, 2014]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿En qué se enfoca principalmente el pilar social del desarrollo sostenible?", r: ["En proteger y restaurar los ecosistemas naturales.", "En garantizar los derechos humanos, mejorar las condiciones laborales y fomentar la equidad y el bienestar social.", "En optimizar el uso de recursos y crear rentabilidad para las empresas.", "En la descarbonización de los procesos de transporte público."], c: "En garantizar los derechos humanos, mejorar las condiciones laborales y fomentar la equidad y el bienestar social.", e: "El pilar social busca que todas las personas tengan acceso a las oportunidades y recursos necesarios para una vida digna. [cite: 2042, 2043]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "Promover un crecimiento inclusivo, optimizar el uso de recursos, fomentar la innovación y mejorar la competitividad son acciones pertenecientes al pilar...", r: ["Social.", "Ecológico.", "Económico.", "Tecnológico."], c: "Económico.", e: "El pilar económico asegura que las actividades sean viables a largo plazo generando riqueza de forma eficiente. [cite: 2039, 2040]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Qué es el cambio climático según la presentación?", r: ["Una alteración del sistema climático de la Tierra que está provocando un aumento de las temperaturas en el planeta (calentamiento global).", "Un fenómeno natural provocado exclusivamente por la actividad del Sol.", "La reducción generalizada de las temperaturas provocando la glaciación de los polos.", "El agujero en la capa de ozono generado en la década de los 80."], c: "Una alteración del sistema climático de la Tierra que está provocando un aumento de las temperaturas en el planeta (calentamiento global).", e: "El aumento de temperaturas o calentamiento global es la manifestación principal del cambio climático. [cite: 2054, 2055]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Qué causa el efecto invernadero según el esquema?", r: ["El uso de energías limpias en la producción.", "La pérdida masiva de biodiversidad marina.", "Gases contaminantes (como el CO2) impiden que parte de la radiación que llega del Sol sea emitida al espacio, devolviéndola a la superficie.", "El derretimiento del hielo de los polos oceánicos."], c: "Gases contaminantes (como el CO2) impiden que parte de la radiación que llega del Sol sea emitida al espacio, devolviéndola a la superficie.", e: "Estos gases, al atrapar el calor, aumentan la temperatura terrestre generando el efecto invernadero. [cite: 2073]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Cómo afecta el cambio climático a las empresas agrícolas o a las que dependen de los productos del campo?", r: ["Provoca una reducción en los precios de compra de alimentos básicos.", "Eleva los precios de los productos agrícolas y del campo, ya que las sequías reducen el rendimiento de las cosechas y aumentan el riesgo de incendios.", "Aumenta la productividad agrícola debido al mayor calor ambiental.", "No tiene un impacto económico directo en la agricultura."], c: "Eleva los precios de los productos agrícolas y del campo, ya que las sequías reducen el rendimiento de las cosechas y aumentan el riesgo de incendios.", e: "Las sequías extremas y el calor hacen a la agricultura menos productiva y más costosa. [cite: 2080, 2081, 2082]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "Respecto a las consecuencias del cambio climático en las empresas, ¿qué ocurre con el sector de los seguros?", r: ["Se encarecen los seguros debido al aumento de primas por el mayor riesgo de pérdidas ante fenómenos meteorológicos y malas cosechas.", "Las aseguradoras bajan sus precios por la disminución de los accidentes de tráfico.", "Los seguros agrícolas dejan de existir por normativa europea.", "Las primas se mantienen estables ya que el riesgo meteorológico es predecible."], c: "Se encarecen los seguros debido al aumento de primas por el mayor riesgo de pérdidas ante fenómenos meteorológicos y malas cosechas.", e: "Las aseguradoras cobran más al haber más probabilidad de desastres (inundaciones, incendios). [cite: 2095, 2096]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "Para desandar el camino del cambio climático, las empresas y agentes económicos deben...", r: ["Incrementar su huella ecológica y producir más rápido.", "Descarbonizar y desmaterializar sus procesos.", "Esperar a que el ecosistema se adapte al calentamiento global.", "Aumentar el uso de combustibles fósiles como el carbón."], c: "Descarbonizar y desmaterializar sus procesos.", e: "Estas dos acciones combinadas consiguen reducir las emisiones y el consumo abusivo de materiales y energía. [cite: 2117, 2118, 2119]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Se considera el reciclaje la opción perfecta para combatir el cambio climático?", r: ["Sí, el reciclaje no produce ningún tipo de contaminación.", "No, no es la perfecta (es la menos mala), ya que las plantas de reciclado causan parte de la contaminación al emitir gases en el tratamiento de residuos.", "Sí, reciclar no gasta energía en absoluto.", "No, reciclar siempre contamina más que la extracción de materias primas vírgenes."], c: "No, no es la perfecta (es la menos mala), ya que las plantas de reciclado causan parte de la contaminación al emitir gases en el tratamiento de residuos.", e: "Aun así, la huella ecológica del reciclado es menor que el no reciclado, pero la opción ideal es reducir y reutilizar. [cite: 2104, 2105, 2106, 2107, 2108]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "Instalar paneles solares, usar calefacción de biomasa y plantar bosques son ejemplos concretos de acciones de...", r: ["Desmaterialización.", "Descarbonización.", "Sobreexplotación.", "Digitalización."], c: "Descarbonización.", e: "Son acciones orientadas a reducir las emisiones de CO2 o compensarlas, usar fuentes limpias o absorber el carbono existente. [cite: 2125]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "Hacer estructuras más ligeras, usar materiales reciclados y dejar de imprimir documentación para usar formatos electrónicos son ejemplos de...", r: ["Descarbonización.", "Desmaterialización.", "Consumo abusivo.", "Externalización laboral."], c: "Desmaterialización.", e: "La desmaterialización se basa en reducir la cantidad de material físico necesario para producir u operar. [cite: 2125]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Cuál es la mayor alianza creada por el desarrollo sostenible y establecida por las Naciones Unidas?", r: ["El Protocolo de Kioto.", "El Pacto Verde Europeo.", "El Acuerdo Comercial del Atlántico Norte.", "Los Objetivos de Desarrollo Sostenible (ODS)."], c: "Los Objetivos de Desarrollo Sostenible (ODS).", e: "Los ODS suponen el acuerdo a mayor escala internacional promovido por la ONU. [cite: 2139]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Cuántos objetivos y metas conforman la Agenda 2030?", r: ["17 objetivos interconectados y sus 169 metas.", "10 objetivos y 100 metas.", "20 objetivos y 200 metas.", "5 objetivos y 50 metas."], c: "17 objetivos interconectados y sus 169 metas.", e: "La Agenda 2030 integra 17 ODS que deben lograrse para el año 2030. [cite: 2142, 2144]" },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF1", p: "¿Qué busca principalmente el Pacto Verde Europeo impulsado por los países de la Unión Europea?", r: ["Establecer un sistema de reciclaje unificado en toda Europa.", "Que para el año 2050, la Unión Europea en su conjunto sea neutral en emisiones de carbono.", "Aumentar los impuestos a todas las importaciones tecnológicas.", "Eliminar la agricultura en favor de la industria de servicios."], c: "Que para el año 2050, la Unión Europea en su conjunto sea neutral en emisiones de carbono.", e: "El objetivo es que la cantidad de carbono emitida a la atmósfera sea igual a la capturada. [cite: 2147]" },

        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "Respecto a los ODS de la ONU, señala la afirmación correcta:", r: ["Son 17 objetivos de obligado cumplimiento para las administraciones públicas, y la ONU invita a personas y empresas a sumarse.", "Son 15 objetivos orientativos solo para el sector privado.", "Están compuestos por 100 metas enfocadas exclusivamente en el medio ambiente.", "Solo son obligatorios para los países en vías de desarrollo."], c: "Son 17 objetivos de obligado cumplimiento para las administraciones públicas, y la ONU invita a personas y empresas a sumarse.", e: "Las administraciones tienen la obligación de cumplirlos, mientras que la sociedad civil y empresas están invitadas a participar activamente." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "¿Qué ODS tiene como meta garantizar que todas las personas tengan igualdad de derecho a los recursos económicos, servicios básicos y propiedad?", r: ["ODS 1: Fin de la pobreza", "ODS 8: Trabajo decente", "ODS 10: Reducción de las desigualdades", "ODS 16: Paz y justicia"], c: "ODS 1: Fin de la pobreza", e: "El ODS 1 busca erradicar la pobreza en todas sus formas asegurando el acceso equitativo a los recursos y servicios básicos." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "Duplicar la productividad agrícola y los ingresos de empresas productoras de alimentos en pequeña escala es una meta clave del...", r: ["ODS 15: Vida de ecosistemas terrestres", "ODS 2: Hambre cero", "ODS 3: Salud y bienestar", "ODS 12: Producción y consumo responsables"], c: "ODS 2: Hambre cero", e: "El ODS 2 busca poner fin al hambre logrando la seguridad alimentaria a través de la agricultura sostenible." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "Garantizar una vida sana, reducir la mortalidad materna e infantil y poner fin a epidemias como el sida o la malaria, corresponde al:", r: ["ODS 1: Fin de la pobreza", "ODS 6: Agua limpia", "ODS 3: Salud y bienestar", "ODS 11: Ciudades sostenibles"], c: "ODS 3: Salud y bienestar", e: "El ODS 3 engloba todas las metas relacionadas con la salud universal y la prevención de enfermedades." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "Asegurar la participación plena y efectiva de las mujeres y la igualdad de oportunidades de liderazgo a todos los niveles decisorios pertenece al:", r: ["ODS 5: Igualdad de género", "ODS 10: Reducción de desigualdades", "ODS 4: Educación de calidad", "ODS 8: Trabajo decente"], c: "ODS 5: Igualdad de género", e: "Empoderar a todas las mujeres y niñas y eliminar la discriminación es la base del ODS 5." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "¿Qué ODS busca aumentar sustancialmente la proporción de energía renovable y duplicar la tasa mundial de mejora de la eficiencia energética?", r: ["ODS 13: Acción por el clima", "ODS 7: Energía asequible y no contaminante", "ODS 9: Industria e innovación", "ODS 11: Ciudades sostenibles"], c: "ODS 7: Energía asequible y no contaminante", e: "Garantizar energía moderna, fiable y sostenible para todos es el pilar del ODS 7." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "Reducir a la mitad el desperdicio de alimentos per cápita mundial en la venta al por menor y a nivel de consumidores es una meta del:", r: ["ODS 2: Hambre cero", "ODS 3: Salud y bienestar", "ODS 12: Producción y consumo responsables", "ODS 15: Ecosistemas terrestres"], c: "ODS 12: Producción y consumo responsables", e: "El ODS 12 gestiona de forma sostenible los recursos naturales y combate el despilfarro alimentario." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "¿Cuál es el objetivo principal del ODS 13 (Acción por el clima)?", r: ["Adoptar medidas urgentes para combatir el cambio climático y sus efectos, fortaleciendo la resiliencia.", "Prohibir la extracción de petróleo a nivel mundial.", "Reducir la contaminación marina por plásticos.", "Fomentar la industrialización en países desarrollados."], c: "Adoptar medidas urgentes para combatir el cambio climático y sus efectos, fortaleciendo la resiliencia.", e: "El ODS 13 se centra en la adaptación a los riesgos climáticos y la mejora de la educación sobre mitigación." },

        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "En el ámbito del consumo responsable (nivel personal), ¿cuál de estas es una acción recomendada respecto al uso de la energía?", r: ["Mantener la calefacción siempre a 25 ºC en invierno.", "No subir la temperatura del termostato de la calefacción por encima de los 21 °C en ningún caso.", "Dejar los electrodomésticos enchufados para que no se estropeen.", "Evitar aislar los muros para que la casa respire."], c: "No subir la temperatura del termostato de la calefacción por encima de los 21 °C en ningún caso.", e: "Junto con desenchufar lo que no se usa y usar LEDs, limitar la calefacción a 21ºC es clave para la eficiencia." },

        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "¿Qué iniciativa impulsada por la Unión Europea busca que el continente sea neutral en emisiones de carbono para el año 2050?", r: ["La Estrategia de Movilidad Sostenible.", "El Pacto Verde Europeo.", "El Protocolo de Kioto.", "La Nueva Estrategia Industrial para Europa."], c: "El Pacto Verde Europeo.", e: "Es la estrategia marco europea que busca que la cantidad de carbono emitida sea igual a la capturada en 2050." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "Conseguir para 2030 la neutralidad de emisiones en 100 ciudades o llegar a los 30 millones de coches eléctricos/híbridos es una meta de:", r: ["El Pacto Verde Europeo.", "El Régimen de Comercio de Derechos de Emisión.", "La Estrategia de Movilidad Sostenible de la UE.", "El Marco de Sendai."], c: "La Estrategia de Movilidad Sostenible de la UE.", e: "Se enfoca directamente en la transformación del transporte europeo." },

        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "El acuerdo internacional impulsado en 2015 que obliga a los países a cumplir metas de reducción de emisiones para evitar que el calentamiento global sobrepase los 2 °C se llama:", r: ["Acuerdo de París.", "Protocolo de Kioto.", "Marco de Sendai.", "Agenda 2050."], c: "Acuerdo de París.", e: "Es el acuerdo climático global más importante de los últimos años." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "¿Cuál fue la principal aportación del Protocolo de Kioto (1997)?", r: ["Erradicar la pobreza mundial.", "Permitir crear mecanismos de comercio de derechos de emisión de gases de efecto invernadero.", "Declarar los océanos zona protegida.", "Imponer el reciclaje obligatorio de plásticos."], c: "Permitir crear mecanismos de comercio de derechos de emisión de gases de efecto invernadero.", e: "Sentó las bases para que los países y empresas comerciaran con sus cuotas de emisiones." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "¿Qué es el Marco de Sendai (2015-2030)?", r: ["Un acuerdo global que busca reducir, prevenir y ofrecer respuesta a riesgos de desastres en todo el mundo.", "Un tratado para la protección de especies en peligro de extinción.", "Un manual de construcción de edificios eficientes.", "La normativa que rige el uso de vehículos eléctricos en Asia."], c: "Un acuerdo global que busca reducir, prevenir y ofrecer respuesta a riesgos de desastres en todo el mundo.", e: "Busca que los países estén mejor preparados ante desastres naturales agravados por el clima." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF2", p: "La transición hacia la sostenibilidad supone normas estrictas y riesgos económicos, pero también genera OPORTUNIDADES para las empresas, tales como:", r: ["Exención total de pagar impuestos.", "La posibilidad de seguir contaminando si pagan multas.", "Ayudas de los Fondos Next Generation EU y nuevas vías de financiación del Banco Europeo de Inversiones.", "La eliminación de la competencia internacional."], c: "Ayudas de los Fondos Next Generation EU y nuevas vías de financiación del Banco Europeo de Inversiones.", e: "Las empresas que adopten modelos sostenibles tendrán acceso a importantes inyecciones de capital público europeo." },

        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "En el ciclo de vida del producto, ¿cómo se relacionan las fases en el modelo económico lineal clásico?", r: ["Cada fase se relaciona con todas las demás al mismo tiempo.", "Se conectan de forma circular para reutilizar los recursos.", "Cada fase del ciclo de vida se conecta solo con la anterior y la siguiente.", "Solo interactúan la fase de aprovisionamiento y la de consumo."], c: "Cada fase del ciclo de vida se conecta solo con la anterior y la siguiente.", e: "El modelo lineal es una cadena estricta: Extraer -> Fabricar -> Consumir -> Desechar." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Cuál es el orden cronológico correcto de las 6 fases del ciclo de vida de un producto?", r: ["Diseño, Aprovisionamiento, Producción, Distribución, Consumo y Desecho.", "Aprovisionamiento, Diseño, Producción, Distribución, Consumo y Desecho.", "Aprovisionamiento, Producción, Diseño, Consumo, Distribución y Desecho.", "Producción, Distribución, Consumo, Aprovisionamiento, Diseño y Desecho."], c: "Aprovisionamiento, Diseño, Producción, Distribución, Consumo y Desecho.", e: "Este es el flujo lógico desde que se extrae el material hasta que el cliente lo tira a la basura." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Qué riesgo asume una empresa en la economía lineal al priorizar la venta de productos de ciclo de vida corto (obsolescencia programada)?", r: ["Problemas de seguridad laboral.", "Prohibición de exportar sus productos.", "Reducción de beneficios por la rápida competencia y la estandarización del producto.", "Escasez de talento en la plantilla."], c: "Reducción de beneficios por la rápida competencia y la estandarización del producto.", e: "Al vender productos que duran poco y son fáciles de replicar, el mercado se inunda de alternativas baratas que obligan a bajar los márgenes." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "El uso de recursos no renovables y cada vez más escasos genera un riesgo directo para la empresa:", r: ["Leyes más restrictivas por contaminación.", "Pérdida de imagen pública corporativa.", "Escasez de recursos naturales y volatilidad en sus precios, con tendencia al alza.", "Irrupción de nuevas tecnologías que la dejan obsoleta."], c: "Escasez de recursos naturales y volatilidad en sus precios, con tendencia al alza.", e: "A menor disponibilidad del recurso en el planeta, más caro resulta adquirirlo." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Qué modelo económico plantea fórmulas para conservar el valor del producto en todas sus fases, reduciendo la generación de residuos?", r: ["La economía de libre mercado.", "La economía lineal.", "La economía de escala.", "La economía circular."], c: "La economía circular.", e: "Busca que los recursos no pierdan su valor tras la fase de consumo y puedan reintegrarse al sistema." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Cuáles son las 7 'R' de la economía circular?", r: ["Rediseñar, Reducir, Renovar, Reparar, Reutilizar, Recuperar y Reciclar.", "Rediseñar, Repartir, Rematar, Reusar, Reducir, Reciclar y Respetar.", "Renovar, Revender, Reducir, Retocar, Reciclar, Recuperar y Reutilizar.", "Reducir, Reutilizar, Reciclar, Razonar, Reestructurar, Reactivar y Renovar."], c: "Rediseñar, Reducir, Renovar, Reparar, Reutilizar, Recuperar y Reciclar.", e: "Estas siete acciones son los pilares fundamentales para evitar la economía de 'usar y tirar'." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "En la economía circular, ¿qué significa el principio de 'Recuperar'?", r: ["Transformar materiales desechados para fabricar nuevos productos.", "Dar los objetos a otras personas para que los usen.", "Reparar la ropa o aparatos rotos.", "Recuperar productos o envases que desechamos dándoles un nuevo uso en el proceso de producción."], c: "Recuperar productos o envases que desechamos dándoles un nuevo uso en el proceso de producción.", e: "Consiste en salvar el producto del vertedero para volver a utilizarlo operativamente." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Qué dos grandes procesos son imprescindibles para avanzar hacia una economía circular?", r: ["Deslocalización y externalización.", "Desmaterialización y descarbonización.", "Desindustrialización y descentralización.", "Globalización y digitalización."], c: "Desmaterialización y descarbonización.", e: "Gastar menos recursos físicos (desmaterialización) y emitir menos o ningún gas invernadero (descarbonización)." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Qué es la 'Producción limpia'?", r: ["Desarrollar procesos que prevengan daños a los ecosistemas, aumentando la eficiencia y reduciendo riesgos ambientales.", "Producir únicamente mediante trabajo manual sin máquinas.", "Fregar y limpiar las fábricas a diario con productos químicos fuertes.", "Externalizar la producción a países donde no haya normativas de polución."], c: "Desarrollar procesos que prevengan daños a los ecosistemas, aumentando la eficiencia y reduciendo riesgos ambientales.", e: "Consiste en fabricar de manera responsable sin dañar el entorno ni agotar los ecosistemas." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Cuál es el orden correcto de las fases en una evaluación de producción limpia?", r: ["Implementación, Generación de opciones, Análisis, Recogida de datos, Control.", "Análisis de viabilidad, Recogida de datos, Generación de opciones, Implementación, Control.", "Recogida y análisis de datos, Generación de opciones, Análisis de viabilidad, Implementación, Evaluación y control.", "Evaluación y control, Recogida de datos, Análisis de viabilidad, Generación de opciones, Implementación."], c: "Recogida y análisis de datos, Generación de opciones, Análisis de viabilidad, Implementación, Evaluación y control.", e: "Primero se estudia cómo está la fábrica, se proponen ideas, se ve si son posibles, se aplican y finalmente se revisan." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "Usar pinturas al agua en lugar de las que requieren disolventes químicos es un ejemplo de...", r: ["Cambios en el producto.", "Reciclaje interno.", "Cambios tecnológicos.", "Cambios en los materiales (reducción de materiales peligrosos)."], c: "Cambios en los materiales (reducción de materiales peligrosos).", e: "Sustituir materias primas tóxicas por otras inocuas es una opción de cambio material." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "Reducir al mínimo el uso de papel en las comunicaciones internas de la oficina es un ejemplo de:", r: ["Buenas prácticas medioambientales.", "Reciclaje interno o in situ.", "Cambios tecnológicos de la producción.", "Rediseño de producto existente."], c: "Buenas prácticas medioambientales.", e: "Son acciones simples de gestión cotidiana o administrativa que reducen el impacto ambiental sin coste." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Qué es el 'Ecodiseño'?", r: ["Diseñar campañas publicitarias para que la empresa parezca ecológica.", "La integración de aspectos medioambientales en el diseño para minimizar impactos en el ciclo de vida del producto.", "Diseñar productos exclusivos para los sectores de la agricultura.", "Pintar los envases de los productos de color verde."], c: "La integración de aspectos medioambientales en el diseño para minimizar impactos en el ciclo de vida del producto.", e: "El ecodiseño interviene antes de que el producto exista, asegurando que desde su concepción sea sostenible." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "El punto de partida obligatorio en cualquier proceso de ecodiseño es:", r: ["Fijar los precios de venta.", "Analizar el ciclo de vida del producto.", "Definir las estrategias de marketing.", "Firmar acuerdos con las ONG."], c: "Analizar el ciclo de vida del producto.", e: "Para hacer un producto ecológico, primero hay que saber cuánto contamina en cada una de sus fases vitales." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "Sustituir la venta de un bien físico por el alquiler de un servicio (ej: alquiler de vehículos compartidos) pertenece a la estrategia de ecodiseño llamada:", r: ["Optimización de la distribución.", "Reducción de elementos.", "Nuevo concepto.", "Optimización del fin de la vida."], c: "Nuevo concepto.", e: "Cambia el concepto de 'poseer un producto' por el de 'utilizar un servicio', reduciendo drásticamente la fabricación." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "Vender muebles desmontables que ocupan menos espacio en el transporte es un ejemplo del principio de ecodiseño:", r: ["Optimización de la distribución.", "Optimización de la producción.", "Nuevo concepto.", "Reducción del impacto en el uso."], c: "Optimización de la distribución.", e: "Al reducir el volumen del producto, caben más cajas en un solo camión y se reduce la contaminación del transporte." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "Si diseñamos un ordenador sin el lector de DVD porque ya nadie lo usa, estamos aplicando la estrategia de:", r: ["Optimización de la vida útil.", "Reducción de elementos.", "Uso de materiales de impacto reducido.", "Recuperación de piezas."], c: "Reducción de elementos.", e: "Consiste en eliminar componentes y materiales que no añaden valor real al producto final." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Qué principio de ecodiseño estamos aplicando si creamos un producto fácil de desmontar y separar en diferentes piezas cuando se rompa?", r: ["Optimización del fin de vida (o vida útil) para facilitar reparación y reciclaje.", "Nuevo concepto tecnológico.", "Reducción del impacto en el uso.", "Multifuncionalidad."], c: "Optimización del fin de vida (o vida útil) para facilitar reparación y reciclaje.", e: "Un diseño modular hace que sea más fácil separar los metales de los plásticos a la hora de reciclarlo o repararlo." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "En las etapas del proceso de ecodiseño, después de definir las funciones del producto y los aspectos ambientales, ¿qué se debe hacer?", r: ["Vender el prototipo inmediatamente.", "Fijar objetivos o metas ambientales.", "Contratar a la plantilla de producción.", "Ocultar los informes a la directiva."], c: "Fijar objetivos o metas ambientales.", e: "Antes de diseñar la solución, hay que tener claro qué meta ecológica se quiere alcanzar con ese nuevo producto." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF4", p: "¿Cuál de los siguientes es un beneficio claro para una empresa que aplica el ecodiseño?", r: ["Aumento garantizado de los impuestos comerciales.", "Menor motivación en los trabajadores jóvenes.", "Fomento de la innovación y mejora del cumplimiento de la legalidad medioambiental.", "Deslocalización forzosa de la producción a otros continentes."], c: "Fomento de la innovación y mejora del cumplimiento de la legalidad medioambiental.", e: "El ecodiseño reduce los costes a medio plazo, evita multas por contaminación y abre la mente a nuevas formas de ganar dinero." },

        // ==========================================
        // SOSTENIBILIDAD - PREGUNTAS DE LAS PRESENTACIONES (UF5)
        // ==========================================

        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "¿Qué es exactamente un indicador de desempeño?", r: ["Un informe de gastos y beneficios a final de año.", "Un dato o conjunto de datos que permite medir el rendimiento de una actividad en relación con un objetivo o meta.", "Una agencia estatal de protección ambiental.", "Una norma jurídica impuesta por la UE."], c: "Un dato o conjunto de datos que permite medir el rendimiento de una actividad en relación con un objetivo o meta.", e: "Son herramientas de medición que nos dicen objetivamente si nos estamos acercando o alejando del éxito." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "¿Cuál es la primera de las 4 fases necesarias para generar un indicador de desempeño y evaluar su evolución?", r: ["Establecimiento de la fórmula de cálculo.", "Definición del indicador.", "Efectuar un seguimiento del indicador.", "Establecimiento del nivel a llegar (meta)."], c: "Definición del indicador.", e: "Antes de calcular nada, hay que seleccionar qué variable concreta nos va a dar la información fiable (ej: emisiones de CO2)." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "En la evaluación del desempeño, la fase de 'Establecimiento del nivel al que queremos llegar' sirve para...", r: ["Comparar nuestro desempeño real con otras empresas de la competencia.", "Decidir la fórmula matemática que arrojará el resultado.", "Fijar una meta deseada basada en la realidad (ej: reducir emisiones a la mitad en cinco años).", "Escribir el informe anual para los directivos."], c: "Fijar una meta deseada basada en la realidad (ej: reducir emisiones a la mitad en cinco años).", e: "Una vez sabes qué y cómo vas a medir, necesitas marcar a dónde quieres que llegue esa cifra en un horizonte temporal." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "¿Quién se encarga de dar una visión de conjunto del desempeño medioambiental de toda la empresa?", r: ["El sistema de gestión ambiental, regido por la norma ISO 14001.", "El departamento de contabilidad y finanzas.", "Únicamente las ONG y el tercer sector.", "La policía medioambiental autonómica."], c: "El sistema de gestión ambiental, regido por la norma ISO 14001.", e: "Este sistema (apoyado en la norma 14031 para evaluación) agrupa toda la planificación y procedimientos medioambientales." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "¿Qué característica define a los Certificados de Sostenibilidad de TIPO I (Ecoetiquetas según ISO 14024)?", r: ["Son redactadas por el propio fabricante sin comprobación externa.", "Solo evalúan el consumo eléctrico del aparato.", "Son licencias concedidas por instituciones ajenas a la empresa (terceras partes) si el producto alcanza niveles de excelencia ecológica.", "Se conceden automáticamente al registrar el negocio en España."], c: "Son licencias concedidas por instituciones ajenas a la empresa (terceras partes) si el producto alcanza niveles de excelencia ecológica.", e: "La Ecoetiqueta europea (Ecolabel) es un ejemplo clásico: un organismo audita y garantiza que el producto es ecológico." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "Si una empresa hace ella misma una declaración asegurando que su producto es '100% reciclable', pero nadie externo lo audita, estamos ante un certificado de:", r: ["TIPO I (Ecoetiqueta).", "TIPO II (Autodeclaración ambiental).", "TIPO III (Declaración EPD).", "TIPO IV (Auditoría legal)."], c: "TIPO II (Autodeclaración ambiental).", e: "Son afirmaciones de marketing verde bajo responsabilidad de la propia empresa, sin un juez independiente." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "El sistema EPD (Declaración Ambiental de Producto) que verifica conjuntos de datos sobre todo el ciclo de vida del producto es un certificado de:", r: ["TIPO I", "TIPO II", "TIPO III", "TIPO IV"], c: "TIPO III", e: "Los certificados tipo III aportan datos exhaustivos del ciclo de vida comprobados por organismos autorizados." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "Existen etiquetas específicas para sectores concretos. ¿Qué certifica el sello FSC?", r: ["La eficiencia energética de una vivienda.", "Que el pescado proviene de pesca sostenible controlada.", "Que el producto utiliza madera procedente de bosques gestionados de forma sostenible.", "Que la empresa no utiliza mano de obra infantil."], c: "Que el producto utiliza madera procedente de bosques gestionados de forma sostenible.", e: "FSC garantiza que talar esos árboles no ha provocado una deforestación destructiva." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "El certificado MSC (Marine Stewardship Council) garantiza...", r: ["Que el alimento es orgánico y no usa fertilizantes.", "Que la energía usada es 100% solar.", "Que el producto es seguro para consumo humano.", "Que el pescado ha sido capturado mediante prácticas de pesca sostenible."], c: "Que el pescado ha sido capturado mediante prácticas de pesca sostenible.", e: "Asegura el mantenimiento de los caladeros y la protección del ecosistema oceánico." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "En la inversión financiera tradicional se valora la rentabilidad, el riesgo y la liquidez. En la Inversión Socialmente Responsable (ISR) se valora además:", r: ["El impacto en los aspectos ambientales, sociales y de buen gobierno de la empresa (ASG).", "Los lazos políticos del CEO con el gobierno en el poder.", "El tamaño físico de las fábricas en metros cuadrados.", "El impacto en las agencias de publicidad externas."], c: "El impacto en los aspectos ambientales, sociales y de buen gobierno de la empresa (ASG).", e: "La ISR busca ganar dinero, pero asegurándose de no financiar proyectos que destruyan el planeta o la sociedad." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "Si un fondo de inversiones tiene un indicador ISR de tipo 'De exclusión' (screening negativo), significa que:", r: ["Incluye solo a empresas que combaten el cambio climático de forma activa.", "Permite invertir en cualquier empresa que genere beneficios económicos altos.", "Excluye a empresas dedicadas a actividades incompatibles con los ODS (armas, tabaco, combustibles fósiles).", "Excluye a los inversores que no vivan en Europa."], c: "Excluye a empresas dedicadas a actividades incompatibles con los ODS (armas, tabaco, combustibles fósiles).", e: "Su lista negra elimina del fondo a sectores enteros que se consideran inmorales o antiecológicos." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "Si un índice ISR se centra exclusivamente en buscar empresas que fabriquen aerogeneradores o gestionen reciclaje (screening positivo), es un:", r: ["Índice de exclusión.", "Índice selectivo.", "Índice de Integración ASG.", "Índice bursátil clásico."], c: "Índice selectivo.", e: "Selecciona y premia proactivamente a las empresas cuyo corazón de negocio es salvar el planeta." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "¿Qué labor realizan los 'Organismos supervisores' (como el Banco de España o la CNMV) en materia de sostenibilidad?", r: ["Crean las leyes nacionales y autonómicas.", "Extienden certificados ISO a pequeñas empresas.", "Desarrollan reglamentos y se aseguran del buen funcionamiento de aspectos ASG en su área de control.", "Prestan asesoramiento consultivo a cambio de un pago horario."], c: "Desarrollan reglamentos y se aseguran del buen funcionamiento de aspectos ASG en su área de control.", e: "Actúan como 'policías del sistema', vigilando que los mercados o bancos cumplan la normativa ambiental vigente." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "El Ministerio para la Transición Ecológica o la Comisión Europea son ejemplos de...", r: ["Entidades certificadoras privadas.", "Agencias de calificación ambiental.", "Consultorías externas.", "Instituciones públicas de gobierno."], c: "Instituciones públicas de gobierno.", e: "Ellos tienen el poder legislativo y ejecutivo para crear las leyes que todos los demás deberán obedecer." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "¿Cuál es la función principal de las Organizaciones Normalizadoras (como ISO o UNE)?", r: ["Crear leyes de obligado cumplimiento en el código penal.", "Crear normas o estándares técnicos especializados que regulen actividades y procesos concretos.", "Multar a las empresas que contaminan demasiado.", "Gestionar las inversiones en la bolsa."], c: "Crear normas o estándares técnicos especializados que regulen actividades y procesos concretos.", e: "Redactan 'el manual de instrucciones perfecto' (los estándares ISO o UNE) para que toda empresa sepa cómo organizar sus procesos medioambientales." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "Empresas como AENOR, Bureau Veritas o SGS actúan en el mercado como:", r: ["Instituciones de gobierno.", "Agencias de publicidad.", "Entidades certificadoras acreditadas.", "Fondos de Inversión Social."], c: "Entidades certificadoras acreditadas.", e: "Ellos mandan a sus inspectores a las empresas y, si cumplen con la norma (ej: ISO 14001), les otorgan el diploma." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "¿A qué se dedican las Agencias de Calificación Ambiental (como MSCI o Standard & Poor's)?", r: ["A asesorar empresas en cómo rellenar trámites gubernamentales.", "A crear las leyes sobre contaminación marítima.", "A calificar (poner 'nota') a inversiones y empresas en función de su grado de cumplimiento ASG.", "A vender derechos de emisión de carbono."], c: "A calificar (poner 'nota') a inversiones y empresas en función de su grado de cumplimiento ASG.", e: "Otorgan ratings (AAA, AA, B...) para que los bancos y ahorradores sepan si están metiendo su dinero en una empresa 'verde'." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "Las empresas que prestan asesoramiento y apoyo en trámites administrativos para ayudar a otras empresas a ser sostenibles se llaman:", r: ["Agencias de Rating ASG.", "Consultorías medioambientales.", "Organismos supervisores del Estado.", "ONG del tercer sector."], c: "Consultorías medioambientales.", e: "Ayudan y guían a las empresas que no saben por dónde empezar a redactar sus planes y memorias ecológicas." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "En la fase de 'Efectuar el seguimiento' del indicador de desempeño, si la meta era reducir las emisiones a 1000 toneladas y este año han bajado de 2000 a 1800...", r: ["El indicador ha fracasado y hay que cerrar la empresa.", "El seguimiento muestra que, si se mantiene el ritmo de bajada, se podrá evaluar positivamente el acercamiento a la meta en el plazo dado.", "Significa que la fórmula matemática del indicador estaba mal calculada.", "Indica que se ha violado la norma ISO 14001."], c: "El seguimiento muestra que, si se mantiene el ritmo de bajada, se podrá evaluar positivamente el acercamiento a la meta en el plazo dado.", e: "El seguimiento permite constatar la tendencia y corregir sobre la marcha antes de que acabe el tiempo." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF5", p: "¿Qué entidad autoriza a las empresas o agencias para que operen como 'agencias de calificación o rating ASG' en Europa?", r: ["El Fondo Monetario Internacional.", "La Autoridad Europea de Valores y Mercados (AEVM).", "El Ministerio de Medio Ambiente español.", "El Banco de Desarrollo Mundial."], c: "La Autoridad Europea de Valores y Mercados (AEVM).", e: "Es el organismo que asegura que quienes ponen las 'notas' financieras/ambientales cumplen los requisitos éticos y técnicos." },
// ==========================================
        // SOSTENIBILIDAD - PREGUNTAS DE LAS PRESENTACIONES (UF6)
        // ==========================================

        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF6", p: "¿Qué documento da cuenta a la autoridad de la evolución de determinados aspectos ASG y es obligatorio para grandes empresas?", r: ["Estado no financiero", "Plan de sostenibilidad", "Informe de sostenibilidad", "Informe de impacto ambiental"], c: "Estado no financiero", e: "El estado no financiero recopila información relacionada con la sostenibilidad para cumplir con las normativas europeas." },
        { m: "Sostenibilidad", t: "Preguntas de las presentaciones", u: "UF6", p: "¿Cuál de las siguientes normas regula la elaboración de la información no financiera de las organizaciones a nivel español?", r: ["Ley 11/2018 de Información no Financiera y Diversidad.", "Global Reporting Initiative (GRI).", "Normas Europeas de Información sobre Sostenibilidad (NEIS).", "Ley 21/2013 de Evaluación Ambiental."], c: "Ley 11/2018 de Información no Financiera y Diversidad.", e: "Esta es la ley española que adapta la directiva europea para presentar la información no financiera." },

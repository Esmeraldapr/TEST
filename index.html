<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Profesional - Multimateria</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; font-weight: bold; position: sticky; top: 0; background: white; z-index: 100; padding-top: 10px;}
        #timer { color: var(--error); font-size: 1.2rem; }

        #login-section { text-align: center; padding: 20px 0; }
        input[type="text"] { padding: 12px; width: 60%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; font-size: 1rem; }
        
        /* Bloque de Materias (NUEVO) */
        .subject-block { background: #fdfdfd; border: 2px solid #e1e8ed; border-radius: 12px; padding: 25px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .subject-title { color: var(--primary); font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid var(--secondary); text-align: left; display: flex; align-items: center; gap: 10px;}
        
        /* Grid de Temas */
        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .topic-card { background: var(--secondary); color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .topic-card:hover { background: #2980b9; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .topic-all { background: var(--primary); }
        .topic-all:hover { background: #1a252f; }

        .btn-main { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; width: 100%; margin-top: 30px;}
        .btn-main:hover { background: #1a252f; }

        /* Estilos de las preguntas continuas */
        .question-block { background: #fff; border: 1px solid #e1e8ed; border-radius: 10px; padding: 25px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .question-header { color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 8px; margin-bottom: 15px; font-size: 1.1rem; }
        .question-text { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; }
        
        .options-container { display: grid; gap: 12px; margin-top: 20px; }
        .option-btn { 
            padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; 
            transition: all 0.2s; background: white; text-align: left; font-size: 1.05rem;
        }
        .option-btn:hover:not(:disabled) { background: #f8f9fa; border-color: var(--secondary); }
        
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }
        
        .explanation { margin-top: 20px; padding: 15px; background: #e8f4fd; border-left: 5px solid var(--secondary); display: none; border-radius: 4px; line-height: 1.5; }

        #results-section { text-align: center; display: none; }
        .chart-container { position: relative; width: 220px; height: 220px; margin: 20px auto; }
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 30px; text-align: left; }
        .ranking-table th { background: var(--primary); color: white; padding: 12px; }
        .ranking-table td { padding: 12px; border-bottom: 1px solid #ddd; }
        .ranking-table tr:hover { background: #f5f5f5; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1 style="color: var(--primary);">Test de Evaluación 3º Trimestre</h1>
        <p>Introduce tu nombre y selecciona el bloque que deseas practicar.</p>
        <input type="text" id="username" placeholder="Nombre completo..." required>
        
        <h3 style="margin-top: 20px; color: #555; margin-bottom: 30px;">Selecciona una Materia y un Tema:</h3>
        
        <div id="subjects-container"></div>
    </div>

    <div id="test-section" style="display:none;">
        <div class="header-info">
            <div>👤 <span id="display-name"></span></div>
            <div>📚 <span id="display-topic"></span></div>
            <div id="timer">⏱️ 00:00</div>
        </div>
        
        <div id="questions-list"></div>
        
        <button id="finish-btn" class="btn-main" onclick="finishTest()">Finalizar y Ver Resultados ➔</button>
    </div>

    <div id="results-section">
        <h2 style="color: var(--primary);">Resultados del Test</h2>
        <div class="chart-container">
            <canvas id="resultChart"></canvas>
            <div id="percentage-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.8rem; font-weight: bold; color: var(--primary);"></div>
        </div>
        <h3 id="final-stats" style="color: #555;"></h3>
        
        <h3 style="margin-top: 40px; text-align: left;">🏆 Ranking Local (Top 10)</h3>
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Candidato</th>
                    <th>Materia / Tema</th>
                    <th>Aciertos</th>
                    <th>Tiempo</th>
                </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
        </table>
        <br><br>
        <button class="btn-main" onclick="location.reload()">↻ Volver al Menú Principal</button>
    </div>
</div>

    let currentQuestions = [];
    let answeredStatus = {};
    let startTime, timerInterval;
    let userName = "";
    let selectedSubject = "";
    let selectedTopicName = "";

    // Generar los contenedores de Materias y sus botones dinámicamente
    window.onload = function() {
        const container = document.getElementById('subjects-container');
        
        // Obtener las materias únicas (ej: Sostenibilidad, Matemáticas, etc.)
        const subjects = [...new Set(misPreguntas.map(q => q.m))]; 

        subjects.forEach(subject => {
            // Filtrar las preguntas solo para esta materia
            const subjectQuestions = misPreguntas.filter(q => q.m === subject);
            
            // Obtener los temas únicos dentro de esta materia
            const topics = [...new Set(subjectQuestions.map(q => q.t))]; 

            // Crear el bloque/recuadro para la materia
            const subjectDiv = document.createElement('div');
            subjectDiv.className = 'subject-block';
            
            // Título de la materia
            const title = document.createElement('h2');
            title.className = 'subject-title';
            title.innerHTML = `📘 ${subject}`;
            subjectDiv.appendChild(title);

            // Grid para los temas
            const grid = document.createElement('div');
            grid.className = 'topics-grid';

            // Añadir los botones de cada tema
            topics.forEach(topic => {
                const btn = document.createElement('button');
                btn.className = 'topic-card';
                btn.innerText = topic;
                btn.onclick = () => startTest(subject, topic);
                grid.appendChild(btn);
            });

            // Añadir el botón de "Todos los temas" para esta materia
            const btnAll = document.createElement('button');
            btnAll.className = 'topic-card topic-all';
            btnAll.innerText = `Todos los temas`;
            btnAll.onclick = () => startTest(subject, 'Todos');
            grid.appendChild(btnAll);

            // Añadir todo al DOM
            subjectDiv.appendChild(grid);
            container.appendChild(subjectDiv);
        });
    };

    function startTest(subject, topic) {
        userName = document.getElementById('username').value.trim();
        if (!userName) return alert("Por favor, introduce tu nombre antes de seleccionar un tema.");

        selectedSubject = subject;
        selectedTopicName = topic;
        
        // Mostrar título arriba (Ej: "Sostenibilidad - Tema 1")
        document.getElementById('display-topic').innerText = topic === 'Todos' ? `${subject} (Test Global)` : `${subject} - ${topic}`;

        // Filtrar preguntas por materia y tema
        if (topic === 'Todos') {
            currentQuestions = misPreguntas.filter(q => q.m === subject);
        } else {
            currentQuestions = misPreguntas.filter(q => q.m === subject && q.t === topic);
        }

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('test-section').style.display = 'block';
        document.getElementById('display-name').innerText = userName;
        
        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);
        
        shuffleArray(currentQuestions);
        renderAllQuestions();
    }

    function updateTimer() {
        const diff = Math.floor((new Date() - startTime) / 1000);
        document.getElementById('timer').innerText = `⏱️ ${Math.floor(diff / 60).toString().padStart(2, '0')}:${(diff % 60).toString().padStart(2, '0')}`;
    }

    function renderAllQuestions() {
        const container = document.getElementById('questions-list');
        container.innerHTML = '';
        answeredStatus = {}; // Resetear estado de respuestas

        currentQuestions.forEach((q, index) => {
            let options = [...q.r];
            shuffleArray(options);
            
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            qBlock.innerHTML = `
                <h3 class="question-header">${q.m} | ${q.t}</h3>
                <div class="question-text">${index + 1}/${currentQuestions.length}. ${q.p}</div>
                <div class="options-container" id="options-${index}">
                    ${options.map(opt => `<button class="option-btn" onclick="checkAnswer(this, ${index}, '${opt.replace(/'/g, "\\'")}', '${q.c.replace(/'/g, "\\'")}', '${q.e ? q.e.replace(/'/g, "\\'") : ""}')">${opt}</button>`).join('')}
                </div>
                <div id="explanation-${index}" class="explanation"></div>
            `;
            container.appendChild(qBlock);
        });
    }

    function checkAnswer(btn, index, selected, correct, info) {
        // Evitar que se responda dos veces la misma pregunta
        if (answeredStatus[index] !== undefined) return; 

        const optionsContainer = document.getElementById(`options-${index}`);
        const buttons = optionsContainer.querySelectorAll('.option-btn');
        
        // Bloquear los botones de esta pregunta
        buttons.forEach(b => b.disabled = true);

        if (selected === correct) { 
            btn.classList.add('correct'); 
            answeredStatus[index] = true; // Guardar como acertada
        } else { 
            btn.classList.add('wrong'); 
            answeredStatus[index] = false; // Guardar como fallada
            // Marcar la correcta
            buttons.forEach(b => { 
                if(b.innerText.trim() === correct) b.classList.add('correct'); 
            }); 
        }

        // Mostrar explicación debajo de la pregunta
        if (info) { 
            const eb = document.getElementById(`explanation-${index}`); 
            eb.innerHTML = `<strong>💡 Aclaración:</strong> ${info}`; 
            eb.style.display = 'block'; 
        }
    }

    function finishTest() {
        // Confirmar si faltan preguntas por responder
        const totalAnswered = Object.keys(answeredStatus).length;
        if (totalAnswered < currentQuestions.length) {
            if (!confirm(`Has respondido ${totalAnswered} de ${currentQuestions.length} preguntas. ¿Seguro que quieres finalizar el test?`)) {
                return;
            }
        }

        clearInterval(timerInterval);
        
        // Calcular puntuación
        let finalScore = Object.values(answeredStatus).filter(v => v === true).length;

        document.getElementById('test-section').style.display = 'none';
        document.getElementById('results-section').style.display = 'block';
        
        const finalTime = document.getElementById('timer').innerText.replace('⏱️ ', '');
        document.getElementById('final-stats').innerText = `Has acertado ${finalScore} de ${currentQuestions.length} preguntas en ${finalTime}.`;
        
        // Guardamos tanto la materia como el tema en el ranking
        const rankingTopic = selectedTopicName === 'Todos' ? `${selectedSubject} (Global)` : `${selectedSubject} - ${selectedTopicName}`;
        saveRanking(userName, rankingTopic, finalScore, finalTime);
        displayRanking();
        drawChart(finalScore, currentQuestions.length);
        
        // Hacer scroll hasta arriba para ver los resultados
        window.scrollTo(0,0);
    }

    function shuffleArray(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } }

    function drawChart(s, t) {
        let chartStatus = Chart.getChart("resultChart"); 
        if (chartStatus != undefined) chartStatus.destroy();

        new Chart(document.getElementById('resultChart'), {
            type: 'doughnut',
            data: { datasets: [{ data: [s, t - s], backgroundColor: ['#27ae60', '#e74c3c'], borderWidth: 0 }] },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
        document.getElementById('percentage-text').innerText = Math.round((s/t)*100) + "%";
    }

    function saveRanking(name, topic, score, time) {
        let r = JSON.parse(localStorage.getItem('ranking_test_v3') || '[]');
        r.push({ n: name, topic: topic, p: score, t: time });
        r.sort((a, b) => b.p - a.p || a.t.localeCompare(b.t));
        localStorage.setItem('ranking_test_v3', JSON.stringify(r.slice(0, 10)));
    }

    function displayRanking() {
        const r = JSON.parse(localStorage.getItem('ranking_test_v3') || '[]');
        document.getElementById('ranking-body').innerHTML = r.map((u, i) => `<tr><td><strong>${i+1}</strong></td><td>${u.n}</td><td><span style="background:#eee; padding:2px 6px; border-radius:4px; font-size:0.85em;">${u.topic}</span></td><td style="color: var(--success); font-weight: bold;">${u.p}</td><td>${u.t}</td></tr>`).join('');
    }
</script>
</body>
